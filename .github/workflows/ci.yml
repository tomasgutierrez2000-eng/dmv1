name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test metrics
        run: npm run test:metrics

      - name: Test calculation engine
        run: npm run test:calc-engine

      - name: Audit dependencies
        run: npm run audit
        continue-on-error: true

      - name: Sync data model (for validate)
        run: npm run sync:data-model
        continue-on-error: true

      - name: Validate data model
        run: npm run validate
        continue-on-error: true
