# S21: Tech Leveraged Buyout Stress
#
# Story: A PE-backed technology firm took on $2.5B of leveraged debt
# to fund an acquisition. Integration issues and revenue shortfalls
# are pushing covenant metrics to the edge. The bank holds $800M
# across term loans and a revolver that is being drawn aggressively.
#
# Dashboard signal: Large leveraged exposure with deteriorating
# coverage ratios and aggressive revolver draws.

scenario_id: "S21"
name: "Tech Leveraged Buyout Stress"
type: LEVERAGED_FINANCE
narrative: "PE-backed tech firm's $2.5B LBO faces integration headwinds, aggressive revolver draws on $800M bank exposure"

counterparties:
  - legal_name: "NexGen Software Holdings LLC"
    country: US
    industry_id: 2      # Technology
    rating_tier: HY_MID
    story_arc: DETERIORATING
    size: LARGE
  - legal_name: "NexGen Software Operating Co."
    country: US
    industry_id: 2
    rating_tier: HY_MID
    story_arc: DETERIORATING
    size: MID
  - legal_name: "Apex Capital Partners Fund VII"
    country: US
    industry_id: 1      # Financial Services (PE sponsor)
    rating_tier: IG_MID
    story_arc: STABLE_IG
    size: LARGE

facilities:
