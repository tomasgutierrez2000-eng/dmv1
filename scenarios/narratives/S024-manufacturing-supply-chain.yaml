# S24: Manufacturing Supply Chain Disruption
#
# Story: 6 industrial manufacturers face cascading supply chain
# disruption from port closures and semiconductor shortages.
# Production halts trigger working capital draws on revolvers.
# The bank sees $900M of exposure to affected names with
# utilization jumping from 45% to 78% in 60 days.
#
# Dashboard signal: Sector-wide utilization spike in industrials
# with pipeline stress and deteriorating credit metrics.

