# S26: Utilities Regulatory Capital Near-Miss
#
# Story: The bank's utilities portfolio sits at 94% of the
# SCCL limit for a single counterparty group. A new $150M
# facility approval would breach the limit. The deal team
# is pressuring credit risk for approval before quarter-end.
#
# Dashboard signal: Near-miss on regulatory limit with
# approval pipeline creating imminent breach risk.

