# S27: Telecom Exposure Limit Breach
#
# Story: A major telecom's aggressive 5G capex borrowing pushes
# the bank's single-name exposure to $3.2B, breaching the $3B
# internal limit. Concurrent spectrum auction financing adds
# $400M of unfunded commitments. Risk management escalates
# to the board for limit exception approval.
#
# Dashboard signal: Hard limit breach on single-name telecom
# exposure with board-level escalation required.

