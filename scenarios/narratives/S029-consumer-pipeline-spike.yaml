# S29: Consumer Goods Pipeline Surge
#
# Story: A wave of M&A activity in consumer staples creates
# an unprecedented pipeline of 8 new facilities totaling $2.1B
# in commitments. The origination team has 5 deals in underwriting
# and 3 in credit approval — all targeting Q1 close. Portfolio
# concentration risk in consumer sector intensifies.
#
# Dashboard signal: Deal pipeline spike with multiple
# facilities moving through approval stages simultaneously.

scenario_id: "S29"
name: "Consumer Goods Pipeline Surge"
type: PIPELINE_SPIKE
narrative: "M&A-driven pipeline surge — 8 new consumer facilities totaling $2.1B targeting Q1 close"

