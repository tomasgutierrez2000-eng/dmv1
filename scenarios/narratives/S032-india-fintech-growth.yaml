# S32: India Fintech Rapid Growth
#
# Story: The bank onboards 4 Indian fintech companies as new
# relationships. Fast revenue growth masks operational risks.
# Facilities ramp from zero to $350M committed in 90 days.
# Data quality scores are low — incomplete financial reporting
# and missing collateral documentation.
#
# Dashboard signal: New relationship onboarding with rapid
# ramp-up, data quality concerns, and emerging market risk.

