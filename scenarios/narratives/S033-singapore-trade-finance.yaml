# S33: Singapore Trade Finance Deterioration
#
# Story: 3 Singapore-based commodity trading houses face margin
# pressure as global trade volumes contract. Letters of credit
# and trade finance facilities see rising utilization as
# working capital cycles elongate. One borrower's trade
# receivables are aging past 120 days.
#
# Dashboard signal: Trade finance utilization rising with
# aging receivables and working capital deterioration.

