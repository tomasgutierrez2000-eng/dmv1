# S36: Middle East Real Estate Overbuilding
#
# Story: Dubai and Abu Dhabi real estate developers face
# oversupply as luxury residential and commercial projects
# complete simultaneously. Occupancy rates drop below 60%,
# rental income collapses, and property valuations decline 20%.
# The bank has $800M CRE exposure concentrated in 3 developers.
#
# Dashboard signal: CRE concentration in Middle East with
# declining valuations and collateral coverage erosion.

