  risk_flags:
    - code: RECOVERY_TREND
      severity: LOW
      description: "Utilization declining 5-10% per month as cash flows normalize"
    - code: FLAG_RESOLUTION
      severity: LOW
      description: "Previous sector stress flags being resolved — China demand recovering"

verification:
