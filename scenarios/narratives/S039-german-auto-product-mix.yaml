# S39: German Auto Industry Product Mix Shift
#
# Story: 3 German automakers shift from traditional ICE financing
# to EV supply chain credit. The bank's product mix shifts from
# 80% term loans to 40% supply chain finance and 30% capex
# facilities. FR2590 reporting categories change, requiring
# reclassification of $2.3B in facilities.
#
# Dashboard signal: Product mix shift in auto sector with
# FR2590 reclassification and new facility types emerging.

scenario_id: "S39"
name: "German Auto Product Mix Shift"
type: PRODUCT_MIX
narrative: "3 German automakers pivot to EV financing — $2.3B in facilities require FR2590 reclassification"

