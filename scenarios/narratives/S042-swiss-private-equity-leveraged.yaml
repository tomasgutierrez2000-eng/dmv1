      severity: HIGH
      description: "PE fund leverage ratios within 5% of covenant limits"
    - code: NAV_COMPRESSION
      severity: MEDIUM
      description: "Fund NAVs declining 10-15% from rate-driven valuation adjustments"

verification:
  min_rows: 9
  key_assertion: "Swiss PE funds show leverage concerns with NAV compression and covenant pressure"
