# S45: Mexico Infrastructure Syndicated Facility
#
# Story: A $3.5B syndicated project finance facility for
# Mexico City metro expansion. Bank holds 20% ($700M).
# Political risk emerges as incoming administration threatens
# contract renegotiation. Construction permits delayed.
# Syndicate members considering exit options.
#
# Dashboard signal: Large syndicated exposure with political
# risk and construction delay in emerging market.

