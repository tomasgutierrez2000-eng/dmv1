# S48: Emerging Market FX Stress Test
#
# Story: A coordinated EM currency crisis (BRL -25%, INR -15%,
# MXN -20%) stress-tests the bank's cross-border portfolio.
# USD-denominated debt service becomes unsustainable for 6
# EM borrowers. Stress losses total $780M across 3 countries.
#
# Dashboard signal: EM stress test shows FX-amplified losses
# across Brazil, India, and Mexico portfolios.

scenario_id: "S48"
name: "Emerging Market FX Stress"
type: STRESS_TEST
narrative: "Coordinated EM currency crisis — BRL/INR/MXN depreciation creates $780M stress losses across 6 borrowers"

counterparties:
  - legal_name: "Rio Industrial Conglomerate SA"
    country: BR
    industry_id: 5      # Manufacturing
    rating_tier: HY_HIGH
    story_arc: STRESSED_SECTOR
    size: LARGE
  - legal_name: "Mumbai Infrastructure Holdings Ltd."
    country: IN
    industry_id: 8      # Transportation
    rating_tier: HY_MID
    story_arc: STRESSED_SECTOR
    size: MID
  - legal_name: "Guadalajara Textiles SA de CV"
    country: MX
    industry_id: 5
    rating_tier: HY_MID
    story_arc: DETERIORATING
    size: MID
  - legal_name: "São Paulo Telecom Holdings SA"
    country: BR
    industry_id: 8      # Telecom
    rating_tier: HY_HIGH
    story_arc: STRESSED_SECTOR
    size: MID
  - legal_name: "Pune Pharmaceutical Ltd."
    country: IN
