    story_arc: STRESSED_SECTOR
    size: LARGE
  - legal_name: "Regional Mall Partners"
    country: US
    industry_id: 10
    rating_tier: HY_MID
    story_arc: DETERIORATING
    size: MID
  - legal_name: "Industrial Park Holdings"
    country: US
    industry_id: 10
    rating_tier: IG_LOW
    story_arc: DETERIORATING
    size: MID
  - legal_name: "Suburban Retail LLC"
    country: US
    industry_id: 10
    rating_tier: HY_HIGH
    story_arc: STRESSED_SECTOR
    size: SMALL
  - legal_name: "Mixed-Use Development Corp"
    country: US
    industry_id: 10
