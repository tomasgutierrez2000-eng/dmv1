# S55: CRE Refinancing Wall
#
# Story: Five CRE facilities maturing in 90 days; two unable to
# refinance at current rates. Maturity concentration triggers
# risk flags and refinancing negotiations.
#
# Dashboard signal: CRO sees maturity wall concentration, refinancing
# risk flags, and collateral coverage decline.

scenario_id: "S55"
name: "CRE Refinancing Wall"
