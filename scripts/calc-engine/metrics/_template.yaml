# VALIDATION RULES
validations:
  - rule_id: "DOMAIN-NNN-V01"
    type: NOT_NULL
    description: "No null metric values"
    severity: ERROR

  - rule_id: "DOMAIN-NNN-V02"
    type: NON_NEGATIVE
    description: "Values must be >= 0"
    severity: ERROR

