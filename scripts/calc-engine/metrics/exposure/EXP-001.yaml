# IDENTIFICATION
metric_id: "EXP-001"
name: "Gross Exposure"
version: "1.0.0"
owner: "credit-risk-analytics"
status: ACTIVE
effective_date: "2026-01-01"

# CLASSIFICATION
domain: "exposure"
sub_domain: "gross_exposure"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Total credit exposure (committed amount) per facility, aggregated
  up through the rollup hierarchy. Committed amount represents the
  maximum potential exposure for each facility.

# REGULATORY REFERENCES
regulatory_references:
  - framework: "Basel III"
    section: "CRE 20.4"
    description: "Gross credit exposure definition"

# SOURCE TABLES
source_tables:
  - schema: l2
    table: facility_exposure_snapshot
    alias: fes
    join_type: BASE
    fields:
      - name: committed_amount
        role: MEASURE
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
  - schema: l1
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fes.facility_id"
    fields:
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: INNER
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION

# LEVEL FORMULAS
levels:
  facility:
    aggregation_type: SUM
    formula_text: "SUM(committed_amount) per facility"
    formula_sql: |
      SELECT
        fes.facility_id::TEXT AS dimension_key,
        fm.facility_name AS dimension_label,
        SUM(COALESCE(fes.committed_amount, 0)) AS metric_value
      FROM l2.facility_exposure_snapshot fes
      INNER JOIN l1.facility_master fm ON fm.facility_id = fes.facility_id
      WHERE fes.as_of_date = :as_of_date
      GROUP BY fes.facility_id, fm.facility_name

  counterparty:
    aggregation_type: SUM
    formula_text: "SUM(committed_amount) per counterparty"
    formula_sql: |
      SELECT
        fm.counterparty_id::TEXT AS dimension_key,
        cp.legal_name AS dimension_label,
        SUM(COALESCE(fes.committed_amount, 0)) AS metric_value
      FROM l2.facility_exposure_snapshot fes
      INNER JOIN l1.facility_master fm ON fm.facility_id = fes.facility_id
      INNER JOIN l1.counterparty cp ON cp.counterparty_id = fm.counterparty_id
      WHERE fes.as_of_date = :as_of_date
      GROUP BY fm.counterparty_id, cp.legal_name

  desk:
    aggregation_type: SUM
    formula_text: "SUM(committed_amount) per desk (tree_level=3)"
    formula_sql: |
      SELECT
        ebt_desk.managed_segment_id::TEXT AS dimension_key,
        ebt_desk.segment_name AS dimension_label,
        SUM(COALESCE(fes.committed_amount, 0)) AS metric_value
      FROM l2.facility_exposure_snapshot fes
      INNER JOIN l1.facility_master fm ON fm.facility_id = fes.facility_id
      INNER JOIN l1.enterprise_business_taxonomy ebt_desk
        ON ebt_desk.managed_segment_id = fm.lob_segment_id
        AND ebt_desk.tree_level = 3
      WHERE fes.as_of_date = :as_of_date
      GROUP BY ebt_desk.managed_segment_id, ebt_desk.segment_name

  portfolio:
    aggregation_type: SUM
    formula_text: "SUM(committed_amount) per portfolio (tree_level=2)"
    formula_sql: |
      SELECT
        ebt_port.managed_segment_id::TEXT AS dimension_key,
        ebt_port.segment_name AS dimension_label,
        SUM(COALESCE(fes.committed_amount, 0)) AS metric_value
      FROM l2.facility_exposure_snapshot fes
      INNER JOIN l1.facility_master fm ON fm.facility_id = fes.facility_id
      INNER JOIN l1.enterprise_business_taxonomy ebt_desk
        ON ebt_desk.managed_segment_id = fm.lob_segment_id
      INNER JOIN l1.enterprise_business_taxonomy ebt_port
        ON ebt_port.managed_segment_id = ebt_desk.parent_segment_id
        AND ebt_port.tree_level = 2
      WHERE fes.as_of_date = :as_of_date
      GROUP BY ebt_port.managed_segment_id, ebt_port.segment_name

  business_segment:
    aggregation_type: SUM
    formula_text: "SUM(committed_amount) per business segment (tree_level=1)"
    formula_sql: |
      SELECT
        ebt_bseg.managed_segment_id::TEXT AS dimension_key,
        ebt_bseg.segment_name AS dimension_label,
        SUM(COALESCE(fes.committed_amount, 0)) AS metric_value
      FROM l2.facility_exposure_snapshot fes
      INNER JOIN l1.facility_master fm ON fm.facility_id = fes.facility_id
      INNER JOIN l1.enterprise_business_taxonomy ebt_desk
        ON ebt_desk.managed_segment_id = fm.lob_segment_id
      INNER JOIN l1.enterprise_business_taxonomy ebt_port
        ON ebt_port.managed_segment_id = ebt_desk.parent_segment_id
      INNER JOIN l1.enterprise_business_taxonomy ebt_bseg
        ON ebt_bseg.managed_segment_id = ebt_port.parent_segment_id
        AND ebt_bseg.tree_level = 1
      WHERE fes.as_of_date = :as_of_date
      GROUP BY ebt_bseg.managed_segment_id, ebt_bseg.segment_name

# DEPENDENCIES
depends_on: []

# OUTPUT
output:
  table: metric_result

# VALIDATION
validations:
  - rule_id: "EXP-001-V01"
    type: NOT_NULL
    severity: ERROR
    description: "No null metric values allowed"
  - rule_id: "EXP-001-V02"
    type: NON_NEGATIVE
    severity: ERROR
    description: "All exposure values must be non-negative"
  - rule_id: "EXP-001-V03"
    type: RECONCILIATION
    severity: WARNING
    description: "Facility total must reconcile with business segment total"
    params:
      levels_to_compare: [facility, business_segment]
      tolerance_pct: 1.0

tags: [gsib, ccar, exposure]
dashboard_pages: [P1, P2]
legacy_metric_ids: [C001]
