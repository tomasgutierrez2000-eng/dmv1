metric_id: AMD-001
name: Amendment Start Date
version: 1.0.0
owner: credit-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: amendments
sub_domain: amendment-events
metric_class: SOURCED
direction: NEUTRAL
unit_type: DAYS
display_format: s
description: |
  Date amendment became effective.
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: facility_exposure_snapshot
  alias: fes
  join_type: BASE
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: effective_date
    role: MEASURE
- schema: l1
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.facility_id = fes.facility_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: RAW
    formula_text: |
      Read effective_date from facility_master for each facility.
    formula_sql: |-
      SELECT
        fm.facility_id AS dimension_key,
        EXTRACT(EPOCH FROM fm.effective_date)::BIGINT AS metric_value
      FROM l1.facility_master fm
      WHERE fm.active_flag = 'Y'
  counterparty:
    aggregation_type: MAX
    formula_text: |
      Latest (MAX) effective_date per counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        MAX(EXTRACT(EPOCH FROM fm.effective_date)::BIGINT) AS metric_value
      FROM l1.facility_master fm
      WHERE fm.active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: MAX
    formula_text: |
      Latest (MAX) effective_date per L3 desk segment.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        MAX(EXTRACT(EPOCH FROM fm.effective_date)::BIGINT) AS metric_value
      FROM l1.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      WHERE fm.active_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: MAX
    formula_text: |
      Latest (MAX) effective_date per L2 portfolio segment.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        MAX(EXTRACT(EPOCH FROM fm.effective_date)::BIGINT) AS metric_value
      FROM l1.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      WHERE fm.active_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: MAX
    formula_text: |
      Latest (MAX) effective_date per L1 business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        MAX(EXTRACT(EPOCH FROM fm.effective_date)::BIGINT) AS metric_value
      FROM l1.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      WHERE fm.active_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
depends_on: []
output:
  table: metric_result
validations:
- rule_id: AMD-001-V01
  type: NOT_NULL
  description: No null effective_date values
  severity: ERROR
catalogue:
  item_id: MET-003
  abbreviation: ASD
  insight: |
    Amendment lifecycle tracking
  rollup_strategy: direct-sum
  primary_value_field: effective_date
tags:
- amendments
- amendment-events
dashboard_pages: []
legacy_metric_ids: []
