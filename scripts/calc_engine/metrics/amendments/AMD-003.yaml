# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Amendment Type
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "AMD-003"
name: "Amendment Type"
version: "1.0.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "amendments"
sub_domain: "amendment-events"
metric_class: HYBRID
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Type of contractual amendment (e.g., covenant reset, maturity extension).
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l1
    table: amendment_type_dim
    alias: atd
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: amendment_type_code
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of amendment_type_code from amendment_type_dim.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        atd.amendment_type_code AS metric_value
      FROM l1.facility_master fm
      INNER JOIN l1.amendment_type_dim atd
        ON atd.facility_id = fm.facility_id
      WHERE fm.active_flag = 'Y'
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM(facility-level amendment_type_code) per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          atd.amendment_type_code AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.amendment_type_dim atd
          ON atd.facility_id = fm.facility_id
        WHERE fm.active_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level amendment_type_code per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          atd.amendment_type_code AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.amendment_type_dim atd
          ON atd.facility_id = fm.facility_id
        WHERE fm.active_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level amendment_type_code per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          atd.amendment_type_code AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.amendment_type_dim atd
          ON atd.facility_id = fm.facility_id
        WHERE fm.active_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level amendment_type_code per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          atd.amendment_type_code AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.amendment_type_dim atd
          ON atd.facility_id = fm.facility_id
        WHERE fm.active_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "AMD-003-V01"
    type: NOT_NULL
    description: "No null amendment_type_code values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-005"
  abbreviation: "AT"
  insight: >
    Amendment risk or operational impact
  rollup_strategy: "direct-sum"
  primary_value_field: "amendment_type_code"
# ── METADATA ──────────────────────────────────────────────────
tags: ["amendments", "amendment-events"]
dashboard_pages: []
legacy_metric_ids: []
