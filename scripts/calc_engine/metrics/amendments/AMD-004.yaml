# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Amendment ID
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "AMD-004"
name: "Amendment ID"
version: "1.0.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "amendments"
sub_domain: "amendment-events"
metric_class: SOURCED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Indicator that facility agreement has undergone amendment. Portfolio KPI (%
  Facilities with Amendments) signals restructuring activity.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: amendment_event
    alias: ae
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: amendment_event_id
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = ae.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Read amendment_event_id from amendment_event for each facility as-of
      reporting date.
    formula_sql: |
      SELECT
        ae.facility_id AS dimension_key,
        ae.amendment_event_id AS metric_value
      FROM l2.amendment_event ae
      WHERE ae.as_of_date = :as_of_date
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM(facility-level amendment_event_id) per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ae.facility_id AS dimension_key,
          ae.amendment_event_id AS metric_value
        FROM l2.amendment_event ae
        WHERE ae.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level amendment_event_id per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ae.facility_id AS dimension_key,
          ae.amendment_event_id AS metric_value
        FROM l2.amendment_event ae
        WHERE ae.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level amendment_event_id per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ae.facility_id AS dimension_key,
          ae.amendment_event_id AS metric_value
        FROM l2.amendment_event ae
        WHERE ae.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level amendment_event_id per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ae.facility_id AS dimension_key,
          ae.amendment_event_id AS metric_value
        FROM l2.amendment_event ae
        WHERE ae.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "AMD-004-V01"
    type: NOT_NULL
    description: "No null amendment_event_id values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-044"
  abbreviation: "AI"
  insight: >
    Frequency of contractual changes
  rollup_strategy: "direct-sum"
  primary_value_field: "amendment_event_id"
# ── METADATA ──────────────────────────────────────────────────
tags: ["amendments", "amendment-events"]
dashboard_pages: []
legacy_metric_ids: []
