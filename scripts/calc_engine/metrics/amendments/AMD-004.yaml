# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Amendment Rate
# ═══════════════════════════════════════════════════════════════

# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "AMD-004"
name: "Amendment Rate"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null

# ── CLASSIFICATION ────────────────────────────────────────────
domain: "amendments"
sub_domain: "amendment-events"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: PERCENTAGE
display_format: ".1f"
description: >
  Percentage of active facilities that have undergone at least one
  contractual amendment. At facility level, returns a binary flag (1 = has
  amendment, 0 = no amendment). At counterparty and aggregate levels,
  computes the count-ratio: COUNT(amended facilities) / COUNT(total
  facilities) x 100. High amendment rates may signal portfolio stress,
  widespread restructuring activity, or covenant relief campaigns.

# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "OCC 2020-36"
    description: "Loan modification and restructuring activity monitoring for credit risk management"
  - framework: "FR Y-14Q"
    description: "Schedule H.2 — amendment and modification tracking for large institution supervision"
  - framework: "CCAR"
    description: "Portfolio amendment trends as indicator of credit stress for capital planning"

# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l2
    table: amendment_event
    alias: ae
    join_type: LEFT
    join_on: "ae.facility_id = fm.facility_id"
    fields:
      - name: amendment_id
        role: MEASURE
      - name: facility_id
        role: JOIN_KEY
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER

# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      For each active facility, check whether any amendment_event records
      exist via LEFT JOIN. Returns 1 (has amendment) or 0 (no amendment).
      A facility is considered amended if it has at least one record in the
      amendment_event table regardless of amendment type or status.
    formula_sql: |-
      SELECT
        fm.facility_id AS dimension_key,
        CASE
          WHEN COUNT(ae.amendment_id) > 0 THEN 1
          ELSE 0
        END AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l2.amendment_event ae
        ON ae.facility_id = fm.facility_id
      WHERE fm.is_active_flag = 'Y'
      GROUP BY fm.facility_id
  counterparty:
    aggregation_type: CUSTOM
    formula_text: >
      Count-ratio: number of amended facilities divided by total active
      facilities for each counterparty, expressed as a percentage. Uses a
      DISTINCT subquery on amendment_event to avoid double-counting
      facilities with multiple amendments.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(
          CASE WHEN amended.facility_id IS NOT NULL THEN 1 ELSE 0 END
        ) * 100.0
          / NULLIF(COUNT(*), 0) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN (
        SELECT DISTINCT facility_id
        FROM l2.amendment_event
      ) amended
        ON amended.facility_id = fm.facility_id
      WHERE fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: CUSTOM
    formula_text: >
      Count-ratio: percentage of amended facilities per L3 desk segment.
      Re-counts at segment level (never averages pre-computed ratios) to
      avoid Simpson's paradox. Uses EBT direct join for L3.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(
          CASE WHEN amended.facility_id IS NOT NULL THEN 1 ELSE 0 END
        ) * 100.0
          / NULLIF(COUNT(*), 0) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN (
        SELECT DISTINCT facility_id
        FROM l2.amendment_event
      ) amended
        ON amended.facility_id = fm.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: >
      Count-ratio: percentage of amended facilities per L2 portfolio
      segment. Traverses EBT hierarchy L3 → L2 via parent_segment_id.
      Re-counts at portfolio level for mathematical consistency.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(
          CASE WHEN amended.facility_id IS NOT NULL THEN 1 ELSE 0 END
        ) * 100.0
          / NULLIF(COUNT(*), 0) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN (
        SELECT DISTINCT facility_id
        FROM l2.amendment_event
      ) amended
        ON amended.facility_id = fm.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: >
      Count-ratio: percentage of amended facilities per L1 business segment.
      Full EBT hierarchy traversal L3 → L2 → L1. Re-counts at segment
      level for mathematical consistency across the rollup hierarchy.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(
          CASE WHEN amended.facility_id IS NOT NULL THEN 1 ELSE 0 END
        ) * 100.0
          / NULLIF(COUNT(*), 0) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN (
        SELECT DISTINCT facility_id
        FROM l2.amendment_event
      ) amended
        ON amended.facility_id = fm.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id

# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []

# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result

# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "AMD-004-V01"
    type: NOT_NULL
    description: "No null amendment rate values — every group must produce a numeric result"
    severity: ERROR
  - rule_id: "AMD-004-V02"
    type: THRESHOLD
    description: "Amendment rate must be between 0% and 100%"
    severity: ERROR
    params:
      min: 0
      max: 100
  - rule_id: "AMD-004-V03"
    type: NON_NEGATIVE
    description: "Amendment rate cannot be negative"
    severity: ERROR

# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-044"
  abbreviation: "AMDR"
  insight: >
    Percentage of active facilities with at least one contractual amendment.
    Elevated rates may indicate portfolio stress, widespread covenant relief,
    or restructuring campaigns requiring CRO attention.
  rollup_strategy: "count-ratio"
  primary_value_field: "amendment_rate_pct"

# ── METADATA ──────────────────────────────────────────────────
tags: ["amendments", "amendment-events", "restructuring", "portfolio-stress"]
dashboard_pages: []
legacy_metric_ids: []
