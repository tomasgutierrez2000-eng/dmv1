metric_id: CAP-002
name: Return on RWA (%)
version: 1.0.0
owner: market-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: capital
sub_domain: adequacy
metric_class: CALCULATED
direction: NEUTRAL
unit_type: PERCENTAGE
display_format: .2f
description: |
  Evaluates profitability per unit of risk (RWA); supports risk-adjusted performance comparisons, pricing, and capital allocation decisions.
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: facility_financial_snapshot
  alias: ffs
  join_type: BASE
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: net_income_amt
    role: MEASURE
- schema: l2
  table: facility_exposure_snapshot
  alias: fes
  join_type: INNER
  join_on: fes.facility_id = ffs.facility_id AND fes.as_of_date = ffs.as_of_date
  fields:
  - name: rwa_amt
    role: MEASURE
- schema: l2
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.facility_id = ffs.facility_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: is_active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: |
      Calculated return_on_rwa_pct per facility.
    formula_sql: |-
      SELECT
        ffs.facility_id AS dimension_key,
        ffs.net_income_amt / NULLIF(fes.rwa_amt, 0) * 100.0 AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_exposure_snapshot fes
        ON fes.facility_id = ffs.facility_id
        AND fes.as_of_date = ffs.as_of_date
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(net_income) / SUM(rwa) * 100.0 per counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          ffs.facility_id,
          ffs.net_income_amt AS numerator_val,
          fes.rwa_amt AS denominator_val
        FROM l2.facility_financial_snapshot ffs
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = ffs.facility_id
          AND fes.as_of_date = ffs.as_of_date
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE ffs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(net_income) / SUM(rwa) * 100.0 per L3 desk segment.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          ffs.facility_id,
          ffs.net_income_amt AS numerator_val,
          fes.rwa_amt AS denominator_val
        FROM l2.facility_financial_snapshot ffs
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = ffs.facility_id
          AND fes.as_of_date = ffs.as_of_date
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE ffs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(net_income) / SUM(rwa) * 100.0 per L2 portfolio segment.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          ffs.facility_id,
          ffs.net_income_amt AS numerator_val,
          fes.rwa_amt AS denominator_val
        FROM l2.facility_financial_snapshot ffs
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = ffs.facility_id
          AND fes.as_of_date = ffs.as_of_date
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE ffs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(net_income) / SUM(rwa) * 100.0 per L1 business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          ffs.facility_id,
          ffs.net_income_amt AS numerator_val,
          fes.rwa_amt AS denominator_val
        FROM l2.facility_financial_snapshot ffs
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = ffs.facility_id
          AND fes.as_of_date = ffs.as_of_date
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE ffs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
depends_on: []
output:
  table: metric_result
validations:
- rule_id: CAP-002-V01
  type: NOT_NULL
  description: No null return_on_rwa_pct values
  severity: ERROR
catalogue:
  item_id: MET-098
  abbreviation: ROR
  insight: |
    Profitability relative to risk; indicates efficiency of capital deployment given risk exposure.
  rollup_strategy: weighted-avg
  primary_value_field: return_on_rwa_pct
tags:
- capital
- adequacy
dashboard_pages: []
legacy_metric_ids: []
