metric_id: CAP-003
name: Risk Weight (%)
version: 1.0.0
owner: market-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: capital
sub_domain: adequacy
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: PERCENTAGE
display_format: .2f
description: |
  Regulatory risk weight percentage assigned to the exposure under the applicable capital framework (e.g., Basel standardized or IRB). Represents the proportion of exposure considered risk-weighted for capital adequacy purposes.
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: facility_risk_snapshot
  alias: frs
  join_type: BASE
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: risk_weight_pct
    role: MEASURE
- schema: l2
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.facility_id = frs.facility_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: is_active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: RAW
    formula_text: |
      Read risk_weight_pct from facility_risk_snapshot for each facility as-of reporting date.
    formula_sql: |
      SELECT
        frs.facility_id AS dimension_key,
        frs.risk_weight_pct AS metric_value
      FROM l2.facility_risk_snapshot frs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = frs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE frs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: WEIGHTED_AVG
    formula_text: |
      Exposure-weighted average risk_weight_pct per counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        CASE WHEN SUM(fac.weight_val) = 0 THEN NULL
             ELSE SUM(fac.rate_val * fac.weight_val) / SUM(fac.weight_val)
        END AS metric_value
      FROM (
        SELECT
          frs.facility_id,
          frs.risk_weight_pct AS rate_val,
          fes.gross_exposure_usd AS weight_val
        FROM l2.facility_risk_snapshot frs
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = frs.facility_id
          AND fes.as_of_date = frs.as_of_date
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE frs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: WEIGHTED_AVG
    formula_text: |
      Exposure-weighted average risk_weight_pct per L3 desk segment.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.weight_val) = 0 THEN NULL
             ELSE SUM(fac.rate_val * fac.weight_val) / SUM(fac.weight_val)
        END AS metric_value
      FROM (
        SELECT
          frs.facility_id,
          frs.risk_weight_pct AS rate_val,
          fes.gross_exposure_usd AS weight_val
        FROM l2.facility_risk_snapshot frs
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = frs.facility_id
          AND fes.as_of_date = frs.as_of_date
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE frs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: WEIGHTED_AVG
    formula_text: |
      Exposure-weighted average risk_weight_pct per L2 portfolio segment.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.weight_val) = 0 THEN NULL
             ELSE SUM(fac.rate_val * fac.weight_val) / SUM(fac.weight_val)
        END AS metric_value
      FROM (
        SELECT
          frs.facility_id,
          frs.risk_weight_pct AS rate_val,
          fes.gross_exposure_usd AS weight_val
        FROM l2.facility_risk_snapshot frs
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = frs.facility_id
          AND fes.as_of_date = frs.as_of_date
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE frs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: WEIGHTED_AVG
    formula_text: |
      Exposure-weighted average risk_weight_pct per L1 business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.weight_val) = 0 THEN NULL
             ELSE SUM(fac.rate_val * fac.weight_val) / SUM(fac.weight_val)
        END AS metric_value
      FROM (
        SELECT
          frs.facility_id,
          frs.risk_weight_pct AS rate_val,
          fes.gross_exposure_usd AS weight_val
        FROM l2.facility_risk_snapshot frs
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = frs.facility_id
          AND fes.as_of_date = frs.as_of_date
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE frs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
depends_on: []
output:
  table: metric_result
validations:
- rule_id: CAP-003-V01
  type: NOT_NULL
  description: No null risk_weight_pct values
  severity: ERROR
catalogue:
  item_id: MET-100
  abbreviation: RW
  insight: |
    Capital intensity of exposure under regulatory frameworks; indicates how much capital must be held relative to exposure and highlights risk density across the portfolio.
  rollup_strategy: weighted-avg
  primary_value_field: risk_weight_pct
tags:
- capital
- adequacy
dashboard_pages: []
legacy_metric_ids: []
