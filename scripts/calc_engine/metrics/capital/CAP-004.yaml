# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Capital Allocated ($)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "CAP-004"
name: "Capital Allocated ($)"
version: "1.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "capital"
sub_domain: "allocation"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Capital allocated to each facility, counterparty, or business segment.
  Calculated as RWA Amount * Capital Requirement (%). At facility level,
  uses the binding RWA from facility_rwa_calc (MAX of standardized and ERBA)
  multiplied by the applicable total CET1 requirement from
  regulatory_capital_requirement. At higher levels, aggregated as SUM.
  Indicates capital adequacy, risk appetite, and capital consumption per
  exposure segment.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Capital adequacy — risk-weighted asset calculation and capital allocation"
  - framework: "CCAR/DFAST"
    description: "Capital planning — allocation of regulatory capital across portfolios"
  - framework: "FR Y-14Q"
    schedule: "H.1"
    description: "RWA and capital allocation reporting"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l3
    table: facility_rwa_calc
    alias: frc
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: rwa_std_amt
        role: MEASURE
        description: "Standardized approach RWA"
      - name: rwa_erba_amt
        role: MEASURE
        description: "Enhanced Risk-Based Approach RWA"
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = frc.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: legal_entity_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current facility record"
  - schema: l1
    table: regulatory_capital_requirement
    alias: rcr
    join_type: LEFT
    join_on: "rcr.legal_entity_id = fm.legal_entity_id AND rcr.as_of_date = frc.as_of_date AND rcr.is_current_flag = 'Y'"
    fields:
      - name: legal_entity_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: regulatory_capital_basis_id
        role: DIMENSION
        description: "Part of composite PK — may produce multiple rows per entity/date"
      - name: total_cet1_req_pct
        role: MEASURE
        description: "Total CET1 capital requirement including buffers and GSIB surcharge"
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current requirement records"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current taxonomy record"
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      For each facility: MAX(rwa_std_amt, rwa_erba_amt) from facility_rwa_calc
      * total_cet1_req_pct from regulatory_capital_requirement / 100.
      Uses the binding (higher) RWA approach.
    formula_sql: |
      SELECT
        frc.facility_id AS dimension_key,
        GREATEST(COALESCE(frc.rwa_std_amt, 0), COALESCE(frc.rwa_erba_amt, 0))
          * COALESCE(MAX(rcr.total_cet1_req_pct), 10.5) / 100.0 AS metric_value
      FROM l3.facility_rwa_calc frc
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = frc.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.regulatory_capital_requirement rcr
        ON rcr.legal_entity_id = fm.legal_entity_id
        AND rcr.as_of_date = frc.as_of_date
        AND rcr.is_current_flag = 'Y'
      WHERE frc.as_of_date = :as_of_date
      GROUP BY frc.facility_id, frc.rwa_std_amt, frc.rwa_erba_amt
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level capital allocated per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          frc.facility_id,
          GREATEST(COALESCE(frc.rwa_std_amt, 0), COALESCE(frc.rwa_erba_amt, 0))
            * COALESCE(MAX(rcr.total_cet1_req_pct), 10.5) / 100.0 AS metric_value
        FROM l3.facility_rwa_calc frc
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frc.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.regulatory_capital_requirement rcr
          ON rcr.legal_entity_id = fm.legal_entity_id
          AND rcr.as_of_date = frc.as_of_date
          AND rcr.is_current_flag = 'Y'
        WHERE frc.as_of_date = :as_of_date
        GROUP BY frc.facility_id, frc.rwa_std_amt, frc.rwa_erba_amt
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level capital allocated per L3 desk segment.
      Only includes facilities with effective_date within 365 days.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          frc.facility_id,
          GREATEST(COALESCE(frc.rwa_std_amt, 0), COALESCE(frc.rwa_erba_amt, 0))
            * COALESCE(MAX(rcr.total_cet1_req_pct), 10.5) / 100.0 AS metric_value
        FROM l3.facility_rwa_calc frc
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frc.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.regulatory_capital_requirement rcr
          ON rcr.legal_entity_id = fm.legal_entity_id
          AND rcr.as_of_date = frc.as_of_date
          AND rcr.is_current_flag = 'Y'
        WHERE frc.as_of_date = :as_of_date
        GROUP BY frc.facility_id, frc.rwa_std_amt, frc.rwa_erba_amt
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level capital allocated per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          frc.facility_id,
          GREATEST(COALESCE(frc.rwa_std_amt, 0), COALESCE(frc.rwa_erba_amt, 0))
            * COALESCE(MAX(rcr.total_cet1_req_pct), 10.5) / 100.0 AS metric_value
        FROM l3.facility_rwa_calc frc
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frc.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.regulatory_capital_requirement rcr
          ON rcr.legal_entity_id = fm.legal_entity_id
          AND rcr.as_of_date = frc.as_of_date
          AND rcr.is_current_flag = 'Y'
        WHERE frc.as_of_date = :as_of_date
        GROUP BY frc.facility_id, frc.rwa_std_amt, frc.rwa_erba_amt
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level capital allocated per L1 business segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          frc.facility_id,
          GREATEST(COALESCE(frc.rwa_std_amt, 0), COALESCE(frc.rwa_erba_amt, 0))
            * COALESCE(MAX(rcr.total_cet1_req_pct), 10.5) / 100.0 AS metric_value
        FROM l3.facility_rwa_calc frc
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frc.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.regulatory_capital_requirement rcr
          ON rcr.legal_entity_id = fm.legal_entity_id
          AND rcr.as_of_date = frc.as_of_date
          AND rcr.is_current_flag = 'Y'
        WHERE frc.as_of_date = :as_of_date
        GROUP BY frc.facility_id, frc.rwa_std_amt, frc.rwa_erba_amt
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on:
  - "CAP-003"   # Risk Weight (%) — prerequisite for RWA
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "CAP-004-V01"
    type: NOT_NULL
    description: "No null capital allocated values for active facilities with RWA"
    severity: ERROR
  - rule_id: "CAP-004-V02"
    type: NON_NEGATIVE
    description: "Capital allocated must be >= 0"
    severity: ERROR
  - rule_id: "CAP-004-V03"
    type: RECONCILIATION
    description: "SUM(facility) must reconcile to SUM(business_segment)"
    severity: ERROR
    params:
      levels_to_compare: ["facility", "business_segment"]
      tolerance_pct: 0.01
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-110"
  abbreviation: "CAPALLOC"
  insight: >
    Capital adequacy and risk appetite — shows how much regulatory capital
    is consumed per facility/segment. Rising capital allocation signals
    increasing risk density. Compare against revenue to assess RORC
    (Return on Regulatory Capital).
  rollup_strategy: "direct-sum"
  primary_value_field: "allocated_amount_usd"
# ── METADATA ──────────────────────────────────────────────────
tags: ["capital", "allocation", "rwa", "regulatory"]
dashboard_pages: []
legacy_metric_ids: []
