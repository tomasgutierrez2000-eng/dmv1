# IDENTIFICATION
metric_id: "CR-002"
name: "Loan-to-Value Ratio"
version: "1.0.0"
owner: "credit-risk-analytics"
status: ACTIVE
effective_date: "2026-01-01"

# CLASSIFICATION
domain: "credit_risk"
sub_domain: "collateral_coverage"
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: PERCENTAGE
display_format: ".1f"
description: >
  Ratio of committed facility amount to collateral valuation, expressed
  as a percentage. Measures collateral coverage — values above 100%
  indicate under-collateralization. Core CRE and secured lending KPI.

# REGULATORY REFERENCES
regulatory_references:
  - framework: "FR Y-14Q"
    schedule: "H.2"
    description: "CRE loan LTV reporting"
  - framework: "Basel III"
    section: "CRE 20.73"
    description: "Collateral valuation and LTV thresholds"

# SOURCE TABLES
source_tables:
  - schema: l1
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: committed_facility_amt
        role: MEASURE
        description: "Total committed facility amount — LTV numerator"
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
  - schema: l2
    table: collateral_snapshot
    alias: cs
    join_type: INNER
    join_on: "cs.facility_id = fm.facility_id"
    fields:
      - name: current_valuation_usd
        role: MEASURE
        description: "Current collateral valuation — LTV denominator (aggregated per facility)"
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
  - schema: l1
    table: counterparty
    alias: cp
    join_type: INNER
    join_on: "cp.counterparty_id = fm.counterparty_id"
    fields:
      - name: legal_name
        role: DIMENSION
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: INNER
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: segment_name
        role: DIMENSION

# LEVEL FORMULAS
levels:
  facility:
    aggregation_type: RAW
    formula_text: "committed_facility_amt / SUM(current_valuation_usd) * 100 per facility"
    formula_sql: |
      SELECT
        fm.facility_id::TEXT AS dimension_key,
        fm.facility_name AS dimension_label,
        CASE WHEN SUM(cs.current_valuation_usd) > 0
             THEN fm.committed_facility_amt / SUM(cs.current_valuation_usd) * 100
             ELSE NULL END AS metric_value
      FROM l1.facility_master fm
      INNER JOIN l2.collateral_snapshot cs
        ON cs.facility_id = fm.facility_id
        AND cs.as_of_date = :as_of_date
      GROUP BY fm.facility_id, fm.facility_name, fm.committed_facility_amt

  counterparty:
    aggregation_type: CUSTOM
    formula_text: "SUM(committed_facility_amt) / SUM(current_valuation_usd) * 100 per counterparty"
    formula_sql: |
      SELECT
        fm.counterparty_id::TEXT AS dimension_key,
        cp.legal_name AS dimension_label,
        CASE WHEN SUM(cs.current_valuation_usd) > 0
             THEN SUM(fm.committed_facility_amt) / SUM(cs.current_valuation_usd) * 100
             ELSE NULL END AS metric_value
      FROM l1.facility_master fm
      INNER JOIN l2.collateral_snapshot cs
        ON cs.facility_id = fm.facility_id
        AND cs.as_of_date = :as_of_date
      INNER JOIN l1.counterparty cp ON cp.counterparty_id = fm.counterparty_id
      GROUP BY fm.counterparty_id, cp.legal_name

  desk:
    aggregation_type: CUSTOM
    formula_text: "SUM(committed_facility_amt) / SUM(current_valuation_usd) * 100 per desk"
    formula_sql: |
      SELECT
        ebt_desk.managed_segment_id::TEXT AS dimension_key,
        ebt_desk.segment_name AS dimension_label,
        CASE WHEN SUM(cs.current_valuation_usd) > 0
             THEN SUM(fm.committed_facility_amt) / SUM(cs.current_valuation_usd) * 100
             ELSE NULL END AS metric_value
      FROM l1.facility_master fm
      INNER JOIN l2.collateral_snapshot cs
        ON cs.facility_id = fm.facility_id
        AND cs.as_of_date = :as_of_date
      INNER JOIN l1.enterprise_business_taxonomy ebt_desk
        ON ebt_desk.managed_segment_id = fm.lob_segment_id
        AND ebt_desk.tree_level = 3
      GROUP BY ebt_desk.managed_segment_id, ebt_desk.segment_name

  portfolio:
    aggregation_type: CUSTOM
    formula_text: "SUM(committed) / SUM(collateral) * 100 rollup from desk level via parent_segment_id"
    formula_sql: |
      SELECT
        ebt_port.managed_segment_id::TEXT AS dimension_key,
        ebt_port.segment_name AS dimension_label,
        SUM(CASE WHEN sub.collateral_total > 0
                 THEN sub.committed_total / sub.collateral_total * 100
                 ELSE 0 END) AS metric_value
      FROM (
        SELECT fm.lob_segment_id,
               SUM(fm.committed_facility_amt) AS committed_total,
               SUM(cs.current_valuation_usd) AS collateral_total
        FROM l1.facility_master fm
        INNER JOIN l2.collateral_snapshot cs
          ON cs.facility_id = fm.facility_id AND cs.as_of_date = :as_of_date
        GROUP BY fm.lob_segment_id
      ) sub
      INNER JOIN l1.enterprise_business_taxonomy ebt_desk
        ON ebt_desk.managed_segment_id = sub.lob_segment_id
      INNER JOIN l1.enterprise_business_taxonomy ebt_port
        ON ebt_port.managed_segment_id = ebt_desk.parent_segment_id
        AND ebt_port.tree_level = 2
      GROUP BY ebt_port.managed_segment_id, ebt_port.segment_name

  business_segment:
    aggregation_type: CUSTOM
    formula_text: "SUM(committed) / SUM(collateral) * 100 rollup from portfolio level via parent_segment_id"
    formula_sql: |
      SELECT
        ebt_bseg.managed_segment_id::TEXT AS dimension_key,
        ebt_bseg.segment_name AS dimension_label,
        SUM(CASE WHEN sub.collateral_total > 0
                 THEN sub.committed_total / sub.collateral_total * 100
                 ELSE 0 END) AS metric_value
      FROM (
        SELECT fm.lob_segment_id,
               SUM(fm.committed_facility_amt) AS committed_total,
               SUM(cs.current_valuation_usd) AS collateral_total
        FROM l1.facility_master fm
        INNER JOIN l2.collateral_snapshot cs
          ON cs.facility_id = fm.facility_id AND cs.as_of_date = :as_of_date
        GROUP BY fm.lob_segment_id
      ) sub
      INNER JOIN l1.enterprise_business_taxonomy ebt_desk
        ON ebt_desk.managed_segment_id = sub.lob_segment_id
      INNER JOIN l1.enterprise_business_taxonomy ebt_port
        ON ebt_port.managed_segment_id = ebt_desk.parent_segment_id
      INNER JOIN l1.enterprise_business_taxonomy ebt_bseg
        ON ebt_bseg.managed_segment_id = ebt_port.parent_segment_id
        AND ebt_bseg.tree_level = 1
      GROUP BY ebt_bseg.managed_segment_id, ebt_bseg.segment_name

# DEPENDENCIES
depends_on: []

# OUTPUT
output:
  table: metric_result

# VALIDATION
validations:
  - rule_id: "CR-002-V01"
    type: NOT_NULL
    severity: ERROR
    description: "No null LTV values"
  - rule_id: "CR-002-V02"
    type: NON_NEGATIVE
    severity: ERROR
    description: "LTV must be non-negative"

tags: [gsib, ccar, credit_risk, collateral]
dashboard_pages: [P3]
legacy_metric_ids: [C005]
