# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Current Collateral Market Value (Bank's Share)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ──────────────────────────────────────────
metric_id: "EXP-001"
name: "Current Collateral Market Value"
version: "1.1.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ──────────────────────────────────────────
domain: "exposure"
sub_domain: "collateral"
metric_class: CALCULATED
direction: HIGHER_BETTER
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Current market value of all pledged collateral securing a credit exposure,
  denominated in USD, reflecting the bank's proportionate share (bank_share_pct).
  At the facility level, aggregates current_valuation_usd across all collateral
  positions linked to the facility, weighted by the bank's participation percentage
  from the current lender allocation record. At higher rollup levels (counterparty,
  desk, portfolio, business segment), values are summed consistently using the same
  bank-share-weighted facility amounts, ensuring cross-level reconciliation.
  NOTE: This metric reports raw market value, not haircut-adjusted recognised value
  per Basel III CRE22 comprehensive approach. For regulatory CRM recognition, apply
  haircut_pct from collateral_snapshot.
  Data element: current_valuation_usd. Sourced from L2 Atomic Layer (collateral_snapshot).
# ── REGULATORY REFERENCES ───────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    section: "CRE22"
    description: "Credit Risk Mitigation — collateral market value input to comprehensive approach (pre-haircut)"
  - framework: "FR Y-14Q"
    schedule: "G"
    description: "Schedule G — Collateral details and valuation"
# ── SOURCE TABLES ───────────────────────────────────────────
source_tables:
  - schema: l2
    table: collateral_snapshot
    alias: cs
    join_type: BASE
    fields:
      - name: collateral_asset_id
        role: JOIN_KEY
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: current_valuation_usd
        role: MEASURE
        description: "Current market value of the collateral asset in USD"
  - schema: l1
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = cs.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: active_flag
        role: FILTER
  - schema: l1
    table: facility_lender_allocation
    alias: fla
    join_type: LEFT
    join_on: "fla.facility_id = fm.facility_id AND fla.is_current_flag = 'Y'"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: bank_share_pct
        role: MEASURE
        description: "Bank's participation percentage from current allocation record"
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current allocation row to prevent double-counting"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ──────────────────────────────────────────
# All levels apply bank_share_pct consistently for cross-level reconciliation.
# COALESCE(bank_share_pct, 100.0) assumes 100% bank ownership when no allocation exists.
# is_current_flag = 'Y' on facility_lender_allocation prevents SCD double-counting.
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      For each active facility, SUM current_valuation_usd across all collateral
      positions, weighted by the bank's current participation share.
      Formula: SUM(current_valuation_usd) * COALESCE(bank_share_pct, 100) / 100.
    formula_sql: |
      SELECT
        cs.facility_id                                              AS dimension_key,
        SUM(cs.current_valuation_usd)
          * COALESCE(fla.bank_share_pct, 100.0) / 100.0            AS metric_value
      FROM l2.collateral_snapshot cs
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = cs.facility_id
       AND fm.active_flag = 'Y'
      LEFT JOIN l1.facility_lender_allocation fla
        ON fla.facility_id = cs.facility_id
       AND fla.is_current_flag = 'Y'
      WHERE cs.as_of_date = :as_of_date
      GROUP BY cs.facility_id, fla.bank_share_pct
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of bank-share-weighted facility collateral values per counterparty.
      Formula: SUM(facility_collateral_mv * COALESCE(bank_share_pct, 100) / 100)
      grouped by counterparty_id.
    formula_sql: |
      SELECT
        fm.counterparty_id                                          AS dimension_key,
        SUM(
          fac_coll.facility_collateral_mv
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0
        )                                                           AS metric_value
      FROM l1.facility_master fm
      INNER JOIN (
        SELECT
          cs_inner.facility_id,
          SUM(cs_inner.current_valuation_usd) AS facility_collateral_mv
        FROM l2.collateral_snapshot cs_inner
        WHERE cs_inner.as_of_date = :as_of_date
        GROUP BY cs_inner.facility_id
      ) fac_coll
        ON fac_coll.facility_id = fm.facility_id
      LEFT JOIN l1.facility_lender_allocation fla
        ON fla.facility_id = fm.facility_id
       AND fla.is_current_flag = 'Y'
      WHERE fm.active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of bank-share-weighted facility collateral values per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id                                      AS dimension_key,
        SUM(
          fac_coll.facility_collateral_mv
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0
        )                                                           AS metric_value
      FROM l1.facility_master fm
      INNER JOIN (
        SELECT
          cs_inner.facility_id,
          SUM(cs_inner.current_valuation_usd) AS facility_collateral_mv
        FROM l2.collateral_snapshot cs_inner
        WHERE cs_inner.as_of_date = :as_of_date
        GROUP BY cs_inner.facility_id
      ) fac_coll
        ON fac_coll.facility_id = fm.facility_id
      LEFT JOIN l1.facility_lender_allocation fla
        ON fla.facility_id = fm.facility_id
       AND fla.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      WHERE fm.active_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of bank-share-weighted facility collateral values per L2 portfolio segment.
      Traverses enterprise_business_taxonomy: L3 desk → L2 portfolio (parent_segment_id).
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id                                   AS dimension_key,
        SUM(
          fac_coll.facility_collateral_mv
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0
        )                                                           AS metric_value
      FROM l1.facility_master fm
      INNER JOIN (
        SELECT
          cs_inner.facility_id,
          SUM(cs_inner.current_valuation_usd) AS facility_collateral_mv
        FROM l2.collateral_snapshot cs_inner
        WHERE cs_inner.as_of_date = :as_of_date
        GROUP BY cs_inner.facility_id
      ) fac_coll
        ON fac_coll.facility_id = fm.facility_id
      LEFT JOIN l1.facility_lender_allocation fla
        ON fla.facility_id = fm.facility_id
       AND fla.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      WHERE fm.active_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of bank-share-weighted facility collateral values per L1 business segment.
      Traverses enterprise_business_taxonomy: L3 desk → L2 portfolio → L1 segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id                                   AS dimension_key,
        SUM(
          fac_coll.facility_collateral_mv
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0
        )                                                           AS metric_value
      FROM l1.facility_master fm
      INNER JOIN (
        SELECT
          cs_inner.facility_id,
          SUM(cs_inner.current_valuation_usd) AS facility_collateral_mv
        FROM l2.collateral_snapshot cs_inner
        WHERE cs_inner.as_of_date = :as_of_date
        GROUP BY cs_inner.facility_id
      ) fac_coll
        ON fac_coll.facility_id = fm.facility_id
      LEFT JOIN l1.facility_lender_allocation fla
        ON fla.facility_id = fm.facility_id
       AND fla.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      WHERE fm.active_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ────────────────────────────────────────────
depends_on: []
# ── OUTPUT ──────────────────────────────────────────────────
output:
  table: metric_result
  additional_tables:
    - schema: l3
      table: exposure_metric_cube
      column: net_exposure_amt      # collateral MV informs net exposure derivation
# ── VALIDATION RULES ────────────────────────────────────────
validations:
  - rule_id: "EXP-001-V01"
    type: NOT_NULL
    description: "Facility-level collateral market value must not be null for active facilities with linked collateral"
    severity: ERROR
  - rule_id: "EXP-001-V02"
    type: NON_NEGATIVE
    description: "Collateral market value must be >= 0 at all levels"
    severity: ERROR
  - rule_id: "EXP-001-V03"
    type: RECONCILIATION
    description: >
      Sum of facility-level values must reconcile to counterparty, desk, portfolio,
      and business_segment totals. All levels now use consistent bank-share weighting.
    severity: ERROR
    params:
      levels_to_compare: [facility, counterparty, desk, portfolio, business_segment]
      tolerance_pct: 0.01
  - rule_id: "EXP-001-V04"
    type: PERIOD_OVER_PERIOD
    description: "Flag total collateral market value changes greater than 15% vs prior period — may indicate revaluation event or data issue"
    severity: WARNING
    params:
      max_change_pct: 15.0
  - rule_id: "EXP-001-V05"
    type: THRESHOLD
    description: "Flag any single facility where collateral MV exceeds committed facility amount by more than 200% (potential data integrity issue)"
    severity: WARNING
    params:
      max_value: 999999999999        # sentinel — enforced via custom cross-metric comparison
# ── CATALOGUE ───────────────────────────────────────────────
catalogue:
  item_id: "MET-011"
  abbreviation: "COLL-MV"
  insight: >
    Shows the bank's share of current collateral market value securing the portfolio.
    A declining trend indicates collateral erosion — increasing uncovered exposure.
    Compare against gross exposure (EXP-002) to derive a real-time collateral
    coverage ratio. Critical input for LGD estimation and recovery projections.
  rollup_strategy: "direct-sum"
  primary_value_field: "current_valuation_usd"
# ── METADATA ────────────────────────────────────────────────
tags:
  - "collateral"
  - "exposure"
  - "credit-risk-mitigation"
  - "recovery"
  - "secured-lending"
  - "lgd"
dashboard_pages:
  - "P1"
  - "P3"
legacy_metric_ids: []
