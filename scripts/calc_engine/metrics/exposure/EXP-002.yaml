# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Cashflow ($)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-002"
name: "Cashflow ($)"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Operating cash flow generated by borrower in USD. Primary indicator
  of repayment capacity. At facility level, equals Interest Income adjusted
  for Bank Share. At counterparty level, uses LOB-conditional logic:
  CRE borrowers use Net Operating Income (NOI), all other LOBs use EBITDA.
  At desk/portfolio/segment levels, aggregates facility-level interest income
  with bank share.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Cashflow analysis for repayment capacity assessment"
  - framework: "FR Y-14Q"
    schedule: "H.1"
    description: "Borrower financial data — income and cash flow metrics"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_profitability_snapshot
    alias: fprs
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: interest_income_amt
        role: MEASURE
        description: "Facility-level interest income"
  - schema: l2
    table: facility_financial_snapshot
    alias: ffs
    join_type: LEFT
    join_on: "ffs.facility_id = fprs.facility_id AND ffs.as_of_date = fprs.as_of_date"
    fields:
      - name: noi_amt
        role: MEASURE
        description: "Net Operating Income — used for CRE counterparty cashflow"
      - name: ebitda_amt
        role: MEASURE
        description: "EBITDA — used for non-CRE counterparty cashflow"
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fprs.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current facility record"
  - schema: l2
    table: facility_lender_allocation
    alias: fla
    join_type: LEFT
    join_on: "fla.facility_id = fm.facility_id AND fla.is_current_flag = 'Y'"
    fields:
      - name: bank_share_pct
        role: MEASURE
        description: "Bank's participation share for bank-share-adjusted interest income"
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = fprs.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = fprs.as_of_date"
    fields:
      - name: from_currency_code
        role: JOIN_KEY
      - name: to_currency_code
        role: FILTER
      - name: rate
        role: MEASURE
        description: "FX spot rate to convert local currency amounts to USD"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: description
        role: FILTER
        description: "LOB description — used to identify CRE vs other LOBs"
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current taxonomy record"
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      [Facility Cashflow] == [Facility Interest Income w/ Bank Share].
      For each active facility: interest_income_amt * bank_share_pct / 100.
    formula_sql: |
      SELECT
        fprs.facility_id AS dimension_key,
        fprs.interest_income_amt
          * COALESCE(fx.rate, 1)
          * COALESCE(fla.bank_share_pct, 100.0) / 100.0 AS metric_value
      FROM l2.facility_profitability_snapshot fprs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fprs.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l2.facility_lender_allocation fla
        ON fla.facility_id = fprs.facility_id
        AND fla.is_current_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = fprs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = fprs.as_of_date
      WHERE fprs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: CUSTOM
    formula_text: >
      LOB-conditional counterparty cashflow:
      WHEN L1 LOB = 'Commercial Real Estate' THEN SUM(noi_amt) per counterparty.
      WHEN L1 LOB <> 'Commercial Real Estate' AND <> 'Project Finance'
      THEN SUM(ebitda_amt) per counterparty.
      Sources NOI from facility_financial_snapshot.noi_amt,
      EBITDA from facility_financial_snapshot.ebitda_amt.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(
          CASE
            WHEN ebt_l1.description ILIKE '%Commercial Real Estate%'
              THEN COALESCE(ffs.noi_amt, 0) * COALESCE(fx.rate, 1)
            ELSE COALESCE(ffs.ebitda_amt, 0) * COALESCE(fx.rate, 1)
          END
        ) AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level interest income (bank-share-adjusted) per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fprs.facility_id AS dimension_key,
          fprs.interest_income_amt
            * COALESCE(fx.rate, 1)
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0 AS metric_value
        FROM l2.facility_profitability_snapshot fprs
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fprs.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fprs.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fprs.as_of_date
        WHERE fprs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level interest income (bank-share-adjusted) per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fprs.facility_id AS dimension_key,
          fprs.interest_income_amt
            * COALESCE(fx.rate, 1)
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0 AS metric_value
        FROM l2.facility_profitability_snapshot fprs
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fprs.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fprs.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fprs.as_of_date
        WHERE fprs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level interest income (bank-share-adjusted) per L1 business segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fprs.facility_id AS dimension_key,
          fprs.interest_income_amt
            * COALESCE(fx.rate, 1)
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0 AS metric_value
        FROM l2.facility_profitability_snapshot fprs
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fprs.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fprs.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fprs.as_of_date
        WHERE fprs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-002-V01"
    type: NOT_NULL
    description: "No null cashflow values for active facilities with profitability data"
    severity: ERROR
  - rule_id: "EXP-002-V02"
    type: NON_NEGATIVE
    description: "Interest income cashflow must be >= 0"
    severity: WARNING
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-010"
  abbreviation: "CF"
  insight: >
    Liquidity / serviceability — measures borrower repayment capacity.
    At facility level, reflects bank's interest income. At counterparty level,
    uses LOB-appropriate cashflow (NOI for CRE, EBITDA for others).
  rollup_strategy: "direct-sum"
  primary_value_field: "cashflow_amt"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "cashflow", "repayment-capacity"]
dashboard_pages: []
legacy_metric_ids: []
