# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Cost of Funds ($)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-005"
name: "Cost of Funds ($)"
version: "2.1.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  The portion of total funding-related expense attributed to a specific
  exposure or portfolio. At facility level, calculated as SUM across all
  positions of (funded_amount * interest_rate), converted to USD via FX
  rate and adjusted for bank share. At counterparty level, further adjusted
  by counterparty participation_pct. At desk/portfolio/segment levels,
  aggregated as SUM via EBT hierarchy.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Funding cost allocation for NII projection"
  - framework: "FR Y-14Q"
    schedule: "H.1"
    description: "Transfer pricing and funding cost attribution"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: position
    alias: pos
    join_type: BASE
    fields:
      - name: position_id
        role: JOIN_KEY
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: currency_code
        role: JOIN_KEY
        description: "Position currency for FX conversion"
  - schema: l2
    table: position_detail
    alias: pd
    join_type: INNER
    join_on: "pd.position_id = pos.position_id"
    fields:
      - name: funded_amount
        role: MEASURE
        description: "Utilized balance per position"
      - name: interest_rate
        role: MEASURE
        description: "Funding rate per position (decimal, e.g. 0.05 = 5%)"
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = pos.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current facility record"
  - schema: l2
    table: facility_lender_allocation
    alias: fla
    join_type: LEFT
    join_on: "fla.facility_id = fm.facility_id AND fla.is_current_flag = 'Y'"
    fields:
      - name: bank_share_pct
        role: MEASURE
        description: "Bank's participation share of the facility"
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = pos.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = pos.as_of_date"
    fields:
      - name: from_currency_code
        role: JOIN_KEY
      - name: to_currency_code
        role: FILTER
      - name: rate
        role: MEASURE
        description: "FX spot rate to convert local currency amounts to USD"
  - schema: l2
    table: facility_counterparty_participation
    alias: fcp
    join_type: LEFT
    join_on: "fcp.facility_id = fm.facility_id AND fcp.is_current_flag = 'Y'"
    fields:
      - name: counterparty_id
        role: DIMENSION
      - name: participation_pct
        role: MEASURE
        description: "Counterparty participation percentage (0-100 scale)"
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current participation row"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current taxonomy record"
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      For each position under the facility, compute funded_amount x interest_rate,
      convert to USD using the FX spot rate (defaults to 1.0 for USD positions).
      Sum across all positions, then multiply by the bank's share percentage.
      Result = annual cost of funds for this facility in USD.
    formula_sql: |
      SELECT
        pos.facility_id AS dimension_key,
        SUM(pd.funded_amount * COALESCE(fx.rate, 1) * pd.interest_rate)
          * COALESCE(MAX(fla.bank_share_pct), 100.0) / 100.0 AS metric_value
      FROM l2.position_detail pd
      INNER JOIN l2.position pos
        ON pos.position_id = pd.position_id
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = pos.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l2.facility_lender_allocation fla
        ON fla.facility_id = pos.facility_id
        AND fla.is_current_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = pos.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = pos.as_of_date
      WHERE pos.as_of_date = :as_of_date
      GROUP BY pos.facility_id
  counterparty:
    aggregation_type: SUM
    formula_text: >
      Sum each facility's cost of funds (USD, bank-share-adjusted), then weight
      by the counterparty's participation percentage. Aggregates across all
      facilities where the counterparty has a current participation record.
    formula_sql: |
      SELECT
        fcp.counterparty_id AS dimension_key,
        SUM(fac.metric_value * COALESCE(fcp.participation_pct, 100.0) / 100.0) AS metric_value
      FROM (
        SELECT
          pos.facility_id,
          SUM(pd.funded_amount * COALESCE(fx.rate, 1) * pd.interest_rate)
            * COALESCE(MAX(fla.bank_share_pct), 100.0) / 100.0 AS metric_value
        FROM l2.position_detail pd
        INNER JOIN l2.position pos
          ON pos.position_id = pd.position_id
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = pos.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = pos.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = pos.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = pos.as_of_date
        WHERE pos.as_of_date = :as_of_date
        GROUP BY pos.facility_id
      ) fac
      INNER JOIN l2.facility_counterparty_participation fcp
        ON fcp.facility_id = fac.facility_id
        AND fcp.is_current_flag = 'Y'
      GROUP BY fcp.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      Sum of facility-level cost of funds (USD, bank-share-adjusted) for all
      facilities assigned to each L3 desk segment in the organizational hierarchy.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pos.facility_id,
          SUM(pd.funded_amount * COALESCE(fx.rate, 1) * pd.interest_rate)
            * COALESCE(MAX(fla.bank_share_pct), 100.0) / 100.0 AS metric_value
        FROM l2.position_detail pd
        INNER JOIN l2.position pos
          ON pos.position_id = pd.position_id
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = pos.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = pos.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = pos.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = pos.as_of_date
        WHERE pos.as_of_date = :as_of_date
        GROUP BY pos.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      Sum of facility-level cost of funds (USD, bank-share-adjusted) for all
      facilities within each L2 portfolio segment, traversing the EBT hierarchy
      from desk (L3) to portfolio (L2) via parent_segment_id.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pos.facility_id,
          SUM(pd.funded_amount * COALESCE(fx.rate, 1) * pd.interest_rate)
            * COALESCE(MAX(fla.bank_share_pct), 100.0) / 100.0 AS metric_value
        FROM l2.position_detail pd
        INNER JOIN l2.position pos
          ON pos.position_id = pd.position_id
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = pos.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = pos.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = pos.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = pos.as_of_date
        WHERE pos.as_of_date = :as_of_date
        GROUP BY pos.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      Sum of facility-level cost of funds (USD, bank-share-adjusted) for all
      facilities within each L1 business segment, traversing the full EBT
      hierarchy from desk (L3) through portfolio (L2) to segment (L1).
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pos.facility_id,
          SUM(pd.funded_amount * COALESCE(fx.rate, 1) * pd.interest_rate)
            * COALESCE(MAX(fla.bank_share_pct), 100.0) / 100.0 AS metric_value
        FROM l2.position_detail pd
        INNER JOIN l2.position pos
          ON pos.position_id = pd.position_id
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = pos.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = pos.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = pos.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = pos.as_of_date
        WHERE pos.as_of_date = :as_of_date
        GROUP BY pos.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-005-V01"
    type: NOT_NULL
    description: "No null cost of funds values for active facilities with positions"
    severity: ERROR
  - rule_id: "EXP-005-V02"
    type: NON_NEGATIVE
    description: "Cost of funds must be >= 0"
    severity: ERROR
  - rule_id: "EXP-005-V03"
    type: RECONCILIATION
    description: "SUM(facility) must reconcile to SUM(business_segment)"
    severity: ERROR
    params:
      levels_to_compare: ["facility", "business_segment"]
      tolerance_pct: 0.01
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-013"
  abbreviation: "COF"
  insight: >
    Cost of financing — total funding expense attributed to exposures.
    Rising cost of funds compresses net interest margin. Compare against
    interest income to assess profitability.
  rollup_strategy: "direct-sum"
  primary_value_field: "cost_of_funds_amt"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "funding", "transfer-pricing"]
dashboard_pages: []
legacy_metric_ids: []
