# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Counterparty Share or Allocation (%)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-006"
name: "Counterparty Share or Allocation (%)"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: SOURCED
direction: NEUTRAL
unit_type: PERCENTAGE
display_format: ".2f"
description: >
  Counterparty participation share in a facility — the percentage of a
  syndicated or participated facility allocated to a specific counterparty.
  At facility level, direct lookup from facility_counterparty_participation.
  At counterparty level, exposure-weighted average participation across all
  facilities. At desk/portfolio/segment, exposure-weighted average via EBT
  hierarchy. Key concentration KPI for Large Exposures Framework (LEX) and
  Single Counterparty Credit Limit (SCCL) compliance.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    section: "LEX"
    description: "Large Exposures Framework — counterparty concentration limits"
  - framework: "FR Y-14Q"
    schedule: "H.2"
    description: "Counterparty credit risk — participation and syndication shares"
  - framework: "12 CFR 252.72"
    description: "Single Counterparty Credit Limit (SCCL) rule"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_counterparty_participation
    alias: fcp
    join_type: BASE
    fields:
      - name: facility_participation_id
        role: JOIN_KEY
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: participation_pct
        role: MEASURE
        description: "Counterparty participation percentage (0-100 scale)"
      - name: is_primary_flag
        role: FILTER
        description: "Primary counterparty flag"
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current participation row"
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fcp.facility_id AND fm.is_active_flag = 'Y' AND fm.is_current_flag = 'Y'"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
  - schema: l2
    table: facility_exposure_snapshot
    alias: fes
    join_type: LEFT
    join_on: "fes.facility_id = fm.facility_id AND fes.as_of_date = :as_of_date"
    fields:
      - name: drawn_amount
        role: MEASURE
        description: "Exposure weight for weighted-average participation"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current taxonomy record"
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of participation_pct from facility_counterparty_participation
      for the primary counterparty on each facility. Uses current records only.
    formula_sql: |
      SELECT
        fcp.facility_id AS dimension_key,
        fcp.participation_pct AS metric_value
      FROM l2.facility_counterparty_participation fcp
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fcp.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      WHERE fcp.is_current_flag = 'Y'
        AND fcp.is_primary_flag = 'Y'
  counterparty:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Exposure-weighted average participation across all facilities for each
      counterparty. Weight = drawn_amount from facility_exposure_snapshot.
      Falls back to simple average if no exposure data available.
    formula_sql: |
      SELECT
        fcp.counterparty_id AS dimension_key,
        SUM(fcp.participation_pct * COALESCE(fes.drawn_amount, 0))
          / NULLIF(SUM(COALESCE(fes.drawn_amount, 0)), 0) AS metric_value
      FROM l2.facility_counterparty_participation fcp
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fcp.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l2.facility_exposure_snapshot fes
        ON fes.facility_id = fcp.facility_id
        AND fes.as_of_date = :as_of_date
      WHERE fcp.is_current_flag = 'Y'
      GROUP BY fcp.counterparty_id
  desk:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Exposure-weighted average participation across all facilities per L3 desk
      segment via enterprise_business_taxonomy.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fcp.participation_pct * COALESCE(fes.drawn_amount, 0))
          / NULLIF(SUM(COALESCE(fes.drawn_amount, 0)), 0) AS metric_value
      FROM l2.facility_counterparty_participation fcp
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fcp.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l2.facility_exposure_snapshot fes
        ON fes.facility_id = fcp.facility_id
        AND fes.as_of_date = :as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      WHERE fcp.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Exposure-weighted average participation across all facilities per L2 portfolio
      segment via enterprise_business_taxonomy hierarchy traversal.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fcp.participation_pct * COALESCE(fes.drawn_amount, 0))
          / NULLIF(SUM(COALESCE(fes.drawn_amount, 0)), 0) AS metric_value
      FROM l2.facility_counterparty_participation fcp
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fcp.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l2.facility_exposure_snapshot fes
        ON fes.facility_id = fcp.facility_id
        AND fes.as_of_date = :as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      WHERE fcp.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Exposure-weighted average participation across all facilities per L1 business
      segment via enterprise_business_taxonomy hierarchy traversal.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fcp.participation_pct * COALESCE(fes.drawn_amount, 0))
          / NULLIF(SUM(COALESCE(fes.drawn_amount, 0)), 0) AS metric_value
      FROM l2.facility_counterparty_participation fcp
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fcp.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l2.facility_exposure_snapshot fes
        ON fes.facility_id = fcp.facility_id
        AND fes.as_of_date = :as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      WHERE fcp.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-006-V01"
    type: NOT_NULL
    description: "No null participation_pct values for active facilities"
    severity: ERROR
  - rule_id: "EXP-006-V02"
    type: THRESHOLD
    description: "Participation percentage must be between 0 and 100"
    severity: ERROR
    params:
      min: 0
      max: 100
  - rule_id: "EXP-006-V03"
    type: NON_NEGATIVE
    description: "Participation percentage must be >= 0"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-014"
  abbreviation: "CSOA"
  insight: >
    Counterparty participation share — measures syndication/participation
    concentration. High single-counterparty shares indicate concentration risk
    under Basel III LEX and SCCL. Monitor for counterparties exceeding
    regulatory thresholds (25% of Tier 1 capital for non-GSIBs, 15% for GSIBs).
  rollup_strategy: "weighted-avg"
  primary_value_field: "participation_pct"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "concentration", "syndication", "participation"]
dashboard_pages: []
legacy_metric_ids: []
