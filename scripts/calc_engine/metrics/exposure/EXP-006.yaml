# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Counterparty Share or Allocation (%)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-006"
name: "Counterparty Share or Allocation (%)"
version: "1.0.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: SOURCED
direction: NEUTRAL
unit_type: PERCENTAGE
display_format: ".2f"
description: >
  Exposure allocated to specific counterparty representing their share of the
  facility which the client can draw on. Concentration KPI measuring obligor
  dependency risk.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l1
    table: facility_counterparty_participation
    alias: fcp
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: allocation_pct
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of allocation_pct from facility_counterparty_participation.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        fcp.allocation_pct AS metric_value
      FROM l1.facility_master fm
      INNER JOIN l1.facility_counterparty_participation fcp
        ON fcp.facility_id = fm.facility_id
      WHERE fm.is_active_flag = 'Y'
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Read allocation_pct per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        fcp.allocation_pct AS metric_value
      FROM l1.facility_counterparty_participation fcp
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fcp.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE fcp.as_of_date = :as_of_date
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level allocation_pct per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          fcp.allocation_pct AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.facility_counterparty_participation fcp
          ON fcp.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level allocation_pct per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          fcp.allocation_pct AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.facility_counterparty_participation fcp
          ON fcp.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level allocation_pct per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          fcp.allocation_pct AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.facility_counterparty_participation fcp
          ON fcp.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-006-V01"
    type: NOT_NULL
    description: "No null allocation_pct values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-014"
  abbreviation: "CSOA"
  insight: >
    Concentration risk identification
  rollup_strategy: "weighted-avg"
  primary_value_field: "allocation_pct"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics"]
dashboard_pages: []
legacy_metric_ids: []
