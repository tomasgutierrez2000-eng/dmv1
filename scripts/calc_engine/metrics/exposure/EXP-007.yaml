metric_id: EXP-007
name: Criticized Portfolios
version: 1.0.0
owner: credit-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: exposure
sub_domain: risk-metrics
metric_class: HYBRID
direction: NEUTRAL
unit_type: ORDINAL
display_format: s
description: |
  Flag identifying exposures requiring heightened monitoring due to elevated credit risk. Governance control used for enhanced monitoring, reserve consideration, and management reporting.
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: facility_risk_snapshot
  alias: frs
  join_type: BASE
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: internal_risk_rating
    role: MEASURE
- schema: l1
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.facility_id = frs.facility_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: is_active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: |
      Binary flag: 1 if criticized rating (internal_risk_rating >= 6), 0 otherwise.
    formula_sql: |-
      SELECT
        frs.facility_id AS dimension_key,
        CASE WHEN CAST(frs.internal_risk_rating AS INTEGER) >= 6 THEN 1.0 ELSE 0.0 END AS metric_value
      FROM l2.facility_risk_snapshot frs
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = frs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE frs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: CUSTOM
    formula_text: |
      Percentage of facilities with criticized rating (internal_risk_rating >= 6) per counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        CASE WHEN COUNT(*) = 0 THEN NULL
             ELSE SUM(CASE WHEN CAST(frs.internal_risk_rating AS INTEGER) >= 6 THEN 1 ELSE 0 END)::FLOAT
                  / COUNT(*) * 100.0
        END AS metric_value
      FROM l2.facility_risk_snapshot frs
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = frs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE frs.as_of_date = :as_of_date

      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: CUSTOM
    formula_text: |
      Percentage of facilities with criticized rating (internal_risk_rating >= 6) per L3 desk.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE WHEN COUNT(*) = 0 THEN NULL
             ELSE SUM(CASE WHEN CAST(frs.internal_risk_rating AS INTEGER) >= 6 THEN 1 ELSE 0 END)::FLOAT
                  / COUNT(*) * 100.0
        END AS metric_value
      FROM l2.facility_risk_snapshot frs
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = frs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE frs.as_of_date = :as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: |
      Percentage of facilities with criticized rating (internal_risk_rating >= 6) per L2 portfolio.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        CASE WHEN COUNT(*) = 0 THEN NULL
             ELSE SUM(CASE WHEN CAST(frs.internal_risk_rating AS INTEGER) >= 6 THEN 1 ELSE 0 END)::FLOAT
                  / COUNT(*) * 100.0
        END AS metric_value
      FROM l2.facility_risk_snapshot frs
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = frs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE frs.as_of_date = :as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: |
      Percentage of facilities with criticized rating (internal_risk_rating >= 6) per L1 business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        CASE WHEN COUNT(*) = 0 THEN NULL
             ELSE SUM(CASE WHEN CAST(frs.internal_risk_rating AS INTEGER) >= 6 THEN 1 ELSE 0 END)::FLOAT
                  / COUNT(*) * 100.0
        END AS metric_value
      FROM l2.facility_risk_snapshot frs
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = frs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE frs.as_of_date = :as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
depends_on: []
output:
  table: metric_result
validations:
- rule_id: EXP-007-V01
  type: NOT_NULL
  description: No null criticized_portfolio_count values
  severity: ERROR
catalogue:
  item_id: MET-019
  abbreviation: CP
  insight: |
    Early warning of problem assets
  rollup_strategy: direct-sum
  primary_value_field: criticized_portfolio_count
tags:
- exposure
- risk-metrics
dashboard_pages: []
legacy_metric_ids: []
