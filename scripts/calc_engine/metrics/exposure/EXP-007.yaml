# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Criticized Portfolios
# ═══════════════════════════════════════════════════════════════

# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-007"
name: "Criticized Portfolios"
version: "1.1.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null

# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: COUNT
display_format: ",.0f"
description: >
  Count of active Criticized risk flags across facilities. Early warning
  indicator of problem assets requiring heightened monitoring, reserve
  consideration, and management reporting. Sources from the risk_flag table
  filtering on flag_code = 'CRITICIZED' with uncleared status.

# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "OCC"
    description: "Comptroller's Handbook — Criticized asset classification and reporting"
  - framework: "Basel III"
    description: "Credit risk monitoring and early warning indicators"

# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: risk_flag
    alias: rf
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: flag_code
        role: MEASURE
      - name: as_of_date
        role: FILTER
      - name: cleared_ts
        role: FILTER
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = rf.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION

# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: COUNT
    formula_text: >
      For each facility, count active risk flags where flag_code = 'CRITICIZED'
      and the flag has not been cleared (cleared_ts IS NULL).
    formula_sql: |-
      SELECT
        rf.facility_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE UPPER(rf.flag_code) = 'CRITICIZED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY rf.facility_id
  counterparty:
    aggregation_type: SUM
    formula_text: >
      For each counterparty, sum facility-level criticized flag counts across
      all facilities belonging to that counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE UPPER(rf.flag_code) = 'CRITICIZED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      Sum of criticized flag counts per L3 desk segment. Joins facility_master
      to enterprise_business_taxonomy via lob_segment_id.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      WHERE UPPER(rf.flag_code) = 'CRITICIZED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      Sum of criticized flag counts per L2 portfolio segment. Traverses
      enterprise_business_taxonomy hierarchy from L3 to L2 via parent_segment_id.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      WHERE UPPER(rf.flag_code) = 'CRITICIZED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      Sum of criticized flag counts per L1 business segment. Full hierarchy
      traversal L3 → L2 → L1 via enterprise_business_taxonomy.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      WHERE UPPER(rf.flag_code) = 'CRITICIZED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY ebt_l1.managed_segment_id

# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []

# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result

# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-007-V01"
    type: NOT_NULL
    description: "No null criticized_portfolio_count values"
    severity: ERROR
  - rule_id: "EXP-007-V02"
    type: NON_NEGATIVE
    description: "Criticized count must be >= 0"
    severity: ERROR
  - rule_id: "EXP-007-V03"
    type: RECONCILIATION
    description: "Sum of facility-level counts equals counterparty-level total per counterparty (tolerance 0.01%)"
    severity: WARNING

# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-019"
  abbreviation: "CP"
  insight: >
    Early warning of problem assets. Rising criticized counts signal
    deteriorating credit quality requiring enhanced monitoring and potential
    reserve adjustments.
  rollup_strategy: "direct-sum"
  primary_value_field: "criticized_portfolio_count"

# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "criticized"]
dashboard_pages: []
legacy_metric_ids: []
