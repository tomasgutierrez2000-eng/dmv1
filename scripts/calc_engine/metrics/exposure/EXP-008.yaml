# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Cross Entity Exposure Amount
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-008"
name: "Cross Entity Exposure Amount"
version: "1.0.0"
owner: "market-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: HYBRID
direction: NEUTRAL
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Total exposure amount allocated across multiple legal entities. Supports
  intra-group concentration transparency.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l3
    table: counterparty_exposure_summary
    alias: ces
    join_type: BASE
    fields:
      - name: total_cross_entity_exposure_usd
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: SUM
    formula_text: >
      SUM(total_cross_entity_exposure_usd) per facility from
      counterparty_exposure_summary. Weighted by bank share percentage.
    formula_sql: |
      SELECT
        ces.facility_id AS dimension_key,
        SUM(ces.total_cross_entity_exposure_usd
          * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
      FROM l3.counterparty_exposure_summary ces
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = ces.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.facility_lender_allocation fla
        ON fla.facility_id = ces.facility_id
        AND fla.is_current_flag = 'Y'
      WHERE ces.as_of_date = :as_of_date
      GROUP BY ces.facility_id
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level total_cross_entity_exposure_usd per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ces.facility_id AS dimension_key,
          SUM(ces.total_cross_entity_exposure_usd
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l3.counterparty_exposure_summary ces
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = ces.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l1.facility_lender_allocation fla
          ON fla.facility_id = ces.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE ces.as_of_date = :as_of_date
        GROUP BY ces.facility_id
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level total_cross_entity_exposure_usd per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ces.facility_id AS dimension_key,
          SUM(ces.total_cross_entity_exposure_usd
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l3.counterparty_exposure_summary ces
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = ces.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l1.facility_lender_allocation fla
          ON fla.facility_id = ces.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE ces.as_of_date = :as_of_date
        GROUP BY ces.facility_id
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level total_cross_entity_exposure_usd per L2 portfolio
      segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ces.facility_id AS dimension_key,
          SUM(ces.total_cross_entity_exposure_usd
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l3.counterparty_exposure_summary ces
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = ces.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l1.facility_lender_allocation fla
          ON fla.facility_id = ces.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE ces.as_of_date = :as_of_date
        GROUP BY ces.facility_id
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level total_cross_entity_exposure_usd per L1 business
      segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ces.facility_id AS dimension_key,
          SUM(ces.total_cross_entity_exposure_usd
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l3.counterparty_exposure_summary ces
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = ces.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l1.facility_lender_allocation fla
          ON fla.facility_id = ces.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE ces.as_of_date = :as_of_date
        GROUP BY ces.facility_id
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-008-V01"
    type: NOT_NULL
    description: "No null total_cross_entity_exposure_usd values"
    severity: ERROR
  - rule_id: "EXP-008-V02"
    type: NON_NEGATIVE
    description: "total_cross_entity_exposure_usd must be >= 0"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-020"
  abbreviation: "CEEA"
  insight: >
    Quantifies inter-entity risk
  rollup_strategy: "direct-sum"
  primary_value_field: "total_cross_entity_exposure_usd"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics"]
dashboard_pages: []
legacy_metric_ids: []
