# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Days Payment Overdue Bucket
# ═══════════════════════════════════════════════════════════════

# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-009"
name: "Days Payment Overdue Bucket"
version: "1.1.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null

# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: ORDINAL
display_format: ",.0f"
description: >
  Maximum days payment overdue per facility, calculated from raw payment
  records in the payment_ledger table. For each facility, identifies payments
  where applied amount < amount due, computes days overdue as reporting date
  minus payment_due_date, takes the MAX, then classifies into buckets:
  1 = 0-30 days, 2 = 31-60 days, 3 = 61-90+ days. At aggregate levels,
  reports the worst (MAX) bucket across constituents.

# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Past-due definition for default classification (90+ days)"
  - framework: "IFRS 9"
    description: "Staging criteria — DPD thresholds for Stage 2/3 classification"
  - framework: "FR Y-14Q"
    description: "Schedule H.1 — delinquency status and days past due reporting"

# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: payment_ledger
    alias: pl
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: payment_due_date
        role: MEASURE
      - name: payment_amount_due
        role: MEASURE
      - name: payment_applied_amt
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = pl.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION

# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      For each facility, lookup payment records in payment_ledger where
      payment_due_date < reporting date and payment_applied_amt <
      payment_amount_due (underpaid). Calculate days overdue = reporting date
      minus payment_due_date. Take MAX days overdue, then classify into
      overdue bucket: 1 (0-30), 2 (31-60), 3 (61-90+).
    formula_sql: |-
      SELECT
        pl.facility_id AS dimension_key,
        CASE
          WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 61 THEN 3
          WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 31 THEN 2
          ELSE 1
        END AS metric_value
      FROM l2.payment_ledger pl
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = pl.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE pl.payment_due_date < :as_of_date::DATE
        AND pl.payment_applied_amt < pl.payment_amount_due
      GROUP BY pl.facility_id
  counterparty:
    aggregation_type: MAX
    formula_text: >
      Worst-case (MAX) overdue bucket across all facilities per counterparty.
      Identifies the most severely overdue facility for each borrower.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        MAX(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pl.facility_id,
          CASE
            WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 61 THEN 3
            WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 31 THEN 2
            ELSE 1
          END AS metric_value
        FROM l2.payment_ledger pl
        WHERE pl.payment_due_date < :as_of_date::DATE
          AND pl.payment_applied_amt < pl.payment_amount_due
        GROUP BY pl.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: MAX
    formula_text: >
      Worst-case (MAX) overdue bucket per L3 desk segment. Shows the most
      severe delinquency in each organizational unit.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        MAX(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pl.facility_id,
          CASE
            WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 61 THEN 3
            WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 31 THEN 2
            ELSE 1
          END AS metric_value
        FROM l2.payment_ledger pl
        WHERE pl.payment_due_date < :as_of_date::DATE
          AND pl.payment_applied_amt < pl.payment_amount_due
        GROUP BY pl.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: MAX
    formula_text: >
      Worst-case (MAX) overdue bucket per L2 portfolio segment. Traverses
      EBT hierarchy L3 → L2 via parent_segment_id.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        MAX(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pl.facility_id,
          CASE
            WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 61 THEN 3
            WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 31 THEN 2
            ELSE 1
          END AS metric_value
        FROM l2.payment_ledger pl
        WHERE pl.payment_due_date < :as_of_date::DATE
          AND pl.payment_applied_amt < pl.payment_amount_due
        GROUP BY pl.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: MAX
    formula_text: >
      Worst-case (MAX) overdue bucket per L1 business segment. Full EBT
      hierarchy traversal L3 → L2 → L1.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        MAX(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pl.facility_id,
          CASE
            WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 61 THEN 3
            WHEN MAX(:as_of_date::DATE - pl.payment_due_date::DATE) >= 31 THEN 2
            ELSE 1
          END AS metric_value
        FROM l2.payment_ledger pl
        WHERE pl.payment_due_date < :as_of_date::DATE
          AND pl.payment_applied_amt < pl.payment_amount_due
        GROUP BY pl.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id

# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []

# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result

# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-009-V01"
    type: NOT_NULL
    description: "No null overdue bucket values for facilities with overdue payments"
    severity: ERROR
  - rule_id: "EXP-009-V02"
    type: THRESHOLD
    description: "Overdue bucket must be between 1 and 3 (1=0-30d, 2=31-60d, 3=61-90+d)"
    severity: ERROR

# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-022"
  abbreviation: "DPOB"
  insight: >
    Late payment severity indicator. Bucket 3 (61-90+ days) signals potential
    default per Basel III 90-day rule. Aggregate levels show worst-case
    delinquency for conservative CRO monitoring.
  rollup_strategy: "worst-case"
  primary_value_field: "dpd_bucket_code"

# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "delinquency", "aging"]
dashboard_pages: []
legacy_metric_ids: []
