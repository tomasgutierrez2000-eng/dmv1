# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Delinquent Payment Flag
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-011"
name: "Delinquent Payment Flag"
version: "1.0.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: ORDINAL
display_format: "s"
description: >
  Indicator that exposure is past due. Used for credit monitoring, staging
  assessment, and early default identification.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_delinquency_snapshot
    alias: fds
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: delinquent_payment_flag
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fds.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      For each Facility_ID lookup the Payments records in the Payment Lockbox
      table. For each payment record where Payment Due Date > Today() IF(COUNT IF
      ([Pmt_Applied] <[Pmt_Due])>=1, then "Y", "N")
    formula_sql: |
      SELECT
        fds.facility_id AS dimension_key,
        fds.delinquent_payment_flag AS metric_value
      FROM l2.facility_delinquency_snapshot fds
      WHERE fds.as_of_date = :as_of_date
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level delinquent_payment_flag per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fds.facility_id AS dimension_key,
          fds.delinquent_payment_flag AS metric_value
        FROM l2.facility_delinquency_snapshot fds
        WHERE fds.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level delinquent_payment_flag per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fds.facility_id AS dimension_key,
          fds.delinquent_payment_flag AS metric_value
        FROM l2.facility_delinquency_snapshot fds
        WHERE fds.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level delinquent_payment_flag per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fds.facility_id AS dimension_key,
          fds.delinquent_payment_flag AS metric_value
        FROM l2.facility_delinquency_snapshot fds
        WHERE fds.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level delinquent_payment_flag per L1 business segment
      segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fds.facility_id AS dimension_key,
          fds.delinquent_payment_flag AS metric_value
        FROM l2.facility_delinquency_snapshot fds
        WHERE fds.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-011-V01"
    type: NOT_NULL
    description: "No null delinquent_payment_flag values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-025"
  abbreviation: "DPF"
  insight: >
    Portfolio credit stress indicator
  rollup_strategy: "direct-sum"
  primary_value_field: "delinquent_payment_flag"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics"]
dashboard_pages: []
legacy_metric_ids: []
