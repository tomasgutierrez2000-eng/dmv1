metric_id: EXP-013
name: Deteriorated Deal Flag
version: 1.0.0
owner: credit-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: exposure
sub_domain: risk-metrics
metric_class: HYBRID
direction: LOWER_BETTER
unit_type: RATE
display_format: .4f
description: 'Derived indicator that the facility’s internal credit rating has worsened during the reporting period. Provides
  automated early deterioration signal supporting migration monitoring and risk escalation.

  '
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: counterparty_rating_observation
  alias: cro
  join_type: BASE
  fields:
  - name: counterparty_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: risk_rating_status
    role: MEASURE
- schema: l1
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.counterparty_id = cro.counterparty_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: RAW
    formula_text: 'Read is_deteriorated from facility_detail_snapshot for each facility as-of reporting date.

      '
    formula_sql: "SELECT\n  fm.facility_id AS dimension_key,\n  CASE WHEN cro.risk_rating_status = 'Downgrade' THEN 1 ELSE\
      \ 0 END AS metric_value\nFROM l2.counterparty_rating_observation cro\nINNER JOIN l1.facility_master fm\n  ON fm.counterparty_id\
      \ = cro.counterparty_id\n  AND fm.active_flag = 'Y'\nWHERE cro.as_of_date = :as_of_date"
  counterparty:
    aggregation_type: SUM
    formula_text: 'SUM of facility-level is_deteriorated per counterparty.

      '
    formula_sql: "SELECT\n  fm.counterparty_id AS dimension_key,\n  SUM(fac.metric_value) AS metric_value\nFROM (\n  SELECT\n\
      \    fm.facility_id AS dimension_key,\n    CASE WHEN cro.risk_rating_status = 'Downgrade' THEN 1 ELSE 0 END AS metric_value\n\
      \  FROM l2.counterparty_rating_observation cro\n  INNER JOIN l1.facility_master fm\n    ON fm.counterparty_id = cro.counterparty_id\n\
      \    AND fm.active_flag = 'Y'\n  WHERE cro.as_of_date = :as_of_date\n) fac\nINNER JOIN l1.facility_master fm\n  ON fm.facility_id\
      \ = fac.dimension_key\n  AND fm.active_flag = 'Y'\nGROUP BY fm.counterparty_id"
  desk:
    aggregation_type: SUM
    formula_text: 'SUM of facility-level is_deteriorated per L3 desk segment.

      '
    formula_sql: "SELECT\n  ebt.managed_segment_id AS dimension_key,\n  SUM(fac.metric_value) AS metric_value\nFROM (\n  SELECT\n\
      \    fm.facility_id AS dimension_key,\n    CASE WHEN cro.risk_rating_status = 'Downgrade' THEN 1 ELSE 0 END AS metric_value\n\
      \  FROM l2.counterparty_rating_observation cro\n  INNER JOIN l1.facility_master fm\n    ON fm.counterparty_id = cro.counterparty_id\n\
      \    AND fm.active_flag = 'Y'\n  WHERE cro.as_of_date = :as_of_date\n) fac\nINNER JOIN l1.facility_master fm\n  ON fm.facility_id\
      \ = fac.dimension_key\n  AND fm.active_flag = 'Y'\nLEFT JOIN l1.enterprise_business_taxonomy ebt\n  ON ebt.managed_segment_id\
      \ = fm.lob_segment_id\nGROUP BY ebt.managed_segment_id"
  portfolio:
    aggregation_type: SUM
    formula_text: 'SUM of facility-level is_deteriorated per L2 portfolio segment.

      '
    formula_sql: "SELECT\n  ebt_l2.managed_segment_id AS dimension_key,\n  SUM(fac.metric_value) AS metric_value\nFROM (\n\
      \  SELECT\n    fm.facility_id AS dimension_key,\n    CASE WHEN cro.risk_rating_status = 'Downgrade' THEN 1 ELSE 0 END\
      \ AS metric_value\n  FROM l2.counterparty_rating_observation cro\n  INNER JOIN l1.facility_master fm\n    ON fm.counterparty_id\
      \ = cro.counterparty_id\n    AND fm.active_flag = 'Y'\n  WHERE cro.as_of_date = :as_of_date\n) fac\nINNER JOIN l1.facility_master\
      \ fm\n  ON fm.facility_id = fac.dimension_key\n  AND fm.active_flag = 'Y'\nLEFT JOIN l1.enterprise_business_taxonomy\
      \ ebt_l3\n  ON ebt_l3.managed_segment_id = fm.lob_segment_id\nLEFT JOIN l1.enterprise_business_taxonomy ebt_l2\n  ON\
      \ ebt_l2.managed_segment_id = ebt_l3.parent_segment_id\nGROUP BY ebt_l2.managed_segment_id"
  business_segment:
    aggregation_type: SUM
    formula_text: 'SUM of facility-level is_deteriorated per L1 business segment segment.

      '
    formula_sql: "SELECT\n  ebt_l1.managed_segment_id AS dimension_key,\n  SUM(fac.metric_value) AS metric_value\nFROM (\n\
      \  SELECT\n    fm.facility_id AS dimension_key,\n    CASE WHEN cro.risk_rating_status = 'Downgrade' THEN 1 ELSE 0 END\
      \ AS metric_value\n  FROM l2.counterparty_rating_observation cro\n  INNER JOIN l1.facility_master fm\n    ON fm.counterparty_id\
      \ = cro.counterparty_id\n    AND fm.active_flag = 'Y'\n  WHERE cro.as_of_date = :as_of_date\n) fac\nINNER JOIN l1.facility_master\
      \ fm\n  ON fm.facility_id = fac.dimension_key\n  AND fm.active_flag = 'Y'\nLEFT JOIN l1.enterprise_business_taxonomy\
      \ ebt_l3\n  ON ebt_l3.managed_segment_id = fm.lob_segment_id\nLEFT JOIN l1.enterprise_business_taxonomy ebt_l2\n  ON\
      \ ebt_l2.managed_segment_id = ebt_l3.parent_segment_id\nLEFT JOIN l1.enterprise_business_taxonomy ebt_l1\n  ON ebt_l1.managed_segment_id\
      \ = ebt_l2.parent_segment_id\nGROUP BY ebt_l1.managed_segment_id"
depends_on: []
output:
  table: metric_result
validations:
- rule_id: EXP-013-V01
  type: NOT_NULL
  description: No null is_deteriorated values
  severity: ERROR
catalogue:
  item_id: MET-027
  abbreviation: DDF
  insight: 'Credit risk migration detection

    '
  rollup_strategy: weighted-avg
  primary_value_field: is_deteriorated
tags:
- exposure
- risk-metrics
dashboard_pages: []
legacy_metric_ids: []
