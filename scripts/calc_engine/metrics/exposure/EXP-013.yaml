# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Deteriorated Deal Flag
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-013"
name: "Deteriorated Deal Flag"
version: "1.1.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: COUNT
display_format: ",.0f"
description: >
  Count of active DETERIORATED risk flags per facility, sourced from the
  risk_flag table where flag_type = 'DETERIORATED' and the flag has not
  been cleared. Provides automated early deterioration signal supporting
  migration monitoring, watchlist management, and risk escalation workflows.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    section: "Pillar 2 — ICAAP"
    description: "Credit risk migration monitoring and early warning indicators"
  - framework: "OCC 2020-32"
    section: "Credit Risk Review Systems"
    description: "Deterioration flags support supervisory expectations for credit risk identification"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: risk_flag
    alias: rf
    join_type: BASE
    fields:
      - name: risk_flag_id
        role: JOIN_KEY
      - name: facility_id
        role: JOIN_KEY
        description: "Links to facility (nullable — some flags are counterparty-level)"
      - name: counterparty_id
        role: DIMENSION
      - name: flag_type
        role: FILTER
        description: "Flag category — filter for 'DETERIORATED'"
      - name: as_of_date
        role: FILTER
      - name: cleared_ts
        role: FILTER
        description: "NULL means flag is still active (not cleared)"
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = rf.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      Count of active DETERIORATED risk flags per facility from the risk_flag
      table where flag has not been cleared.
    formula_sql: |
      SELECT
        rf.facility_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      WHERE rf.flag_type = 'DETERIORATED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY rf.facility_id
  counterparty:
    aggregation_type: SUM
    formula_text: >
      Count of active DETERIORATED risk flags across all facilities per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      WHERE rf.flag_type = 'DETERIORATED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      Count of active DETERIORATED risk flags across all facilities per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      WHERE rf.flag_type = 'DETERIORATED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      Count of active DETERIORATED risk flags across all facilities per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      WHERE rf.flag_type = 'DETERIORATED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      Count of active DETERIORATED risk flags across all facilities per L1 business segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        COUNT(*) AS metric_value
      FROM l2.risk_flag rf
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = rf.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      WHERE rf.flag_type = 'DETERIORATED'
        AND rf.as_of_date = :as_of_date
        AND rf.cleared_ts IS NULL
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-013-V01"
    type: NOT_NULL
    description: "No null deteriorated flag counts"
    severity: ERROR
  - rule_id: "EXP-013-V02"
    type: NON_NEGATIVE
    description: "Deteriorated flag count must be >= 0"
    severity: ERROR
  - rule_id: "EXP-013-V03"
    type: RECONCILIATION
    description: "Sum of facility-level counts must equal counterparty-level totals"
    severity: WARNING
    params:
      levels_to_compare: [facility, counterparty, business_segment]
      tolerance_pct: 0.01
  - rule_id: "EXP-013-V04"
    type: PERIOD_OVER_PERIOD
    description: "Flag significant changes in deterioration counts between periods"
    severity: WARNING
    params:
      max_change_pct: 25.0
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-027"
  abbreviation: "DDF"
  insight: >
    Credit risk migration detection — counts active deterioration flags
    to identify facilities requiring escalated monitoring.
  rollup_strategy: "direct-sum"
  primary_value_field: "is_deteriorated"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "deterioration", "migration", "watchlist"]
dashboard_pages: ["P7"]
legacy_metric_ids: []
