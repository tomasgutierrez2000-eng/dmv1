# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Debt Service Coverage Ratio (DSCR)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-014"
name: "Debt Service Coverage Ratio (DSCR)"
version: "3.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: HIGHER_BETTER
unit_type: RATIO
display_format: ".2f"
description: >
  Property-level Net Operating Income (from collateral_snapshot) divided by
  Total Debt Service (Interest Expense + Principal Payments from
  facility_financial_snapshot). Measures the income-producing collateral's
  ability to cover debt obligations. DSCR > 1.0 means the property generates
  enough income to cover debt payments. Key covenant compliance and credit
  resilience indicator for CRE lending.

  Ingredient derivation:
    - NOI (noi_current_amt): L2 collateral_snapshot — property-level income
    - Interest Expense (interest_expense_amt): L2 facility_financial_snapshot — raw
    - Principal Payment (principal_payment_amt): L2 facility_financial_snapshot — raw
    - Total Debt Service = interest_expense_amt + principal_payment_amt (L3 derived)
    - DSCR = SUM(noi_current_amt) / Total Debt Service (L3 derived)

  Rollup uses sum-ratio pattern: SUM(NOI) / SUM(Debt Service) at each level,
  preserving the mathematical relationship between numerator and denominator.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    section: "CRE22"
    description: "Income-producing real estate lending — DSCR assessment"
  - framework: "FR Y-14Q"
    schedule: "H.1"
    description: "CRE loan schedule — DSCR reporting field"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_financial_snapshot
    alias: ffs
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: interest_expense_amt
        role: MEASURE
        description: "Interest expense — component of Total Debt Service denominator"
      - name: principal_payment_amt
        role: MEASURE
        description: "Principal payments — component of Total Debt Service denominator"
      - name: currency_code
        role: JOIN_KEY
        description: "Original currency of financial amounts — used for FX conversion"
  - schema: l2
    table: collateral_snapshot
    alias: cs
    join_type: LEFT
    join_on: "cs.facility_id = ffs.facility_id AND cs.as_of_date = ffs.as_of_date"
    fields:
      - name: noi_current_amt
        role: MEASURE
        description: "Property-level Net Operating Income — numerator of DSCR"
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: JOIN_KEY
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = ffs.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = ffs.as_of_date"
    fields:
      - name: from_currency_code
        role: JOIN_KEY
      - name: to_currency_code
        role: FILTER
      - name: rate
        role: MEASURE
        description: "Spot FX rate for converting to USD reporting currency"
      - name: as_of_date
        role: JOIN_KEY
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = ffs.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: |
      For each facility:
        1. LOAD interest_expense_amt, principal_payment_amt from l2.facility_financial_snapshot
        2. LOAD noi_current_amt from l2.collateral_snapshot (SUM across collateral assets)
        3. COMPUTE Total Debt Service = interest_expense_amt + principal_payment_amt
        4. COMPUTE DSCR = SUM(noi_current_amt) / Total Debt Service
      Ingredients: noi_current_amt (L2 collateral), interest_expense_amt (L2), principal_payment_amt (L2)
    formula_sql: |-
      SELECT
        ffs.facility_id AS dimension_key,
        COALESCE(cs_noi.total_noi, 0)
          / NULLIF(ffs.interest_expense_amt + ffs.principal_payment_amt, 0)
          AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN (
        SELECT cs.facility_id, cs.as_of_date, SUM(cs.noi_current_amt) AS total_noi
        FROM l2.collateral_snapshot cs
        WHERE cs.noi_current_amt IS NOT NULL
        GROUP BY cs.facility_id, cs.as_of_date
      ) cs_noi
        ON cs_noi.facility_id = ffs.facility_id
        AND cs_noi.as_of_date = ffs.as_of_date
      WHERE ffs.as_of_date = :as_of_date
        AND cs_noi.total_noi IS NOT NULL
  counterparty:
    aggregation_type: CUSTOM
    formula_text: |
      For each counterparty:
        1. LOAD collateral NOI and facility debt service for all facilities
        2. CONVERT amounts to USD via l2.fx_rate spot rate
        3. COMPUTE SUM(noi_current_amt × fx_rate) = Counterparty Collateral NOI (USD)
        4. COMPUTE SUM((interest_expense + principal_payment) × fx_rate) = Counterparty Debt Service (USD)
        5. COMPUTE Counterparty DSCR = Counterparty Collateral NOI / Counterparty Debt Service
      Sum-ratio rollup with FX conversion preserves ingredient traceability across currencies.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(COALESCE(cs_noi.total_noi, 0) * COALESCE(fx.rate, 1))
          / NULLIF(SUM((ffs.interest_expense_amt + ffs.principal_payment_amt) * COALESCE(fx.rate, 1)), 0)
          AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN (
        SELECT cs.facility_id, cs.as_of_date, SUM(cs.noi_current_amt) AS total_noi
        FROM l2.collateral_snapshot cs
        WHERE cs.noi_current_amt IS NOT NULL
        GROUP BY cs.facility_id, cs.as_of_date
      ) cs_noi
        ON cs_noi.facility_id = ffs.facility_id
        AND cs_noi.as_of_date = ffs.as_of_date
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      WHERE ffs.as_of_date = :as_of_date
        AND cs_noi.total_noi IS NOT NULL
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: CUSTOM
    formula_text: |
      For each L3 Desk segment:
        1. LOOKUP managed_segment_id from enterprise_business_taxonomy
        2. CONVERT amounts to USD via l2.fx_rate spot rate
        3. COMPUTE SUM(collateral NOI × fx_rate) / SUM(debt service × fx_rate)
      Sum-ratio rollup with FX conversion.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(COALESCE(cs_noi.total_noi, 0) * COALESCE(fx.rate, 1))
          / NULLIF(SUM((ffs.interest_expense_amt + ffs.principal_payment_amt) * COALESCE(fx.rate, 1)), 0)
          AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN (
        SELECT cs.facility_id, cs.as_of_date, SUM(cs.noi_current_amt) AS total_noi
        FROM l2.collateral_snapshot cs
        WHERE cs.noi_current_amt IS NOT NULL
        GROUP BY cs.facility_id, cs.as_of_date
      ) cs_noi
        ON cs_noi.facility_id = ffs.facility_id
        AND cs_noi.as_of_date = ffs.as_of_date
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
        AND cs_noi.total_noi IS NOT NULL
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: |
      For each L2 Portfolio segment:
        1. Walk UP hierarchy: L3 desk → L2 portfolio via parent_segment_id
        2. CONVERT amounts to USD via l2.fx_rate spot rate
        3. COMPUTE SUM(collateral NOI × fx_rate) / SUM(debt service × fx_rate)
      Sum-ratio rollup with FX conversion.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(COALESCE(cs_noi.total_noi, 0) * COALESCE(fx.rate, 1))
          / NULLIF(SUM((ffs.interest_expense_amt + ffs.principal_payment_amt) * COALESCE(fx.rate, 1)), 0)
          AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN (
        SELECT cs.facility_id, cs.as_of_date, SUM(cs.noi_current_amt) AS total_noi
        FROM l2.collateral_snapshot cs
        WHERE cs.noi_current_amt IS NOT NULL
        GROUP BY cs.facility_id, cs.as_of_date
      ) cs_noi
        ON cs_noi.facility_id = ffs.facility_id
        AND cs_noi.as_of_date = ffs.as_of_date
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
        AND cs_noi.total_noi IS NOT NULL
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: |
      For each L1 Business Segment / LoB:
        1. Walk UP hierarchy: L3 → L2 → L1 via parent_segment_id chain
        2. CONVERT amounts to USD via l2.fx_rate spot rate
        3. COMPUTE SUM(collateral NOI × fx_rate) / SUM(debt service × fx_rate)
      Sum-ratio rollup with FX conversion.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(COALESCE(cs_noi.total_noi, 0) * COALESCE(fx.rate, 1))
          / NULLIF(SUM((ffs.interest_expense_amt + ffs.principal_payment_amt) * COALESCE(fx.rate, 1)), 0)
          AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN (
        SELECT cs.facility_id, cs.as_of_date, SUM(cs.noi_current_amt) AS total_noi
        FROM l2.collateral_snapshot cs
        WHERE cs.noi_current_amt IS NOT NULL
        GROUP BY cs.facility_id, cs.as_of_date
      ) cs_noi
        ON cs_noi.facility_id = ffs.facility_id
        AND cs_noi.as_of_date = ffs.as_of_date
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
        AND cs_noi.total_noi IS NOT NULL
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-014-V01"
    type: NOT_NULL
    description: "Collateral NOI and debt service components must not be null"
    severity: ERROR
  - rule_id: "EXP-014-V02"
    type: NON_NEGATIVE
    description: "DSCR should be >= 0 (negative NOI is a warning)"
    severity: WARNING
  - rule_id: "EXP-014-V03"
    type: THRESHOLD
    description: "DSCR below 1.0 indicates insufficient debt coverage"
    severity: WARNING
    params:
      min: 0
      warning_below: 1.0
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-028"
  abbreviation: "DSCR"
  insight: >
    Risk of default due to insufficient cash flow. DSCR below 1.0x signals
    the property cannot cover debt payments from operating income alone.
    Sum-ratio rollup at portfolio level reveals aggregate debt service
    coverage health — a key CRO early warning indicator.
  rollup_strategy: "sum-ratio"
  primary_value_field: "dscr_value"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "covenant"]
dashboard_pages: []
legacy_metric_ids: []
