# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Undrawn Exposure ($)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-017"
name: "Undrawn Exposure ($)"
version: "2.1.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Bank-share-adjusted unfunded commitment amount. Derived as
  committed_facility_amt minus SUM(funded_amount) from PRINCIPAL positions,
  multiplied by bank_share_pct / 100. Ensures the identity:
  Committed Exposure = Outstanding Exposure + Undrawn Exposure.
  Maps to FR Y-14Q Field 24 minus Field 25.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "FR Y-14Q"
    schedule: "H.1"
    description: "Derived as Field 24 (Committed Exposure Global) minus Field 25 (Utilized Exposure Global). Undrawn portion of committed credit."
  - framework: "Basel III"
    description: "Undrawn amount x CCF = off-balance-sheet EAD component. CCFs: 0% (cancelable), 20% (<=1yr), 50% (>1yr)."
  - framework: "CCAR/DFAST"
    description: "[C(i) - OB(i)] in EAD formula. Fed uses empirically calibrated LEQ drawdown rates."
  - framework: "FR Y-9C"
    schedule: "HC-L"
    description: "Items 1.a-1.e — unused commitments by facility type."
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: position
    alias: pos
    join_type: BASE
    fields:
      - name: position_id
        role: JOIN_KEY
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
  - schema: l2
    table: position_detail
    alias: pdtl
    join_type: INNER
    join_on: "pdtl.position_id = pos.position_id"
    fields:
      - name: position_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: funded_amount
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = pos.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: committed_facility_amt
        role: MEASURE
        description: "Total approved committed credit amount (USD)"
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l2
    table: facility_lender_allocation
    alias: fla
    join_type: LEFT
    join_on: "fla.facility_id = fm.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: bank_share_pct
        role: MEASURE
        description: "Bank's participation share of the facility (%)"
  - schema: l2
    table: facility_counterparty_participation
    alias: fcp
    join_type: INNER
    join_on: "fcp.facility_id = fm.facility_id"
    fields:
      - name: counterparty_id
        role: DIMENSION
      - name: participation_pct
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: |
      For each active facility:
      1. SUM(funded_amount) from PRINCIPAL position_detail rows per facility
      2. Subtract from committed_facility_amt to get unfunded amount
      3. Multiply by COALESCE(bank_share_pct, 100) / 100 from facility_lender_allocation
      Ensures: Committed Exposure = Outstanding Exposure + Undrawn Exposure
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        (fm.committed_facility_amt - COALESCE(funded.funded_sum, 0))
          * COALESCE(fla.bank_share_pct, 100.0) / 100.0 AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN (
        SELECT
          pos.facility_id,
          SUM(COALESCE(pdtl.funded_amount, 0)) AS funded_sum
        FROM l2.position pos
        INNER JOIN l2.position_detail pdtl
          ON pdtl.position_id = pos.position_id
          AND pdtl.as_of_date = pos.as_of_date
          AND pdtl.detail_type = 'PRINCIPAL'
        WHERE pos.as_of_date = :as_of_date
        GROUP BY pos.facility_id
      ) funded ON funded.facility_id = fm.facility_id
      LEFT JOIN l2.facility_lender_allocation fla
        ON fla.facility_id = fm.facility_id
      WHERE fm.is_active_flag = 'Y'
  counterparty:
    aggregation_type: CUSTOM
    formula_text: |
      For each counterparty, sum facility-level undrawn exposure weighted
      by participation_pct from facility_counterparty_participation.
    formula_sql: |
      SELECT
        fcp.counterparty_id AS dimension_key,
        SUM(fac.metric_value * COALESCE(fcp.participation_pct, 1.0)) AS metric_value
      FROM (
        SELECT
          fm.facility_id,
          (fm.committed_facility_amt - COALESCE(funded.funded_sum, 0))
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0 AS metric_value
        FROM l2.facility_master fm
        LEFT JOIN (
          SELECT
            pos.facility_id,
            SUM(COALESCE(pdtl.funded_amount, 0)) AS funded_sum
          FROM l2.position pos
          INNER JOIN l2.position_detail pdtl
            ON pdtl.position_id = pos.position_id
            AND pdtl.as_of_date = pos.as_of_date
            AND pdtl.detail_type = 'PRINCIPAL'
          WHERE pos.as_of_date = :as_of_date
          GROUP BY pos.facility_id
        ) funded ON funded.facility_id = fm.facility_id
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l2.facility_counterparty_participation fcp
        ON fcp.facility_id = fac.facility_id
      GROUP BY fcp.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: |
      SUM of facility-level undrawn exposure per L3 desk segment.
      Joins facility_master.lob_segment_id to enterprise_business_taxonomy.managed_segment_id.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id,
          (fm.committed_facility_amt - COALESCE(funded.funded_sum, 0))
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0 AS metric_value
        FROM l2.facility_master fm
        LEFT JOIN (
          SELECT
            pos.facility_id,
            SUM(COALESCE(pdtl.funded_amount, 0)) AS funded_sum
          FROM l2.position pos
          INNER JOIN l2.position_detail pdtl
            ON pdtl.position_id = pos.position_id
            AND pdtl.as_of_date = pos.as_of_date
            AND pdtl.detail_type = 'PRINCIPAL'
          WHERE pos.as_of_date = :as_of_date
          GROUP BY pos.facility_id
        ) funded ON funded.facility_id = fm.facility_id
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: |
      SUM of facility-level undrawn exposure per L2 portfolio segment.
      Traverses L3 -> L2 via parent_segment_id.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id,
          (fm.committed_facility_amt - COALESCE(funded.funded_sum, 0))
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0 AS metric_value
        FROM l2.facility_master fm
        LEFT JOIN (
          SELECT
            pos.facility_id,
            SUM(COALESCE(pdtl.funded_amount, 0)) AS funded_sum
          FROM l2.position pos
          INNER JOIN l2.position_detail pdtl
            ON pdtl.position_id = pos.position_id
            AND pdtl.as_of_date = pos.as_of_date
            AND pdtl.detail_type = 'PRINCIPAL'
          WHERE pos.as_of_date = :as_of_date
          GROUP BY pos.facility_id
        ) funded ON funded.facility_id = fm.facility_id
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: |
      SUM of facility-level undrawn exposure per L1 business segment.
      Traverses L3 -> L2 -> L1 via parent_segment_id chain.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id,
          (fm.committed_facility_amt - COALESCE(funded.funded_sum, 0))
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0 AS metric_value
        FROM l2.facility_master fm
        LEFT JOIN (
          SELECT
            pos.facility_id,
            SUM(COALESCE(pdtl.funded_amount, 0)) AS funded_sum
          FROM l2.position pos
          INNER JOIN l2.position_detail pdtl
            ON pdtl.position_id = pos.position_id
            AND pdtl.as_of_date = pos.as_of_date
            AND pdtl.detail_type = 'PRINCIPAL'
          WHERE pos.as_of_date = :as_of_date
          GROUP BY pos.facility_id
        ) funded ON funded.facility_id = fm.facility_id
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-017-V01"
    type: NOT_NULL
    description: "No null undrawn_exposure values"
    severity: ERROR
  - rule_id: "EXP-017-V02"
    type: NON_NEGATIVE
    description: "Undrawn exposure must be >= 0"
    severity: ERROR
  - rule_id: "EXP-017-V03"
    type: RECONCILIATION
    description: "SUM(facility) must equal SUM(counterparty) and SUM(business_segment)"
    severity: ERROR
    params:
      levels_to_compare: ["facility", "counterparty", "business_segment"]
      tolerance_pct: 0.01
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-033"
  abbreviation: "UE"
  insight: >
    Potential future drawdown risk — contingent funding exposure
    that could convert to on-balance-sheet exposure under stress.
  rollup_strategy: "direct-sum"
  primary_value_field: "undrawn_exposure_usd"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "fr-y14q", "ccar"]
dashboard_pages: []
legacy_metric_ids: []
