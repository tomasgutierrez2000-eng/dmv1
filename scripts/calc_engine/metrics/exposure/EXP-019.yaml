metric_id: EXP-019
name: Exposure Limit ($)
version: 1.0.0
owner: credit-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: exposure
sub_domain: risk-metrics
metric_class: SOURCED
direction: NEUTRAL
unit_type: CURRENCY
display_format: $,.0f
description: 'Maximum approved credit exposure authorized for the counterparty or Line of Business segment in USD. Represents
  formal risk appetite allocation and governance control threshold.

  '
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: facility_exposure_snapshot
  alias: fes
  join_type: BASE
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: committed_amount
    role: MEASURE
- schema: l1
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.facility_id = fes.facility_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: is_active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: RAW
    formula_text: 'Read limit_amt from lob_exposure_summary for each facility as-of reporting date.

      '
    formula_sql: "SELECT\n  fes.facility_id AS dimension_key,\n  fes.committed_amount AS metric_value\nFROM l2.facility_exposure_snapshot\
      \ fes\nINNER JOIN l1.facility_master fm\n  ON fm.facility_id = fes.facility_id\n  AND fm.is_active_flag = 'Y'\nWHERE fes.as_of_date\
      \ = :as_of_date"
  counterparty:
    aggregation_type: RAW
    formula_text: 'Read limit_amt per counterparty.

      '
    formula_sql: "SELECT\n  fm.counterparty_id AS dimension_key,\n  SUM(fac.metric_value) AS metric_value\nFROM (\n  SELECT\n\
      \    fes.facility_id AS dimension_key,\n    fes.committed_amount AS metric_value\n  FROM l2.facility_exposure_snapshot\
      \ fes\n  INNER JOIN l1.facility_master fm\n    ON fm.facility_id = fes.facility_id\n    AND fm.is_active_flag = 'Y'\n \
      \ WHERE fes.as_of_date = :as_of_date\n) fac\nINNER JOIN l1.facility_master fm\n  ON fm.facility_id = fac.dimension_key\n\
      \  AND fm.is_active_flag = 'Y'\nGROUP BY fm.counterparty_id"
  desk:
    aggregation_type: SUM
    formula_text: 'SUM of facility-level limit_amt per L3 desk segment.

      '
    formula_sql: "SELECT\n  ebt.managed_segment_id AS dimension_key,\n  SUM(fac.metric_value) AS metric_value\nFROM (\n  SELECT\n\
      \    fes.facility_id AS dimension_key,\n    fes.committed_amount AS metric_value\n  FROM l2.facility_exposure_snapshot\
      \ fes\n  INNER JOIN l1.facility_master fm\n    ON fm.facility_id = fes.facility_id\n    AND fm.is_active_flag = 'Y'\n \
      \ WHERE fes.as_of_date = :as_of_date\n) fac\nINNER JOIN l1.facility_master fm\n  ON fm.facility_id = fac.dimension_key\n\
      \  AND fm.is_active_flag = 'Y'\nLEFT JOIN l1.enterprise_business_taxonomy ebt\n  ON ebt.managed_segment_id = fm.lob_segment_id\n\
      GROUP BY ebt.managed_segment_id"
  portfolio:
    aggregation_type: SUM
    formula_text: 'SUM of facility-level limit_amt per L2 portfolio segment.

      '
    formula_sql: "SELECT\n  ebt_l2.managed_segment_id AS dimension_key,\n  SUM(fac.metric_value) AS metric_value\nFROM (\n\
      \  SELECT\n    fes.facility_id AS dimension_key,\n    fes.committed_amount AS metric_value\n  FROM l2.facility_exposure_snapshot\
      \ fes\n  INNER JOIN l1.facility_master fm\n    ON fm.facility_id = fes.facility_id\n    AND fm.is_active_flag = 'Y'\n \
      \ WHERE fes.as_of_date = :as_of_date\n) fac\nINNER JOIN l1.facility_master fm\n  ON fm.facility_id = fac.dimension_key\n\
      \  AND fm.is_active_flag = 'Y'\nLEFT JOIN l1.enterprise_business_taxonomy ebt_l3\n  ON ebt_l3.managed_segment_id = fm.lob_segment_id\n\
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2\n  ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id\nGROUP BY\
      \ ebt_l2.managed_segment_id"
  business_segment:
    aggregation_type: SUM
    formula_text: 'SUM of facility-level limit_amt per L1 business segment segment.

      '
    formula_sql: "SELECT\n  ebt_l1.managed_segment_id AS dimension_key,\n  SUM(fac.metric_value) AS metric_value\nFROM (\n\
      \  SELECT\n    fes.facility_id AS dimension_key,\n    fes.committed_amount AS metric_value\n  FROM l2.facility_exposure_snapshot\
      \ fes\n  INNER JOIN l1.facility_master fm\n    ON fm.facility_id = fes.facility_id\n    AND fm.is_active_flag = 'Y'\n \
      \ WHERE fes.as_of_date = :as_of_date\n) fac\nINNER JOIN l1.facility_master fm\n  ON fm.facility_id = fac.dimension_key\n\
      \  AND fm.is_active_flag = 'Y'\nLEFT JOIN l1.enterprise_business_taxonomy ebt_l3\n  ON ebt_l3.managed_segment_id = fm.lob_segment_id\n\
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2\n  ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id\nLEFT JOIN\
      \ l1.enterprise_business_taxonomy ebt_l1\n  ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id\nGROUP BY ebt_l1.managed_segment_id"
depends_on: []
output:
  table: metric_result
validations:
- rule_id: EXP-019-V01
  type: NOT_NULL
  description: No null limit_amt values
  severity: ERROR
- rule_id: EXP-019-V02
  type: NON_NEGATIVE
  description: limit_amt must be >= 0
  severity: ERROR
catalogue:
  item_id: MET-035
  abbreviation: EL
  insight: 'Credit line usage rate

    '
  rollup_strategy: direct-sum
  primary_value_field: limit_amt
tags:
- exposure
- risk-metrics
dashboard_pages: []
legacy_metric_ids: []
