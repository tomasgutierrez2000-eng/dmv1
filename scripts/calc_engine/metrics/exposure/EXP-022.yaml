# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Cross Entity Exposure Flag
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-022"
name: "Cross Entity Exposure Flag"
version: "1.0.0"
owner: "market-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Indicator of exposure allocated across multiple legal entities. Portfolio KPI
  (% Cross-Entity Exposure) highlights structural complexity.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l3
    table: counterparty_exposure_summary
    alias: ces
    join_type: BASE
    fields:
      - name: has_cross_entity_flag
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Exposure-weighted average of has_cross_entity_flag per facility.
    formula_sql: |
      SELECT
        ces.facility_id AS dimension_key,
        SUM(ces.has_cross_entity_flag * ces.committed_amount)
          / NULLIF(SUM(ces.committed_amount), 0) AS metric_value
      FROM l3.counterparty_exposure_summary ces
      WHERE ces.as_of_date = :as_of_date
      GROUP BY ces.facility_id
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level has_cross_entity_flag per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ces.facility_id AS dimension_key,
          SUM(ces.has_cross_entity_flag * ces.committed_amount)
            / NULLIF(SUM(ces.committed_amount), 0) AS metric_value
        FROM l3.counterparty_exposure_summary ces
        WHERE ces.as_of_date = :as_of_date
        GROUP BY ces.facility_id
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      AVG of facility-level has_cross_entity_flag per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        AVG(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ces.facility_id AS dimension_key,
          SUM(ces.has_cross_entity_flag * ces.committed_amount)
            / NULLIF(SUM(ces.committed_amount), 0) AS metric_value
        FROM l3.counterparty_exposure_summary ces
        WHERE ces.as_of_date = :as_of_date
        GROUP BY ces.facility_id
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      AVG of facility-level has_cross_entity_flag per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        AVG(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ces.facility_id AS dimension_key,
          SUM(ces.has_cross_entity_flag * ces.committed_amount)
            / NULLIF(SUM(ces.committed_amount), 0) AS metric_value
        FROM l3.counterparty_exposure_summary ces
        WHERE ces.as_of_date = :as_of_date
        GROUP BY ces.facility_id
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      AVG of facility-level has_cross_entity_flag per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        AVG(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ces.facility_id AS dimension_key,
          SUM(ces.has_cross_entity_flag * ces.committed_amount)
            / NULLIF(SUM(ces.committed_amount), 0) AS metric_value
        FROM l3.counterparty_exposure_summary ces
        WHERE ces.as_of_date = :as_of_date
        GROUP BY ces.facility_id
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-022-V01"
    type: NOT_NULL
    description: "No null has_cross_entity_flag values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-045"
  abbreviation: "CEEF"
  insight: >
    Complexity and risk from intercompany exposure
  rollup_strategy: "direct-sum"
  primary_value_field: "has_cross_entity_flag"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics"]
dashboard_pages: []
legacy_metric_ids: []
