# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Net Interest Margin (%)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-028"
name: "Net Interest Margin (%)"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "profitability"
metric_class: CALCULATED
direction: HIGHER_BETTER
unit_type: PERCENTAGE
display_format: ".2f"
description: >
  Net Interest Income divided by Average Earning Assets. Core banking profitability
  measure assessing pricing effectiveness and lending margin. Sourced from L2
  facility_profitability_snapshot atomic data.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Profitability and earnings quality assessment"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_profitability_snapshot
    alias: fps
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: interest_income_amt
        role: MEASURE
      - name: interest_expense_amt
        role: MEASURE
      - name: avg_earning_assets_amt
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fps.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      (Interest Income - Interest Expense) / Average Earning Assets * 100.
    formula_sql: |
      SELECT
        fps.facility_id AS dimension_key,
        (COALESCE(fps.interest_income_amt, 0) - COALESCE(fps.interest_expense_amt, 0))
          / NULLIF(fps.avg_earning_assets_amt, 0) * 100.0 AS metric_value
      FROM l2.facility_profitability_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE fps.as_of_date = :as_of_date
  counterparty:
    aggregation_type: CUSTOM
    formula_text: >
      SUM(Net Interest Income) / SUM(Avg Earning Assets) * 100 per counterparty.
      Sum-ratio rollup preserves mathematical consistency.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        CASE WHEN SUM(COALESCE(fps.avg_earning_assets_amt, 0)) = 0 THEN NULL
             ELSE SUM(COALESCE(fps.interest_income_amt, 0) - COALESCE(fps.interest_expense_amt, 0))
                  / SUM(COALESCE(fps.avg_earning_assets_amt, 0)) * 100.0
        END AS metric_value
      FROM l2.facility_profitability_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE fps.as_of_date = :as_of_date
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: CUSTOM
    formula_text: >
      SUM(Net Interest Income) / SUM(Avg Earning Assets) * 100 per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE WHEN SUM(COALESCE(fps.avg_earning_assets_amt, 0)) = 0 THEN NULL
             ELSE SUM(COALESCE(fps.interest_income_amt, 0) - COALESCE(fps.interest_expense_amt, 0))
                  / SUM(COALESCE(fps.avg_earning_assets_amt, 0)) * 100.0
        END AS metric_value
      FROM l2.facility_profitability_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      WHERE fps.as_of_date = :as_of_date
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: >
      SUM(Net Interest Income) / SUM(Avg Earning Assets) * 100 per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        CASE WHEN SUM(COALESCE(fps.avg_earning_assets_amt, 0)) = 0 THEN NULL
             ELSE SUM(COALESCE(fps.interest_income_amt, 0) - COALESCE(fps.interest_expense_amt, 0))
                  / SUM(COALESCE(fps.avg_earning_assets_amt, 0)) * 100.0
        END AS metric_value
      FROM l2.facility_profitability_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      WHERE fps.as_of_date = :as_of_date
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: >
      SUM(Net Interest Income) / SUM(Avg Earning Assets) * 100 per L1 business segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        CASE WHEN SUM(COALESCE(fps.avg_earning_assets_amt, 0)) = 0 THEN NULL
             ELSE SUM(COALESCE(fps.interest_income_amt, 0) - COALESCE(fps.interest_expense_amt, 0))
                  / SUM(COALESCE(fps.avg_earning_assets_amt, 0)) * 100.0
        END AS metric_value
      FROM l2.facility_profitability_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
      WHERE fps.as_of_date = :as_of_date
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-028-V01"
    type: NOT_NULL
    description: "No null NIM values"
    severity: ERROR
  - rule_id: "EXP-028-V02"
    type: THRESHOLD
    description: "NIM typically 0-20%"
    severity: WARNING
    params:
      min: 0
      max: 20
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-061"
  abbreviation: "NIM"
  insight: >
    Core banking profitability — Net Interest Income as percentage of earning assets
  rollup_strategy: "sum-ratio"
  primary_value_field: "nim_pct"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "profitability", "margin"]
dashboard_pages: []
legacy_metric_ids: []
