# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Operating Cost ($)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-029"
name: "Operating Cost ($)"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "profitability"
metric_class: SOURCED
direction: LOWER_BETTER
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Allocated operating or servicing cost associated with each facility. Direct-sum
  rollup at all aggregate levels with FX conversion to USD.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Operational cost monitoring for efficiency assessment"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_financial_snapshot
    alias: ffs
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: operating_expense_amt
        role: MEASURE
      - name: currency_code
        role: DIMENSION
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = ffs.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = ffs.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = ffs.as_of_date"
    fields:
      - name: rate
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Read operating_expense_amt from facility_financial_snapshot for each
      facility as-of reporting date.
    formula_sql: |
      SELECT
        ffs.facility_id AS dimension_key,
        ffs.operating_expense_amt AS metric_value
      FROM l2.facility_financial_snapshot ffs
      WHERE ffs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level operating_expense_amt per counterparty, FX-converted to USD.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(ffs.operating_expense_amt * COALESCE(fx.rate, 1)) AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level operating_expense_amt per L3 desk segment, FX-converted to USD.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(ffs.operating_expense_amt * COALESCE(fx.rate, 1)) AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level operating_expense_amt per L2 portfolio segment, FX-converted to USD.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(ffs.operating_expense_amt * COALESCE(fx.rate, 1)) AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level operating_expense_amt per L1 business segment, FX-converted to USD.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(ffs.operating_expense_amt * COALESCE(fx.rate, 1)) AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-029-V01"
    type: NOT_NULL
    description: "No null operating_expense_amt values"
    severity: ERROR
  - rule_id: "EXP-029-V02"
    type: NON_NEGATIVE
    description: "Operating cost must be >= 0"
    severity: ERROR
  - rule_id: "EXP-029-V03"
    type: RECONCILIATION
    description: "SUM of facility operating costs should equal counterparty total"
    severity: WARNING
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-062"
  abbreviation: "OC"
  insight: >
    Expense monitoring — allocated operating and servicing costs per facility
  rollup_strategy: "direct-sum"
  primary_value_field: "operating_expense_amt"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "profitability", "cost"]
dashboard_pages: []
legacy_metric_ids: []
