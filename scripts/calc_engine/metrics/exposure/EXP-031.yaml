# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Revenue ($) — Interest Income + Fees Income
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-031"
name: "Revenue ($)"
version: "2.0.0"
owner: "market-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: HIGHER_BETTER
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Total facility-level revenue computed as Interest Income + Fee Income,
  adjusted for bank share percentage. Sourced from L2 atomic data in
  facility_profitability_snapshot (interest_income_amt, fee_income_amt)
  with bank share from facility_lender_allocation. Assesses scale of
  lending activity and income generation capacity.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Revenue capacity assessment for credit risk"
  - framework: "FR Y-14Q"
    schedule: "H.1"
    description: "Facility-level income and profitability metrics"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_profitability_snapshot
    alias: fps
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: interest_income_amt
        role: MEASURE
        description: "Facility interest income"
      - name: fee_income_amt
        role: MEASURE
        description: "Facility fee income"
      - name: base_currency_code
        role: DIMENSION
        description: "Base currency for FX conversion"
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fps.facility_id AND fm.is_active_flag = 'Y' AND fm.is_current_flag = 'Y'"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
  - schema: l2
    table: facility_lender_allocation
    alias: fla
    join_type: LEFT
    join_on: "fla.facility_id = fps.facility_id AND fla.is_current_flag = 'Y'"
    fields:
      - name: bank_share_pct
        role: MEASURE
        description: "Bank's participation share for bank-share-adjusted revenue"
      - name: is_current_flag
        role: FILTER
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = fps.base_currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = fps.as_of_date"
    fields:
      - name: rate
        role: MEASURE
        description: "FX spot rate to convert local currency to USD"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: SUM
    formula_text: >
      [Facility Revenue] = (interest_income_amt + fee_income_amt) × bank_share_pct / 100.
      USD-converted for consistent reporting.
    formula_sql: |
      SELECT
        fps.facility_id AS dimension_key,
        SUM((COALESCE(fps.interest_income_amt, 0)
          + COALESCE(fps.fee_income_amt, 0))
          * COALESCE(fla.bank_share_pct, 100.0) / 100.0
          * COALESCE(fx.rate, 1)) AS metric_value
      FROM l2.facility_profitability_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l2.facility_lender_allocation fla
        ON fla.facility_id = fps.facility_id
        AND fla.is_current_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = fps.base_currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = fps.as_of_date
      WHERE fps.as_of_date = :as_of_date
      GROUP BY fps.facility_id
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level revenue (bank-share-adjusted, USD-converted)
      per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fps.facility_id AS dimension_key,
          SUM((COALESCE(fps.interest_income_amt, 0)
            + COALESCE(fps.fee_income_amt, 0))
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS metric_value
        FROM l2.facility_profitability_snapshot fps
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fps.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fps.base_currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fps.as_of_date
        WHERE fps.as_of_date = :as_of_date
        GROUP BY fps.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level revenue (bank-share-adjusted, USD-converted)
      per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fps.facility_id AS dimension_key,
          SUM((COALESCE(fps.interest_income_amt, 0)
            + COALESCE(fps.fee_income_amt, 0))
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS metric_value
        FROM l2.facility_profitability_snapshot fps
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fps.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fps.base_currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fps.as_of_date
        WHERE fps.as_of_date = :as_of_date
        GROUP BY fps.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level revenue (bank-share-adjusted, USD-converted)
      per L2 portfolio segment via EBT hierarchy (one hop up).
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fps.facility_id AS dimension_key,
          SUM((COALESCE(fps.interest_income_amt, 0)
            + COALESCE(fps.fee_income_amt, 0))
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS metric_value
        FROM l2.facility_profitability_snapshot fps
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fps.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fps.base_currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fps.as_of_date
        WHERE fps.as_of_date = :as_of_date
        GROUP BY fps.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level revenue (bank-share-adjusted, USD-converted)
      per L1 business segment via EBT hierarchy (two hops up).
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fps.facility_id AS dimension_key,
          SUM((COALESCE(fps.interest_income_amt, 0)
            + COALESCE(fps.fee_income_amt, 0))
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS metric_value
        FROM l2.facility_profitability_snapshot fps
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = fps.facility_id
          AND fla.is_current_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fps.base_currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fps.as_of_date
        WHERE fps.as_of_date = :as_of_date
        GROUP BY fps.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-031-V01"
    type: NOT_NULL
    description: "No null revenue values for active facilities with profitability data"
    severity: ERROR
  - rule_id: "EXP-031-V02"
    type: NON_NEGATIVE
    description: "Revenue must be >= 0"
    severity: WARNING
  - rule_id: "EXP-031-V03"
    type: RECONCILIATION
    description: "SUM(facility revenue) should equal counterparty revenue for same-currency counterparties"
    severity: WARNING
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-070"
  abbreviation: "REV"
  insight: >
    Business activity scope — total interest income + fee income,
    bank-share-adjusted. Indicates lending income generation capacity.
  rollup_strategy: "direct-sum"
  primary_value_field: "revenue_amt"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "revenue", "income", "profitability"]
dashboard_pages: []
legacy_metric_ids: []
