# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Revenue ($)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-031"
name: "Revenue ($)"
version: "1.0.0"
owner: "market-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: HYBRID
direction: HIGHER_BETTER
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Total income generated by the borrower or attributed to the facility in
  millions USD. Used to assess scale and repayment capacity.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_financial_snapshot
    alias: ffs
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: revenue_amt
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = ffs.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: SUM
    formula_text: >
      SUM(revenue_amt) per facility from facility_financial_snapshot. Weighted by
      bank share percentage.
    formula_sql: |
      SELECT
        ffs.facility_id AS dimension_key,
        SUM(ffs.revenue_amt
          * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
      FROM l3.facility_financial_calc ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.facility_lender_allocation fla
        ON fla.facility_id = ffs.facility_id
        AND fla.is_current_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY ffs.facility_id
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level revenue_amt per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ffs.facility_id AS dimension_key,
          SUM(ffs.revenue_amt
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l3.facility_financial_calc ffs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = ffs.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE ffs.as_of_date = :as_of_date
        GROUP BY ffs.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level revenue_amt per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ffs.facility_id AS dimension_key,
          SUM(ffs.revenue_amt
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l3.facility_financial_calc ffs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = ffs.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE ffs.as_of_date = :as_of_date
        GROUP BY ffs.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level revenue_amt per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ffs.facility_id AS dimension_key,
          SUM(ffs.revenue_amt
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l3.facility_financial_calc ffs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = ffs.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE ffs.as_of_date = :as_of_date
        GROUP BY ffs.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level revenue_amt per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          ffs.facility_id AS dimension_key,
          SUM(ffs.revenue_amt
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l3.facility_financial_calc ffs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = ffs.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE ffs.as_of_date = :as_of_date
        GROUP BY ffs.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-031-V01"
    type: NOT_NULL
    description: "No null revenue_amt values"
    severity: ERROR
  - rule_id: "EXP-031-V02"
    type: NON_NEGATIVE
    description: "revenue_amt must be >= 0"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-070"
  abbreviation: "R"
  insight: >
    Business activity scope
  rollup_strategy: "direct-sum"
  primary_value_field: "revenue_amt"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics"]
dashboard_pages: []
legacy_metric_ids: []
