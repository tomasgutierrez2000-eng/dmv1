# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Collateral Market Value at Origination ($)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-032"
name: "Collateral Market Value at Origination ($)"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "collateral"
metric_class: HYBRID
direction: NEUTRAL
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Original appraised value of pledged collateral securing exposure, in USD.
  At facility level, sums original_valuation_usd from collateral_snapshot
  weighted by the bank's syndication share (bank_share_pct from
  facility_lender_allocation). Rolls up additively through counterparty,
  desk, portfolio, and business segment via the standard EBT hierarchy.
  Supports recovery analysis and secured lending assessment.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "CRM recognition — original collateral value (CRE 22)"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: collateral_snapshot
    alias: cs
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: original_valuation_usd
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = cs.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l2
    table: facility_lender_allocation
    alias: fla
    join_type: LEFT
    join_on: "fla.facility_id = cs.facility_id AND fla.is_current_flag = 'Y'"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: bank_share_pct
        role: MEASURE
      - name: is_current_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: SUM
    formula_text: >
      SUM(original_valuation_usd * bank_share_pct / 100) per facility.
      Bank share defaults to 100% if no lender allocation record.
    formula_sql: |
      SELECT
        cs.facility_id AS dimension_key,
        SUM(COALESCE(cs.original_valuation_usd, 0)
          * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
      FROM l2.collateral_snapshot cs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = cs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.facility_lender_allocation fla
        ON fla.facility_id = cs.facility_id
        AND fla.is_current_flag = 'Y'
      WHERE cs.as_of_date = :as_of_date
      GROUP BY cs.facility_id
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level collateral origination value per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          cs.facility_id AS dimension_key,
          SUM(COALESCE(cs.original_valuation_usd, 0)
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l2.collateral_snapshot cs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = cs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = cs.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE cs.as_of_date = :as_of_date
        GROUP BY cs.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level collateral origination value per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          cs.facility_id AS dimension_key,
          SUM(COALESCE(cs.original_valuation_usd, 0)
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l2.collateral_snapshot cs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = cs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = cs.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE cs.as_of_date = :as_of_date
        GROUP BY cs.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level collateral origination value per L2 portfolio
      segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          cs.facility_id AS dimension_key,
          SUM(COALESCE(cs.original_valuation_usd, 0)
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l2.collateral_snapshot cs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = cs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = cs.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE cs.as_of_date = :as_of_date
        GROUP BY cs.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level collateral origination value per L1 business
      segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          cs.facility_id AS dimension_key,
          SUM(COALESCE(cs.original_valuation_usd, 0)
            * COALESCE(fla.bank_share_pct, 100.0) / 100.0) AS metric_value
        FROM l2.collateral_snapshot cs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = cs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.facility_lender_allocation fla
          ON fla.facility_id = cs.facility_id
          AND fla.is_current_flag = 'Y'
        WHERE cs.as_of_date = :as_of_date
        GROUP BY cs.facility_id
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-032-V01"
    type: NOT_NULL
    description: "No null original_valuation_usd values"
    severity: ERROR
  - rule_id: "EXP-032-V02"
    type: NON_NEGATIVE
    description: "Collateral origination value must be >= 0"
    severity: ERROR
  - rule_id: "EXP-032-V03"
    type: RECONCILIATION
    description: "Sum of facility values should equal counterparty value for same-currency counterparties"
    severity: WARNING
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-075"
  abbreviation: "CMVA"
  insight: >
    Amount of credit risk mitigated — original appraised value of pledged
    collateral, weighted by bank syndication share.
  rollup_strategy: "direct-sum"
  primary_value_field: "original_valuation_usd"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "collateral", "valuation"]
dashboard_pages: []
legacy_metric_ids: []
