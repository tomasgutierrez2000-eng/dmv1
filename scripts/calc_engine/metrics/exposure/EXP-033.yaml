# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Risk Mitigant Sub Type
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-033"
name: "Risk Mitigant Sub Type"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "collateral"
metric_class: HYBRID
direction: NEUTRAL
unit_type: COUNT
display_format: "d"
description: >
  Count of distinct risk mitigant sub-types protecting exposure at each
  rollup level. Joins through the risk_mitigant_link bridge table to
  risk_mitigant_master and the risk_mitigant_type_dim taxonomy. Measures
  mitigation diversification — higher counts indicate broader collateral
  coverage across different sub-type categories (e.g. Sovereign Guarantee,
  Bank Guarantee, Cash Collateral, Real Estate, Equipment).
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "CRM eligibility by mitigant type (CRE 22)"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l2
    table: risk_mitigant_link
    alias: rml
    join_type: LEFT
    join_on: "rml.facility_id = fm.facility_id AND rml.is_current_flag = 'Y'"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: risk_mitigant_id
        role: JOIN_KEY
      - name: is_current_flag
        role: FILTER
  - schema: l2
    table: risk_mitigant_master
    alias: rmm
    join_type: LEFT
    join_on: "rmm.risk_mitigant_id = rml.risk_mitigant_id"
    fields:
      - name: risk_mitigant_id
        role: JOIN_KEY
      - name: risk_mitigant_subtype_code
        role: JOIN_KEY
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: risk_mitigant_type_dim
    alias: rmtd
    join_type: LEFT
    join_on: "rmtd.risk_mitigant_subtype_code = rmm.risk_mitigant_subtype_code"
    fields:
      - name: risk_mitigant_subtype_code
        role: MEASURE
      - name: subtype_name
        role: DIMENSION
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: SUM
    formula_text: >
      COUNT DISTINCT risk_mitigant_subtype_code per facility via
      risk_mitigant_link -> risk_mitigant_master -> risk_mitigant_type_dim.
      Only active mitigants with current link status.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        COUNT(DISTINCT rmtd.risk_mitigant_subtype_code) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l2.risk_mitigant_link rml
        ON rml.facility_id = fm.facility_id
        AND rml.is_current_flag = 'Y'
      LEFT JOIN l2.risk_mitigant_master rmm
        ON rmm.risk_mitigant_id = rml.risk_mitigant_id
        AND rmm.is_active_flag = 'Y'
      LEFT JOIN l1.risk_mitigant_type_dim rmtd
        ON rmtd.risk_mitigant_subtype_code = rmm.risk_mitigant_subtype_code
      WHERE fm.is_active_flag = 'Y'
      GROUP BY fm.facility_id
  counterparty:
    aggregation_type: SUM
    formula_text: >
      COUNT DISTINCT risk_mitigant_subtype_code across all facilities per
      counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        COUNT(DISTINCT rmtd.risk_mitigant_subtype_code) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l2.risk_mitigant_link rml
        ON rml.facility_id = fm.facility_id
        AND rml.is_current_flag = 'Y'
      LEFT JOIN l2.risk_mitigant_master rmm
        ON rmm.risk_mitigant_id = rml.risk_mitigant_id
        AND rmm.is_active_flag = 'Y'
      LEFT JOIN l1.risk_mitigant_type_dim rmtd
        ON rmtd.risk_mitigant_subtype_code = rmm.risk_mitigant_subtype_code
      WHERE fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      COUNT DISTINCT risk_mitigant_subtype_code across all facilities per
      L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        COUNT(DISTINCT rmtd.risk_mitigant_subtype_code) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l2.risk_mitigant_link rml
        ON rml.facility_id = fm.facility_id
        AND rml.is_current_flag = 'Y'
      LEFT JOIN l2.risk_mitigant_master rmm
        ON rmm.risk_mitigant_id = rml.risk_mitigant_id
        AND rmm.is_active_flag = 'Y'
      LEFT JOIN l1.risk_mitigant_type_dim rmtd
        ON rmtd.risk_mitigant_subtype_code = rmm.risk_mitigant_subtype_code
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      COUNT DISTINCT risk_mitigant_subtype_code across all facilities per
      L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        COUNT(DISTINCT rmtd.risk_mitigant_subtype_code) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l2.risk_mitigant_link rml
        ON rml.facility_id = fm.facility_id
        AND rml.is_current_flag = 'Y'
      LEFT JOIN l2.risk_mitigant_master rmm
        ON rmm.risk_mitigant_id = rml.risk_mitigant_id
        AND rmm.is_active_flag = 'Y'
      LEFT JOIN l1.risk_mitigant_type_dim rmtd
        ON rmtd.risk_mitigant_subtype_code = rmm.risk_mitigant_subtype_code
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      COUNT DISTINCT risk_mitigant_subtype_code across all facilities per
      L1 business segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        COUNT(DISTINCT rmtd.risk_mitigant_subtype_code) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l2.risk_mitigant_link rml
        ON rml.facility_id = fm.facility_id
        AND rml.is_current_flag = 'Y'
      LEFT JOIN l2.risk_mitigant_master rmm
        ON rmm.risk_mitigant_id = rml.risk_mitigant_id
        AND rmm.is_active_flag = 'Y'
      LEFT JOIN l1.risk_mitigant_type_dim rmtd
        ON rmtd.risk_mitigant_subtype_code = rmm.risk_mitigant_subtype_code
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-033-V01"
    type: NOT_NULL
    description: "No null mitigant subtype counts"
    severity: ERROR
  - rule_id: "EXP-033-V02"
    type: NON_NEGATIVE
    description: "Distinct subtype count must be >= 0"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-076"
  abbreviation: "RMST"
  insight: >
    Risk mitigation diversification — count of distinct mitigant sub-types
    (e.g. Cash Collateral, Sovereign Guarantee, Real Estate) protecting
    exposure at each level.
  rollup_strategy: "direct-sum"
  primary_value_field: "risk_mitigant_subtype_code"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "collateral", "risk-mitigation"]
dashboard_pages: []
legacy_metric_ids: []
