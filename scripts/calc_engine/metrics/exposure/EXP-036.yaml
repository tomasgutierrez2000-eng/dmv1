metric_id: EXP-036
name: Return on Equity (%)
version: 1.0.0
owner: market-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: exposure
sub_domain: risk-metrics
metric_class: CALCULATED
direction: NEUTRAL
unit_type: PERCENTAGE
display_format: .2f
description: |
  Net Income divided by Equity. Calculated profitability KPI measuring return generated on shareholder capital and supporting performance benchmarking.
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: counterparty_financial_snapshot
  alias: cfs
  join_type: BASE
  fields:
  - name: counterparty_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: net_income_amt
    role: MEASURE
  - name: shareholders_equity_amt
    role: MEASURE
- schema: l1
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.counterparty_id = cfs.counterparty_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: is_active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: |
      Net Income (Facility) / Allocated Equity (Facility)
    formula_sql: |-
      SELECT
        fm.facility_id AS dimension_key,
        cfs.net_income_amt / NULLIF(cfs.shareholders_equity_amt, 0) * 100.0 AS metric_value
      FROM l2.counterparty_financial_snapshot cfs
      INNER JOIN l1.facility_master fm
        ON fm.counterparty_id = cfs.counterparty_id
        AND fm.is_active_flag = 'Y'
      WHERE cfs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: CUSTOM
    formula_text: |
      Net Income / Shareholders Equity * 100 per counterparty (direct from financials).
    formula_sql: |-
      SELECT
        cfs.counterparty_id AS dimension_key,
        cfs.net_income_amt / NULLIF(cfs.shareholders_equity_amt, 0) * 100.0 AS metric_value
      FROM l2.counterparty_financial_snapshot cfs
      WHERE cfs.as_of_date = :as_of_date
  desk:
    aggregation_type: WEIGHTED_AVG
    formula_text: |
      Exposure-weighted average ROE per L3 desk segment.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fes_w.gross_exposure_usd) = 0 THEN NULL
             ELSE SUM(fac.metric_value * fes_w.gross_exposure_usd)
                  / SUM(fes_w.gross_exposure_usd)
        END AS metric_value
      FROM (
        SELECT
          cfs.counterparty_id,
          cfs.net_income_amt / NULLIF(cfs.shareholders_equity_amt, 0) * 100.0 AS metric_value
        FROM l2.counterparty_financial_snapshot cfs
        WHERE cfs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.counterparty_id = fac.counterparty_id
        AND fm.is_active_flag = 'Y'
      INNER JOIN l2.facility_exposure_snapshot fes_w
        ON fes_w.facility_id = fm.facility_id
        AND fes_w.as_of_date = :as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: WEIGHTED_AVG
    formula_text: |
      Exposure-weighted average ROE per L2 portfolio segment.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fes_w.gross_exposure_usd) = 0 THEN NULL
             ELSE SUM(fac.metric_value * fes_w.gross_exposure_usd)
                  / SUM(fes_w.gross_exposure_usd)
        END AS metric_value
      FROM (
        SELECT
          cfs.counterparty_id,
          cfs.net_income_amt / NULLIF(cfs.shareholders_equity_amt, 0) * 100.0 AS metric_value
        FROM l2.counterparty_financial_snapshot cfs
        WHERE cfs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.counterparty_id = fac.counterparty_id
        AND fm.is_active_flag = 'Y'
      INNER JOIN l2.facility_exposure_snapshot fes_w
        ON fes_w.facility_id = fm.facility_id
        AND fes_w.as_of_date = :as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: WEIGHTED_AVG
    formula_text: |
      Exposure-weighted average ROE per L1 business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fes_w.gross_exposure_usd) = 0 THEN NULL
             ELSE SUM(fac.metric_value * fes_w.gross_exposure_usd)
                  / SUM(fes_w.gross_exposure_usd)
        END AS metric_value
      FROM (
        SELECT
          cfs.counterparty_id,
          cfs.net_income_amt / NULLIF(cfs.shareholders_equity_amt, 0) * 100.0 AS metric_value
        FROM l2.counterparty_financial_snapshot cfs
        WHERE cfs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.counterparty_id = fac.counterparty_id
        AND fm.is_active_flag = 'Y'
      INNER JOIN l2.facility_exposure_snapshot fes_w
        ON fes_w.facility_id = fm.facility_id
        AND fes_w.as_of_date = :as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
depends_on: []
output:
  table: metric_result
validations:
- rule_id: EXP-036-V01
  type: NOT_NULL
  description: No null roe_pct values
  severity: ERROR
catalogue:
  item_id: MET-079
  abbreviation: ROE
  insight: |
    Return to shareholders
  rollup_strategy: weighted-avg
  primary_value_field: roe_pct
tags:
- exposure
- risk-metrics
dashboard_pages: []
legacy_metric_ids: []
