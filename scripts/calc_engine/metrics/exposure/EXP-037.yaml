# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Total Debt Service ($)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "EXP-037"
name: "Total Debt Service ($)"
version: "2.0.0"
owner: "market-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "exposure"
sub_domain: "risk-metrics"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: CURRENCY
display_format: "$,.0f"
description: >
  Total principal and interest obligations due within reporting period.
  Facility level in local currency; counterparty and above converted to USD.
  Used in repayment capacity and covenant analysis.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Repayment capacity assessment"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_financial_snapshot
    alias: ffs
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: interest_expense_amt
        role: MEASURE
      - name: principal_payment_amt
        role: MEASURE
      - name: currency_code
        role: JOIN_KEY
        description: "Original currency of financial amounts — used for FX conversion"
      - name: counterparty_id
        role: JOIN_KEY
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = ffs.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = ffs.as_of_date"
    fields:
      - name: from_currency_code
        role: JOIN_KEY
      - name: to_currency_code
        role: FILTER
      - name: rate
        role: MEASURE
        description: "Spot FX rate for converting to USD reporting currency"
      - name: as_of_date
        role: JOIN_KEY
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = ffs.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      Interest Expense + Principal Payment from facility_financial_snapshot.
      Facility level stays in local currency (no FX conversion).
    formula_sql: |-
      SELECT
        ffs.facility_id AS dimension_key,
        COALESCE(ffs.interest_expense_amt, 0) + COALESCE(ffs.principal_payment_amt, 0)
          AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level TDS converted to USD per counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM((COALESCE(ffs.interest_expense_amt, 0) + COALESCE(ffs.principal_payment_amt, 0))
            * COALESCE(fx.rate, 1)) AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level TDS converted to USD per L3 desk segment.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM((COALESCE(ffs.interest_expense_amt, 0) + COALESCE(ffs.principal_payment_amt, 0))
            * COALESCE(fx.rate, 1)) AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level TDS converted to USD per L2 portfolio segment.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM((COALESCE(ffs.interest_expense_amt, 0) + COALESCE(ffs.principal_payment_amt, 0))
            * COALESCE(fx.rate, 1)) AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level TDS converted to USD per L1 business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM((COALESCE(ffs.interest_expense_amt, 0) + COALESCE(ffs.principal_payment_amt, 0))
            * COALESCE(fx.rate, 1)) AS metric_value
      FROM l2.facility_financial_snapshot ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = ffs.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = ffs.as_of_date
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "EXP-037-V01"
    type: NOT_NULL
    description: "No null total_debt_service values"
    severity: ERROR
  - rule_id: "EXP-037-V02"
    type: NON_NEGATIVE
    description: "Total debt service must be >= 0"
    severity: ERROR
  - rule_id: "EXP-037-V03"
    type: RECONCILIATION
    description: "SUM(facility TDS) should equal counterparty TDS for same-currency counterparties"
    severity: ERROR
    params:
      tolerance_pct: 0.01
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-082"
  abbreviation: "TDS"
  insight: >
    Debt burden measure
  rollup_strategy: "direct-sum"
  primary_value_field: "total_debt_service_amt"
# ── METADATA ──────────────────────────────────────────────────
tags: ["exposure", "risk-metrics", "debt-service"]
dashboard_pages: []
legacy_metric_ids: []
