metric_id: EXP-045
name: Risk Weighted Average (%)
version: 1.0.0
owner: market-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: exposure
sub_domain: risk-metrics
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: PERCENTAGE
display_format: .2f
description: |
  Exposure-weighted average regulatory risk weight reflecting capital intensity.
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: facility_exposure_snapshot
  alias: fes
  join_type: BASE
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: rwa_amt
    role: MEASURE
  - name: gross_exposure_usd
    role: MEASURE
- schema: l1
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.facility_id = fes.facility_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(RWA Amount)/SUM(Exposure)
    formula_sql: |-
      SELECT
        fes.facility_id AS dimension_key,
        fes.rwa_amt / NULLIF(fes.gross_exposure_usd, 0) * 100.0 AS metric_value
      FROM l2.facility_exposure_snapshot fes
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fes.facility_id
        AND fm.active_flag = 'Y'
      WHERE fes.as_of_date = :as_of_date
  counterparty:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(rwa) / SUM(gross_exposure) * 100.0 per counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          fes.facility_id,
          fes.rwa_amt AS numerator_val,
          fes.gross_exposure_usd AS denominator_val
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.active_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(rwa) / SUM(gross_exposure) * 100.0 per L3 desk segment.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          fes.facility_id,
          fes.rwa_amt AS numerator_val,
          fes.gross_exposure_usd AS denominator_val
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.active_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(rwa) / SUM(gross_exposure) * 100.0 per L2 portfolio segment.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          fes.facility_id,
          fes.rwa_amt AS numerator_val,
          fes.gross_exposure_usd AS denominator_val
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.active_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(rwa) / SUM(gross_exposure) * 100.0 per L1 business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          fes.facility_id,
          fes.rwa_amt AS numerator_val,
          fes.gross_exposure_usd AS denominator_val
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.active_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
depends_on: []
output:
  table: metric_result
validations:
- rule_id: EXP-045-V01
  type: NOT_NULL
  description: No null rwa_density_pct values
  severity: ERROR
catalogue:
  item_id: MET-091
  abbreviation: RWA
  insight: |
    Capital intensity and risk density of portfolio
  rollup_strategy: weighted-avg
  primary_value_field: rwa_density_pct
tags:
- exposure
- risk-metrics
dashboard_pages: []
legacy_metric_ids: []
