metric_id: EXP-047
name: Fixed Cost Coverage Ratio (%)
version: 1.0.0
owner: market-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: exposure
sub_domain: risk-metrics
metric_class: CALCULATED
direction: HIGHER_BETTER
unit_type: PERCENTAGE
display_format: .2f
description: |
  Indicates how well cash flow covers fixed, non-discretionary obligations; highlights ability to withstand earnings volatility and signals potential liquidity stress/default risk.
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l3
  table: facility_financial_calc
  alias: ffs
  join_type: BASE
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: ebitda_amt
    role: MEASURE
  - name: total_debt_service_amt
    role: MEASURE
- schema: l2
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.facility_id = ffs.facility_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: is_active_flag
    role: FILTER
- schema: l2
  table: fx_rate
  alias: fx
  join_type: LEFT
  join_on: "fx.from_currency_code = fm.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = ffs.as_of_date"
  fields:
  - name: from_currency_code
    role: JOIN_KEY
  - name: to_currency_code
    role: FILTER
  - name: rate
    role: MEASURE
    description: "Spot FX rate for converting to USD reporting currency"
  - name: as_of_date
    role: JOIN_KEY
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: RAW
    formula_text: |
      Read fccr_value from lob_risk_ratio_summary for each facility as-of reporting date.
    formula_sql: |-
      SELECT
        ffs.facility_id AS dimension_key,
        ffs.ebitda_amt / NULLIF(ffs.total_debt_service_amt, 0) AS metric_value
      FROM l3.facility_financial_calc ffs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = ffs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE ffs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(ebitda × fx_rate) / SUM(total_debt_service × fx_rate) per counterparty.
      Amounts converted to USD via l2.fx_rate before aggregation.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val)
        END AS metric_value
      FROM (
        SELECT
          ffs.facility_id,
          ffs.ebitda_amt * COALESCE(fx.rate, 1) AS numerator_val,
          ffs.total_debt_service_amt * COALESCE(fx.rate, 1) AS denominator_val
        FROM l3.facility_financial_calc ffs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fm.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = ffs.as_of_date
        WHERE ffs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(ebitda × fx_rate) / SUM(total_debt_service × fx_rate) per L3 desk segment.
      Amounts converted to USD via l2.fx_rate before aggregation.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val)
        END AS metric_value
      FROM (
        SELECT
          ffs.facility_id,
          ffs.ebitda_amt * COALESCE(fx.rate, 1) AS numerator_val,
          ffs.total_debt_service_amt * COALESCE(fx.rate, 1) AS denominator_val
        FROM l3.facility_financial_calc ffs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fm.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = ffs.as_of_date
        WHERE ffs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(ebitda × fx_rate) / SUM(total_debt_service × fx_rate) per L2 portfolio segment.
      Amounts converted to USD via l2.fx_rate before aggregation.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val)
        END AS metric_value
      FROM (
        SELECT
          ffs.facility_id,
          ffs.ebitda_amt * COALESCE(fx.rate, 1) AS numerator_val,
          ffs.total_debt_service_amt * COALESCE(fx.rate, 1) AS denominator_val
        FROM l3.facility_financial_calc ffs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fm.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = ffs.as_of_date
        WHERE ffs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(ebitda × fx_rate) / SUM(total_debt_service × fx_rate) per L1 business segment.
      Amounts converted to USD via l2.fx_rate before aggregation.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val)
        END AS metric_value
      FROM (
        SELECT
          ffs.facility_id,
          ffs.ebitda_amt * COALESCE(fx.rate, 1) AS numerator_val,
          ffs.total_debt_service_amt * COALESCE(fx.rate, 1) AS denominator_val
        FROM l3.facility_financial_calc ffs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = ffs.facility_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fm.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = ffs.as_of_date
        WHERE ffs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
depends_on: []
output:
  table: metric_result
validations:
- rule_id: EXP-047-V01
  type: NOT_NULL
  description: No null fccr_value values
  severity: ERROR
catalogue:
  item_id: MET-094
  abbreviation: FCCR
  insight: |
    Ability to cover fixed financial obligations with cash flow; indicates liquidity strength and default risk.
  rollup_strategy: weighted-avg
  primary_value_field: fccr_value
tags:
- exposure
- risk-metrics
dashboard_pages: []
legacy_metric_ids: []
