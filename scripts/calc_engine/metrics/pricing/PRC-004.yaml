# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Fee Rate (%)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "PRC-004"
name: "Fee Rate (%)"
version: "1.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "pricing"
sub_domain: "facility-pricing"
metric_class: SOURCED
direction: NEUTRAL
unit_type: PERCENTAGE
display_format: ".2f"
description: >
  Fee percentage applied to committed or undrawn exposure. Sourced from
  l2.facility_pricing_snapshot at facility level. Supports pricing adequacy
  and revenue optimization analysis. Aggregate levels use exposure-weighted
  average with FX conversion to USD.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Pricing adequacy for risk-adjusted return analysis"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_pricing_snapshot
    alias: fps
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: fee_rate_pct
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fps.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: committed_facility_amt
        role: MEASURE
      - name: currency_code
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = fm.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = fps.as_of_date"
    fields:
      - name: rate
        role: MEASURE
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of fee_rate_pct from l2.facility_pricing_snapshot.
    formula_sql: |
      SELECT
        fps.facility_id AS dimension_key,
        fps.fee_rate_pct AS metric_value
      FROM l2.facility_pricing_snapshot fps
      WHERE fps.as_of_date = :as_of_date
  counterparty:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Supplementary (not in primary specification at counterparty level).
      Exposure-weighted average fee rate per counterparty with FX conversion:
      SUM(fee_rate * committed_amt * fx) / SUM(committed_amt * fx).
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fps.fee_rate_pct * COALESCE(fm.committed_facility_amt, 0) * COALESCE(fx.rate, 1))
          / NULLIF(SUM(COALESCE(fm.committed_facility_amt, 0) * COALESCE(fx.rate, 1)), 0) AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = fm.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = fps.as_of_date
      WHERE fps.as_of_date = :as_of_date
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Supplementary. Exposure-weighted average fee rate per L3 desk segment
      with FX conversion.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fps.fee_rate_pct * COALESCE(fm.committed_facility_amt, 0) * COALESCE(fx.rate, 1))
          / NULLIF(SUM(COALESCE(fm.committed_facility_amt, 0) * COALESCE(fx.rate, 1)), 0) AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = fm.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = fps.as_of_date
      WHERE fps.as_of_date = :as_of_date
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Supplementary. Exposure-weighted average fee rate per L2 portfolio
      segment with FX conversion.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fps.fee_rate_pct * COALESCE(fm.committed_facility_amt, 0) * COALESCE(fx.rate, 1))
          / NULLIF(SUM(COALESCE(fm.committed_facility_amt, 0) * COALESCE(fx.rate, 1)), 0) AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = fm.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = fps.as_of_date
      WHERE fps.as_of_date = :as_of_date
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Supplementary. Exposure-weighted average fee rate per L1 business
      segment with FX conversion.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fps.fee_rate_pct * COALESCE(fm.committed_facility_amt, 0) * COALESCE(fx.rate, 1))
          / NULLIF(SUM(COALESCE(fm.committed_facility_amt, 0) * COALESCE(fx.rate, 1)), 0) AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
      LEFT JOIN l2.fx_rate fx
        ON fx.from_currency_code = fm.currency_code
        AND fx.to_currency_code = 'USD'
        AND fx.as_of_date = fps.as_of_date
      WHERE fps.as_of_date = :as_of_date
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "PRC-004-V01"
    type: NOT_NULL
    description: "No null fee_rate_pct values"
    severity: WARNING
  - rule_id: "PRC-004-V02"
    type: THRESHOLD
    description: "Fee rate must be between 0 and 100 percent"
    severity: ERROR
    params:
      min: 0
      max: 100
  - rule_id: "PRC-004-V03"
    type: NON_NEGATIVE
    description: "Fee rate must be non-negative"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-042"
  abbreviation: "FR"
  insight: >
    Fee income and pricing structure
  rollup_strategy: "weighted-avg"
  primary_value_field: "fee_rate_pct"
# ── METADATA ──────────────────────────────────────────────────
tags: ["pricing", "facility-pricing"]
dashboard_pages: []
legacy_metric_ids: []
