metric_id: PRC-005
name: Pricing Exception Status
version: 1.0.0
owner: credit-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: pricing
sub_domain: facility-pricing
metric_class: CALCULATED
direction: NEUTRAL
unit_type: COUNT
display_format: ',.0f'
description: |
  Indicator identifying exposures priced outside standard policy guidelines. Supports governance discipline and pricing compliance monitoring.
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: facility_pricing_snapshot
  alias: fps
  join_type: BASE
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: pricing_exception_flag
    role: FILTER
  - name: pricing_exception_status
    role: MEASURE
- schema: l1
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.facility_id = fps.facility_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: is_active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: |
      Binary flag: 1 if pricing exception exists, 0 otherwise.
    formula_sql: |-
      SELECT
        fps.facility_id AS dimension_key,
        CASE WHEN fps.pricing_exception_flag = 'Y' THEN 1.0 ELSE 0.0 END AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE fps.as_of_date = :as_of_date
  counterparty:
    aggregation_type: COUNT
    formula_text: |
      COUNT of facilities with pricing exception per counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        COUNT(DISTINCT fac.facility_id) AS metric_value
      FROM (
        SELECT
          fm.facility_id
        FROM l2.facility_pricing_snapshot fps
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = fps.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE fps.as_of_date = :as_of_date
          AND fps.pricing_exception_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: COUNT
    formula_text: |
      COUNT of facilities with pricing exception per L3 desk segment.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fac.facility_id) AS metric_value
      FROM (
        SELECT
          fm.facility_id
        FROM l2.facility_pricing_snapshot fps
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = fps.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE fps.as_of_date = :as_of_date
          AND fps.pricing_exception_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: COUNT
    formula_text: |
      COUNT of facilities with pricing exception per L2 portfolio segment.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fac.facility_id) AS metric_value
      FROM (
        SELECT
          fm.facility_id
        FROM l2.facility_pricing_snapshot fps
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = fps.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE fps.as_of_date = :as_of_date
          AND fps.pricing_exception_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: COUNT
    formula_text: |
      COUNT of facilities with pricing exception per L1 business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fac.facility_id) AS metric_value
      FROM (
        SELECT
          fm.facility_id
        FROM l2.facility_pricing_snapshot fps
        INNER JOIN l1.facility_master fm
          ON fm.facility_id = fps.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE fps.as_of_date = :as_of_date
          AND fps.pricing_exception_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
depends_on: []
output:
  table: metric_result
validations:
- rule_id: PRC-005-V01
  type: NOT_NULL
  description: No null exception_status values
  severity: ERROR
catalogue:
  item_id: MET-065
  abbreviation: PES
  insight: |
    Pricing control effectiveness
  rollup_strategy: direct-sum
  primary_value_field: exception_status
tags:
- pricing
- facility-pricing
dashboard_pages: []
legacy_metric_ids: []
