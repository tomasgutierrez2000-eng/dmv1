# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Pricing Tier
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "PRC-006"
name: "Pricing Tier"
version: "1.0.0"
owner: "market-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "pricing"
sub_domain: "facility-pricing"
metric_class: SOURCED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Pricing classification tier assigned to facility. Supports structured pricing
  strategy and yield segmentation.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l3
    table: facility_detail_snapshot
    alias: fds
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: pricing_tier_code
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fds.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Read pricing_tier_code from facility_detail_snapshot for each facility as-of
      reporting date.
    formula_sql: |
      SELECT
        fds.facility_id AS dimension_key,
        fds.pricing_tier_code AS metric_value
      FROM l3.facility_detail_snapshot fds
      WHERE fds.as_of_date = :as_of_date
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Read pricing_tier_code per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        fds.pricing_tier_code AS metric_value
      FROM l3.facility_detail_snapshot fds
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fds.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE fds.as_of_date = :as_of_date
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level pricing_tier_code per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fds.facility_id AS dimension_key,
          fds.pricing_tier_code AS metric_value
        FROM l3.facility_detail_snapshot fds
        WHERE fds.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level pricing_tier_code per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fds.facility_id AS dimension_key,
          fds.pricing_tier_code AS metric_value
        FROM l3.facility_detail_snapshot fds
        WHERE fds.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level pricing_tier_code per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fds.facility_id AS dimension_key,
          fds.pricing_tier_code AS metric_value
        FROM l3.facility_detail_snapshot fds
        WHERE fds.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "PRC-006-V01"
    type: NOT_NULL
    description: "No null pricing_tier_code values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-066"
  abbreviation: "PT"
  insight: >
    Pricing segmentation
  rollup_strategy: "direct-sum"
  primary_value_field: "pricing_tier_code"
# ── METADATA ──────────────────────────────────────────────────
tags: ["pricing", "facility-pricing"]
dashboard_pages: []
legacy_metric_ids: []
