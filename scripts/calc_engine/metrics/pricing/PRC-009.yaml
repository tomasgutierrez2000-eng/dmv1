# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Pricing Exception Status
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "PRC-009"
name: "Pricing Exception Status"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "pricing"
sub_domain: "facility-pricing"
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: PERCENTAGE
display_format: ".2f"
description: >
  Pricing exception effectiveness metric. At facility level, returns
  an ordinal encoding of the pricing_exception_status (APPROVED=3,
  PENDING=2, DENIED=1, NONE=0). At aggregate levels, computes the
  exception rate as COUNT(exception facilities) / COUNT(total facilities)
  × 100, following the count-ratio rollup pattern. Re-counts at each
  level to avoid Simpson's paradox. Complements PRC-003 (Exception Rate)
  with status-level detail for governance drill-down.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    section: "SRP30"
    description: "Supervisory review — pricing governance and exception monitoring"
  - framework: "OCC Guidance"
    section: "2020-36"
    description: "Credit underwriting — pricing exception tracking and status reporting"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_pricing_snapshot
    alias: fps
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: is_pricing_exception_flag
        role: MEASURE
        description: "Boolean flag indicating pricing exception approval"
      - name: pricing_exception_status
        role: MEASURE
        description: "Exception status category (APPROVED, PENDING, DENIED)"
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fps.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: |
      Ordinal encoding of pricing_exception_status per facility:
        APPROVED = 3, PENDING = 2, DENIED = 1, NONE/NULL = 0.
      Ingredients: pricing_exception_status (L2 facility_pricing_snapshot)
    formula_sql: |-
      SELECT
        fps.facility_id AS dimension_key,
        CASE
          WHEN fps.pricing_exception_status = 'APPROVED' THEN 3
          WHEN fps.pricing_exception_status = 'PENDING' THEN 2
          WHEN fps.pricing_exception_status = 'DENIED' THEN 1
          ELSE 0
        END AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
  counterparty:
    aggregation_type: CUSTOM
    formula_text: |
      For each counterparty:
        1. LOAD is_pricing_exception_flag for all facilities
        2. COMPUTE COUNT(exceptions) / COUNT(total facilities) × 100
      Count-ratio rollup: re-counts from facility-level flags.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        CASE WHEN COUNT(*) = 0 THEN NULL
             ELSE SUM(CASE WHEN fps.is_pricing_exception_flag = 'Y'
                            THEN 1 ELSE 0 END) * 100.0
                  / COUNT(*)
        END AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: CUSTOM
    formula_text: |
      For each L3 Desk segment:
        1. JOIN l1.enterprise_business_taxonomy on lob_segment_id
        2. COMPUTE COUNT(exceptions) / COUNT(total facilities) × 100
      Count-ratio rollup per desk.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE WHEN COUNT(*) = 0 THEN NULL
             ELSE SUM(CASE WHEN fps.is_pricing_exception_flag = 'Y'
                            THEN 1 ELSE 0 END) * 100.0
                  / COUNT(*)
        END AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: |
      For each L2 Portfolio segment:
        1. Walk UP hierarchy: L3 desk → L2 portfolio via parent_segment_id
        2. COMPUTE COUNT(exceptions) / COUNT(total facilities) × 100
      Count-ratio rollup per portfolio. Drill-down returns exception
      facility details: Facility_ID, Facility_Name, Counterparty_ID,
      Counterparty_Name, Exception_Status, All_in_Rate.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        CASE WHEN COUNT(*) = 0 THEN NULL
             ELSE SUM(CASE WHEN fps.is_pricing_exception_flag = 'Y'
                            THEN 1 ELSE 0 END) * 100.0
                  / COUNT(*)
        END AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: |
      For each L1 Business Segment / LoB:
        1. Walk UP hierarchy: L3 → L2 → L1 via parent_segment_id chain
        2. COMPUTE COUNT(exceptions) / COUNT(total facilities) × 100
      Count-ratio rollup per business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        CASE WHEN COUNT(*) = 0 THEN NULL
             ELSE SUM(CASE WHEN fps.is_pricing_exception_flag = 'Y'
                            THEN 1 ELSE 0 END) * 100.0
                  / COUNT(*)
        END AS metric_value
      FROM l2.facility_pricing_snapshot fps
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fps.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "PRC-009-V01"
    type: NOT_NULL
    description: "Exception status must not be null for active facilities"
    severity: ERROR
  - rule_id: "PRC-009-V02"
    type: THRESHOLD
    description: "Exception rate at aggregate levels must be between 0% and 100%"
    severity: ERROR
    params:
      min: 0
      max: 100
  - rule_id: "PRC-009-V03"
    type: THRESHOLD
    description: "Exception rate above 15% warrants governance review per OCC 2020-36"
    severity: WARNING
    params:
      warning_above: 15
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-101"
  abbreviation: "PES"
  insight: >
    Pricing governance status indicator. Facility-level status encoding
    enables drill-down to individual exception decisions (APPROVED,
    PENDING, DENIED). Aggregate-level exception rate measures overall
    pricing discipline. Rates above 15% typically trigger OCC scrutiny.
    Complements PRC-003 with status-level granularity.
  rollup_strategy: "count-ratio"
  primary_value_field: "exception_status"
# ── METADATA ──────────────────────────────────────────────────
tags: ["pricing", "facility-pricing", "governance", "exceptions"]
dashboard_pages: ["P3"]
legacy_metric_ids: []
