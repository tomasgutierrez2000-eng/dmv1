# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Reporting Period (As-of Date)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-002"
name: "Reporting Period (As-of Date)"
version: "1.0.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: SOURCED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Snapshot date of the dataset used for reporting and aggregation. Serves as the
  temporal reference point for all balances, risk metrics, and performance
  indicators.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_exposure_snapshot
    alias: fes
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
  - schema: l1
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fes.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Read as_of_date from facility_exposure_snapshot for each facility as-of
      reporting date.
    formula_sql: |
      SELECT
        fes.facility_id AS dimension_key,
        fes.as_of_date AS metric_value
      FROM l2.facility_exposure_snapshot fes
      WHERE fes.as_of_date = :as_of_date
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Read as_of_date per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        fes.as_of_date AS metric_value
      FROM l2.facility_exposure_snapshot fes
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fes.facility_id
        AND fm.active_flag = 'Y'
      WHERE fes.as_of_date = :as_of_date
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level as_of_date per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fes.facility_id AS dimension_key,
          fes.as_of_date AS metric_value
        FROM l2.facility_exposure_snapshot fes
        WHERE fes.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level as_of_date per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fes.facility_id AS dimension_key,
          fes.as_of_date AS metric_value
        FROM l2.facility_exposure_snapshot fes
        WHERE fes.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level as_of_date per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fes.facility_id AS dimension_key,
          fes.as_of_date AS metric_value
        FROM l2.facility_exposure_snapshot fes
        WHERE fes.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-002-V01"
    type: NOT_NULL
    description: "No null as_of_date values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-006"
  abbreviation: "RPAD"
  insight: >
    Reporting period reference
  rollup_strategy: "direct-sum"
  primary_value_field: "as_of_date"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data"]
dashboard_pages: []
legacy_metric_ids: []
