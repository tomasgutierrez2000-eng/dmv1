# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Average Tenor (Years)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-003"
name: "Average Tenor (Years)"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: RATIO
display_format: ",.1f"
description: >
  Average tenor of the underlying facilities across exposures. For facility,
  displayed the calculated tenor based on Origination Date ("Effective Date")
  and Maturity Date ("End Date"). At other levels this metric is aggregated as
  an average to represent the average period of the underlying facilities.
  Calculated from l2.facility_master.maturity_date and origination_date.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: origination_date
        role: MEASURE
      - name: maturity_date
        role: MEASURE
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current facility record"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
        description: "SCD filter — only current taxonomy record"
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      For each Facility_ID, (Maturity Date - Origination Date) / 365.25
      to get tenor in years.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        ROUND(CAST((fm.maturity_date - fm.origination_date) AS NUMERIC) / 365.25, 1) AS metric_value
      FROM l2.facility_master fm
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
        AND fm.maturity_date IS NOT NULL
        AND fm.origination_date IS NOT NULL
  counterparty:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Average of facility-level tenor (years) across counterparty facilities.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        AVG(ROUND(CAST((fm.maturity_date - fm.origination_date) AS NUMERIC) / 365.25, 1)) AS metric_value
      FROM l2.facility_master fm
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
        AND fm.maturity_date IS NOT NULL
        AND fm.origination_date IS NOT NULL
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      AVG of facility-level tenor (years) per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        AVG(ROUND(CAST((fm.maturity_date - fm.origination_date) AS NUMERIC) / 365.25, 1)) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
        AND fm.maturity_date IS NOT NULL
        AND fm.origination_date IS NOT NULL
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      AVG of facility-level tenor (years) per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        AVG(ROUND(CAST((fm.maturity_date - fm.origination_date) AS NUMERIC) / 365.25, 1)) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
        AND fm.maturity_date IS NOT NULL
        AND fm.origination_date IS NOT NULL
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      AVG of facility-level tenor (years) per L1 business segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        AVG(ROUND(CAST((fm.maturity_date - fm.origination_date) AS NUMERIC) / 365.25, 1)) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
        AND fm.maturity_date IS NOT NULL
        AND fm.origination_date IS NOT NULL
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-003-V01"
    type: NOT_NULL
    description: "No null tenor values (requires both origination_date and maturity_date)"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-007"
  abbreviation: "ATY"
  insight: >
    Portfolio maturity profile
  rollup_strategy: "weighted-avg"
  primary_value_field: "tenor_years"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data"]
dashboard_pages: []
legacy_metric_ids: []
