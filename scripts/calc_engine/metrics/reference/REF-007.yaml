# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Credit Agreement ID
# ═══════════════════════════════════════════════════════════════

# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-007"
name: "Credit Agreement ID"
version: "1.1.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null

# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: SOURCED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Unique identifier linking each facility to its governing credit agreement
  documentation. Used for contract tracking, facility-to-agreement linkage,
  and regulatory reporting. At counterparty level, returns count of distinct
  credit agreements per borrower.

# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Credit agreement identification for facility-level regulatory reporting"
  - framework: "FR Y-14Q"
    description: "Schedule H.1 — credit agreement linkage for facility reporting"

# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: credit_agreement_id
        role: MEASURE
      - name: counterparty_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l2
    table: credit_agreement_master
    alias: cam
    join_type: INNER
    join_on: "cam.credit_agreement_id = fm.credit_agreement_id"
    fields:
      - name: credit_agreement_id
        role: JOIN_KEY

# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of credit_agreement_id for each active facility via
      facility_master joined to credit_agreement_master.
    formula_sql: |-
      SELECT
        fm.facility_id AS dimension_key,
        fm.credit_agreement_id AS metric_value
      FROM l2.facility_master fm
      INNER JOIN l2.credit_agreement_master cam
        ON cam.credit_agreement_id = fm.credit_agreement_id
      WHERE fm.is_active_flag = 'Y'
  counterparty:
    aggregation_type: COUNT_DISTINCT
    formula_text: >
      Count of distinct credit agreements per counterparty. Provides visibility
      into borrower complexity and multi-agreement relationships.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        COUNT(DISTINCT fm.credit_agreement_id) AS metric_value
      FROM l2.facility_master fm
      INNER JOIN l2.credit_agreement_master cam
        ON cam.credit_agreement_id = fm.credit_agreement_id
      WHERE fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: COUNT_DISTINCT
    formula_text: >
      Count of distinct credit agreements per L3 desk segment via
      enterprise_business_taxonomy.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fm.credit_agreement_id) AS metric_value
      FROM l2.facility_master fm
      INNER JOIN l2.credit_agreement_master cam
        ON cam.credit_agreement_id = fm.credit_agreement_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: COUNT_DISTINCT
    formula_text: >
      Count of distinct credit agreements per L2 portfolio segment.
      Traverses EBT hierarchy L3 → L2 via parent_segment_id.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fm.credit_agreement_id) AS metric_value
      FROM l2.facility_master fm
      INNER JOIN l2.credit_agreement_master cam
        ON cam.credit_agreement_id = fm.credit_agreement_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: COUNT_DISTINCT
    formula_text: >
      Count of distinct credit agreements per L1 business segment.
      Full EBT hierarchy traversal L3 → L2 → L1.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fm.credit_agreement_id) AS metric_value
      FROM l2.facility_master fm
      INNER JOIN l2.credit_agreement_master cam
        ON cam.credit_agreement_id = fm.credit_agreement_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id

# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []

# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result

# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-007-V01"
    type: NOT_NULL
    description: "No null credit_agreement_id values at facility level"
    severity: ERROR

# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-018"
  abbreviation: "CAI"
  insight: >
    Contract tracking identifier linking facilities to governing credit
    agreements. Count at counterparty level reveals multi-agreement complexity.
  rollup_strategy: "direct-sum"
  primary_value_field: "credit_agreement_id"

# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data"]
dashboard_pages: []
legacy_metric_ids: []
