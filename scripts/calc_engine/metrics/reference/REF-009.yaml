# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Facility Origination Date
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-009"
name: "Facility Origination Date"
version: "3.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: HYBRID
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Facility effective date sourced from facility_master origination_date.
  At facility and counterparty levels, returns the raw date (or earliest
  vintage via MIN). At portfolio level, pivots to facility lifecycle
  tracking: counts inactive facilities whose origination date falls
  within 90 days of the reporting date, identifying the upcoming pipeline
  of facilities about to start ("Starting 90d"). Key for vintage analysis,
  portfolio seasoning, and facility pipeline monitoring.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    section: "CRE20"
    description: "Loan origination and vintage tracking for credit risk assessment"
  - framework: "FR Y-14Q"
    schedule: "H.1"
    description: "CRE loan schedule — origination date reporting field"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
        description: "Active/inactive status — pipeline count uses != 'Y'"
      - name: is_current_flag
        role: FILTER
      - name: origination_date
        role: MEASURE
        description: "Date the facility became legally effective"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: |
      Direct lookup of origination_date from facility_master.
      Ingredients: origination_date (L2 facility_master — raw field)
    formula_sql: |-
      SELECT
        fm.facility_id AS dimension_key,
        fm.origination_date AS metric_value
      FROM l2.facility_master fm
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
  counterparty:
    aggregation_type: MIN
    formula_text: |
      For each counterparty:
        1. LOAD origination_date from l2.facility_master for all active facilities
        2. COMPUTE MIN(origination_date) — earliest contract vintage
      Indicates the oldest banking relationship tenure for this counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        MIN(fm.origination_date) AS metric_value
      FROM l2.facility_master fm
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: MIN
    formula_text: |
      For each L3 Desk segment:
        1. LOAD origination_date from l2.facility_master
        2. JOIN l1.enterprise_business_taxonomy on lob_segment_id
        3. COMPUTE MIN(origination_date) — earliest vintage in desk book
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        MIN(fm.origination_date) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: |
      Facility pipeline tracking for each L2 Portfolio segment:
        1. Walk UP hierarchy: L3 desk → L2 portfolio via parent_segment_id
        2. FILTER inactive facilities (is_active_flag != 'Y')
           whose origination_date is within 90 days of current date
        3. COMPUTE COUNT(DISTINCT facility_id) — number of upcoming facilities
      Returns the count of facilities in the "Starting (90d)" pipeline.
      Business rule: facilities not yet active with origination within ±90 days.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fm.facility_id) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      WHERE fm.is_current_flag = 'Y'
        AND fm.is_active_flag != 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: MIN
    formula_text: |
      For each L1 Business Segment / LoB:
        1. Walk UP hierarchy: L3 → L2 → L1 via parent_segment_id chain
        2. COMPUTE MIN(origination_date) — earliest vintage in business segment
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        MIN(fm.origination_date) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-009-V01"
    type: NOT_NULL
    description: "No null origination_date values for active facilities"
    severity: ERROR
  - rule_id: "REF-009-V02"
    type: NON_NEGATIVE
    description: "Pipeline count at portfolio level must be >= 0"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-029"
  abbreviation: "FOD"
  insight: >
    Facility lifecycle tracking. Raw origination date at facility/counterparty
    levels enables vintage analysis. Portfolio-level pipeline count identifies
    inactive facilities approaching activation — essential for resource planning
    and onboarding capacity management.
  rollup_strategy: "direct-sum"
  primary_value_field: "origination_date"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data", "vintage", "pipeline"]
dashboard_pages: []
legacy_metric_ids: []
