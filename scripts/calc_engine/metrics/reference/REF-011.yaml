# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Facility Name
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-011"
name: "Facility Name"
version: "1.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: SOURCED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Descriptive name of the facility as documented in the credit agreement. Used
  for reporting clarity and operational reference.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Facility-level identification for regulatory reporting"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
      - name: facility_name
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of facility_name from facility_master.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        fm.facility_name AS metric_value
      FROM l2.facility_master fm
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Representative facility_name per counterparty (MIN alphabetical).
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        MIN(fm.facility_name) AS metric_value
      FROM l2.facility_master fm
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: RAW
    formula_text: >
      Representative facility_name per L3 desk segment (MIN alphabetical).
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        MIN(fm.facility_name) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: RAW
    formula_text: >
      Representative facility_name per L2 portfolio segment (MIN alphabetical).
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        MIN(fm.facility_name) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: RAW
    formula_text: >
      Representative facility_name per L1 business segment (MIN alphabetical).
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        MIN(fm.facility_name) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-011-V01"
    type: NOT_NULL
    description: "No null facility_name values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-039"
  abbreviation: "FN"
  insight: >
    Identification
  rollup_strategy: "direct-sum"
  primary_value_field: "facility_name"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data"]
dashboard_pages: []
legacy_metric_ids: []
