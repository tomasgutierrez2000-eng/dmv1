# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Facility Type — Dominant Facility Type by Exposure
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-012"
name: "Facility Type"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: HYBRID
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Type of credit facility (e.g., Term Loan, Revolver, Letter of Credit).
  At facility level, returns the facility_type string directly. At
  counterparty and aggregate levels, returns the dominant facility type
  by drawn exposure weight using ROW_NUMBER. Enables product-level
  segmentation, risk concentration analysis, and performance benchmarking.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Product-level segmentation for concentration risk reporting"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: facility_type
        role: MEASURE
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
  - schema: l2
    table: facility_exposure_snapshot
    alias: fes
    join_type: LEFT
    join_on: "fes.facility_id = fm.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: drawn_amount
        role: MEASURE
        description: "Exposure weighting for dominant type selection"
      - name: bank_share_pct
        role: MEASURE
      - name: currency_code
        role: DIMENSION
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = fes.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = fes.as_of_date"
    fields:
      - name: rate
        role: MEASURE
        description: "FX spot rate for USD conversion at aggregate levels"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of facility_type from facility_master.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        fm.facility_type AS metric_value
      FROM l2.facility_master fm
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
  counterparty:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant facility type by drawn exposure weight per counterparty.
      ROW_NUMBER partitioned by counterparty, ordered by total
      bank-share-adjusted drawn amount descending.
    formula_sql: |
      SELECT
        sub.counterparty_id AS dimension_key,
        sub.facility_type AS metric_value
      FROM (
        SELECT
          fm.counterparty_id,
          fm.facility_type,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY fm.counterparty_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0) DESC
          ) AS rn
        FROM l2.facility_master fm
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = fm.facility_id
          AND fes.as_of_date = :as_of_date
        WHERE fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        GROUP BY fm.counterparty_id, fm.facility_type
      ) sub
      WHERE sub.rn = 1
  desk:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant facility type by drawn exposure weight (USD-converted) per
      L3 desk segment. ROW_NUMBER partitioned by desk, ordered by
      total exposure descending.
    formula_sql: |
      SELECT
        sub.segment_id AS dimension_key,
        sub.facility_type AS metric_value
      FROM (
        SELECT
          ebt.managed_segment_id AS segment_id,
          fm.facility_type,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt.managed_segment_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0
              * COALESCE(fx.rate, 1)) DESC
          ) AS rn
        FROM l2.facility_master fm
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = fm.facility_id
          AND fes.as_of_date = :as_of_date
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fes.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fes.as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt
          ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
        WHERE fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        GROUP BY ebt.managed_segment_id, fm.facility_type
      ) sub
      WHERE sub.rn = 1
  portfolio:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant facility type by drawn exposure weight (USD-converted) per
      L2 portfolio segment via EBT hierarchy (one hop up).
    formula_sql: |
      SELECT
        sub.segment_id AS dimension_key,
        sub.facility_type AS metric_value
      FROM (
        SELECT
          ebt_l2.managed_segment_id AS segment_id,
          fm.facility_type,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt_l2.managed_segment_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0
              * COALESCE(fx.rate, 1)) DESC
          ) AS rn
        FROM l2.facility_master fm
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = fm.facility_id
          AND fes.as_of_date = :as_of_date
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fes.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fes.as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
        WHERE fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        GROUP BY ebt_l2.managed_segment_id, fm.facility_type
      ) sub
      WHERE sub.rn = 1
  business_segment:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant facility type by drawn exposure weight (USD-converted) per
      L1 business segment via EBT hierarchy (two hops up).
    formula_sql: |
      SELECT
        sub.segment_id AS dimension_key,
        sub.facility_type AS metric_value
      FROM (
        SELECT
          ebt_l1.managed_segment_id AS segment_id,
          fm.facility_type,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt_l1.managed_segment_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0
              * COALESCE(fx.rate, 1)) DESC
          ) AS rn
        FROM l2.facility_master fm
        INNER JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = fm.facility_id
          AND fes.as_of_date = :as_of_date
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fes.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fes.as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
          ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
        WHERE fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        GROUP BY ebt_l1.managed_segment_id, fm.facility_type
      ) sub
      WHERE sub.rn = 1
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-012-V01"
    type: NOT_NULL
    description: "No null facility_type values for active facilities"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-041"
  abbreviation: "FT"
  insight: >
    Facility type classification. At facility level shows the type
    string; at aggregate levels shows the dominant facility type by
    drawn exposure weight.
  rollup_strategy: "custom"
  primary_value_field: "facility_type"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data", "product-mix"]
dashboard_pages: []
legacy_metric_ids: []
