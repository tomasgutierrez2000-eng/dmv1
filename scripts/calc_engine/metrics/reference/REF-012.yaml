# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Facility Type
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-012"
name: "Facility Type"
version: "1.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: HYBRID
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Type of credit facility (e.g., Term Loan, Revolver, Letter of Credit).
  Enables product-level segmentation, risk concentration analysis, and
  performance benchmarking. At facility level returns the facility type
  string; at aggregate levels returns the count of distinct active facilities
  in the segment for distribution analysis.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Product-level segmentation for concentration risk reporting"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: facility_type
        role: MEASURE
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of facility_type from facility_master.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        fm.facility_type AS metric_value
      FROM l2.facility_master fm
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Not in primary specification at counterparty level.
      Supplementary: representative facility_type per counterparty (MIN).
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        MIN(fm.facility_type) AS metric_value
      FROM l2.facility_master fm
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: COUNT
    formula_text: >
      Count distinct active facilities per L3 desk segment. Provides
      facility distribution for product mix analysis.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fm.facility_id) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: COUNT
    formula_text: >
      Count distinct active facilities per L2 portfolio segment. Provides
      facility distribution for product mix analysis.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fm.facility_id) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: COUNT
    formula_text: >
      Count distinct active facilities per L1 business segment. Provides
      facility distribution for product mix analysis.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fm.facility_id) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-012-V01"
    type: NOT_NULL
    description: "No null facility_type values for active facilities"
    severity: ERROR
  - rule_id: "REF-012-V02"
    type: NON_NEGATIVE
    description: "Facility count at aggregate levels must be non-negative"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-041"
  abbreviation: "FT"
  insight: >
    Risk and product mix segmentation
  rollup_strategy: "direct-sum"
  primary_value_field: "facility_type"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data", "product-mix"]
dashboard_pages: []
legacy_metric_ids: []
