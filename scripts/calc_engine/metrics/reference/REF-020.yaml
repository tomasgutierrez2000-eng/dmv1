# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Line of Business L2 (Portfolio)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-020"
name: "Line of Business L2"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: SOURCED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Level 2 (Portfolio) Line of Business hierarchy code. For each facility,
  traverses one hop up from the assigned EBT segment via parent_segment_id
  to reach the L2 portfolio node, returning its parent path code.
  Enables detailed business segment analysis (e.g. CRE > Office).
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Business line sub-classification for risk aggregation"
  - framework: "FR Y-14Q"
    description: "Schedule H.1 sub-line of business reporting"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: JOIN_KEY
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: JOIN_KEY
      - name: parent
        role: MEASURE
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Traverse one hop up the EBT hierarchy from facility lob_segment_id
      to reach the L2 portfolio ancestor and return its parent code.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        ebt_l2.parent AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Deterministic selection (MIN) of L2 portfolio parent code across
      all facilities belonging to the counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        MIN(ebt_l2.parent) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: RAW
    formula_text: >
      For each L3 desk, traverse one hop up to the L2 portfolio
      ancestor and return its parent code.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        MIN(ebt_l2.parent) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: RAW
    formula_text: >
      At L2 portfolio level, the segment IS the L2 portfolio.
      Return its own parent code directly.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        MIN(ebt_l2.parent) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: RAW
    formula_text: >
      For each L1 business segment, returns the L2 portfolio parent codes
      of child portfolios. Uses MIN for deterministic string selection.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        MIN(ebt_l2.parent) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-020-V01"
    type: NOT_NULL
    description: "No null L2 parent values for facilities with multi-level EBT assignment"
    severity: WARNING
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-055"
  abbreviation: "LOB_L2"
  insight: >
    Detailed business segment analysis
  rollup_strategy: "none"
  primary_value_field: "parent"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data", "organizational-hierarchy"]
dashboard_pages: []
legacy_metric_ids: []
