# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Line of Business L3 (Desk)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-021"
name: "Line of Business L3"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: SOURCED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Level 3 (Desk) Line of Business hierarchy code. Returns the parent path
  code of the EBT segment directly assigned to each facility via lob_segment_id.
  Represents the most granular organizational segment view
  (e.g. CRE > Office > Lease Up Desk).
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Granular business line classification for risk reporting"
  - framework: "FR Y-14Q"
    description: "Desk-level exposure classification"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: JOIN_KEY
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: JOIN_KEY
      - name: parent
        role: MEASURE
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of parent code from enterprise_business_taxonomy
      via facility_master.lob_segment_id. For L3-assigned facilities
      this returns the L3 desk parent code.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        ebt.parent AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Deterministic selection (MIN) of L3 desk parent code across
      all facilities belonging to the counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        MIN(ebt.parent) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: RAW
    formula_text: >
      Direct parent code lookup per L3 desk segment. The desk level
      IS the L3 level, so return the segment own parent code.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        MIN(ebt.parent) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
        AND ebt.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: RAW
    formula_text: >
      L3 desk parent codes rolled up to L2 portfolio level. Returns
      MIN of desk-level parent codes within each portfolio.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        MIN(ebt_l3.parent) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: RAW
    formula_text: >
      L3 desk parent codes rolled up to L1 business segment level.
      Returns MIN of desk-level parent codes within each segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        MIN(ebt_l3.parent) AS metric_value
      FROM l2.facility_master fm
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
        AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        AND ebt_l1.is_current_flag = 'Y'
      WHERE fm.is_active_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-021-V01"
    type: NOT_NULL
    description: "No null L3 parent values for desk-assigned facilities"
    severity: WARNING
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-056"
  abbreviation: "LOB_L3"
  insight: >
    Most granular segment view
  rollup_strategy: "none"
  primary_value_field: "parent"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data", "organizational-hierarchy"]
dashboard_pages: []
legacy_metric_ids: []
