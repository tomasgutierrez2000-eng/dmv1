# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Product — Dominant Product Classification by Exposure
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-025"
name: "Product"
version: "3.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: HYBRID
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Product classification from the Enterprise Product Taxonomy for each
  facility. At facility level, returns the product_name (e.g., Term Loan,
  Revolver, Letter of Credit). At aggregate levels, returns the dominant
  product by drawn exposure weight (bank-share-adjusted, USD-converted)
  using ROW_NUMBER to identify the highest-exposure product in the segment.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Product-level exposure segmentation for concentration risk"
  - framework: "FR Y-14Q"
    schedule: "H.1"
    description: "Facility-level product classification and exposure"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_exposure_snapshot
    alias: fes
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: drawn_amount
        role: MEASURE
        description: "Outstanding drawn exposure (weighting for dominant product)"
      - name: bank_share_pct
        role: MEASURE
        description: "Bank's syndication share percentage"
      - name: product_node_id
        role: DIMENSION
        description: "FK to enterprise_product_taxonomy"
      - name: currency_code
        role: DIMENSION
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fes.facility_id AND fm.is_active_flag = 'Y' AND fm.is_current_flag = 'Y'"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
  - schema: l1
    table: enterprise_product_taxonomy
    alias: ept
    join_type: LEFT
    join_on: "ept.product_node_id = fes.product_node_id"
    fields:
      - name: product_node_id
        role: JOIN_KEY
      - name: product_name
        role: DIMENSION
        description: "Human-readable product classification name"
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = fes.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = fes.as_of_date"
    fields:
      - name: rate
        role: MEASURE
        description: "FX spot rate to convert local currency to USD"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Product name lookup from enterprise_product_taxonomy via
      facility_exposure_snapshot.product_node_id.
    formula_sql: |
      SELECT
        fes.facility_id AS dimension_key,
        MAX(ept.product_name) AS metric_value
      FROM l2.facility_exposure_snapshot fes
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fes.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_product_taxonomy ept
        ON ept.product_node_id = fes.product_node_id
      WHERE fes.as_of_date = :as_of_date
      GROUP BY fes.facility_id
  counterparty:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant product by drawn exposure weight per counterparty.
      ROW_NUMBER partitioned by counterparty, ordered by total
      bank-share-adjusted drawn amount descending.
    formula_sql: |
      SELECT
        sub.counterparty_id AS dimension_key,
        sub.product_name AS metric_value
      FROM (
        SELECT
          fm.counterparty_id,
          ept.product_name,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY fm.counterparty_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0) DESC
          ) AS rn
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_product_taxonomy ept
          ON ept.product_node_id = fes.product_node_id
        WHERE fes.as_of_date = :as_of_date
        GROUP BY fm.counterparty_id, ept.product_name
      ) sub
      WHERE sub.rn = 1
  desk:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant product by drawn exposure weight (USD-converted) per
      L3 desk segment. ROW_NUMBER partitioned by desk, ordered by
      total exposure descending.
    formula_sql: |
      SELECT
        sub.segment_id AS dimension_key,
        sub.product_name AS metric_value
      FROM (
        SELECT
          ebt.managed_segment_id AS segment_id,
          ept.product_name,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt.managed_segment_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0
              * COALESCE(fx.rate, 1)) DESC
          ) AS rn
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_product_taxonomy ept
          ON ept.product_node_id = fes.product_node_id
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fes.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fes.as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt
          ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
        GROUP BY ebt.managed_segment_id, ept.product_name
      ) sub
      WHERE sub.rn = 1
  portfolio:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant product by drawn exposure weight (USD-converted) per
      L2 portfolio segment via EBT hierarchy (one hop up).
    formula_sql: |
      SELECT
        sub.segment_id AS dimension_key,
        sub.product_name AS metric_value
      FROM (
        SELECT
          ebt_l2.managed_segment_id AS segment_id,
          ept.product_name,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt_l2.managed_segment_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0
              * COALESCE(fx.rate, 1)) DESC
          ) AS rn
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_product_taxonomy ept
          ON ept.product_node_id = fes.product_node_id
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fes.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fes.as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
        GROUP BY ebt_l2.managed_segment_id, ept.product_name
      ) sub
      WHERE sub.rn = 1
  business_segment:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant product by drawn exposure weight (USD-converted) per
      L1 business segment via EBT hierarchy (two hops up).
    formula_sql: |
      SELECT
        sub.segment_id AS dimension_key,
        sub.product_name AS metric_value
      FROM (
        SELECT
          ebt_l1.managed_segment_id AS segment_id,
          ept.product_name,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt_l1.managed_segment_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0
              * COALESCE(fx.rate, 1)) DESC
          ) AS rn
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_product_taxonomy ept
          ON ept.product_node_id = fes.product_node_id
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fes.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fes.as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
          ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
        GROUP BY ebt_l1.managed_segment_id, ept.product_name
      ) sub
      WHERE sub.rn = 1
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-025-V01"
    type: NOT_NULL
    description: "No null product_name values for active facilities with product_node_id"
    severity: ERROR
  - rule_id: "REF-025-V02"
    type: CUSTOM_SQL
    description: "Every product_node_id must exist in enterprise_product_taxonomy"
    severity: WARNING
    custom_sql: |
      SELECT COUNT(*) AS orphan_count
      FROM l2.facility_exposure_snapshot fes
      LEFT JOIN l1.enterprise_product_taxonomy ept
        ON ept.product_node_id = fes.product_node_id
      WHERE ept.product_node_id IS NULL
        AND fes.product_node_id IS NOT NULL
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-068"
  abbreviation: "PROD"
  insight: >
    Product classification from Enterprise Product Taxonomy. At facility
    level shows the product name; at aggregate levels shows the dominant
    product by drawn exposure weight.
  rollup_strategy: "custom"
  primary_value_field: "product_name"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data", "product", "concentration"]
dashboard_pages: []
legacy_metric_ids: []
