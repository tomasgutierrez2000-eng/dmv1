# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Region
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-026"
name: "Region"
version: "1.0.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: HYBRID
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Geographic region classification tied to location of deal origination,
  supporting portfolio segmentation and concentration monitoring.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l1
    table: counterparty
    alias: cp
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: region_code
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of region_code from counterparty.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        cp.region_code AS metric_value
      FROM l1.facility_master fm
      INNER JOIN l1.counterparty cp
        ON cp.counterparty_id = fm.counterparty_id
        AND cp.is_current_flag = 'Y'
      WHERE fm.active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Direct lookup of region_code from counterparty.
    formula_sql: |
      SELECT
        cp.counterparty_id AS dimension_key,
        cp.region_code AS metric_value
      FROM l1.counterparty cp
      WHERE cp.is_current_flag = 'Y'
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level region_code per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          cp.region_code AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.counterparty cp
          ON cp.counterparty_id = fm.counterparty_id
          AND cp.is_current_flag = 'Y'
        WHERE fm.active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level region_code per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          cp.region_code AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.counterparty cp
          ON cp.counterparty_id = fm.counterparty_id
          AND cp.is_current_flag = 'Y'
        WHERE fm.active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level region_code per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          cp.region_code AS metric_value
        FROM l1.facility_master fm
        INNER JOIN l1.counterparty cp
          ON cp.counterparty_id = fm.counterparty_id
          AND cp.is_current_flag = 'Y'
        WHERE fm.active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-026-V01"
    type: NOT_NULL
    description: "No null region_code values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-069"
  abbreviation: "R"
  insight: >
    Regional risk concentration
  rollup_strategy: "direct-sum"
  primary_value_field: "region_code"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data"]
dashboard_pages: []
legacy_metric_ids: []
