# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Sector (Industry)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-027"
name: "Sector"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: HYBRID
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Industry sector classification of the counterparty, enabling sector
  concentration risk assessment. Facility and counterparty levels return
  industry_name. Aggregate levels return the dominant industry (highest
  total exposure) per segment.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Sector concentration risk"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: JOIN_KEY
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l2
    table: counterparty
    alias: cp
    join_type: INNER
    join_on: "cp.counterparty_id = fm.counterparty_id"
    fields:
      - name: counterparty_id
        role: JOIN_KEY
      - name: industry_id
        role: JOIN_KEY
  - schema: l1
    table: industry_dim
    alias: ind
    join_type: INNER
    join_on: "ind.industry_id = cp.industry_id"
    fields:
      - name: industry_id
        role: JOIN_KEY
      - name: industry_name
        role: MEASURE
  - schema: l2
    table: facility_exposure_snapshot
    alias: fes
    join_type: LEFT
    join_on: "fes.facility_id = fm.facility_id"
    fields:
      - name: gross_exposure_usd
        role: MEASURE
        description: "Used for weighting at aggregate levels"
      - name: as_of_date
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Lookup industry_name via facility_master -> counterparty -> industry_dim.
    formula_sql: |-
      SELECT
        fm.facility_id AS dimension_key,
        ind.industry_name AS metric_value
      FROM l2.facility_master fm
      INNER JOIN l2.counterparty cp
        ON cp.counterparty_id = fm.counterparty_id
      INNER JOIN l1.industry_dim ind
        ON ind.industry_id = cp.industry_id
      WHERE fm.is_active_flag = 'Y'
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Lookup industry_name directly from counterparty -> industry_dim.
    formula_sql: |-
      SELECT
        cp.counterparty_id AS dimension_key,
        ind.industry_name AS metric_value
      FROM l2.counterparty cp
      INNER JOIN l1.industry_dim ind
        ON ind.industry_id = cp.industry_id
      WHERE cp.is_active_flag = 'Y'
  desk:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant industry (highest gross exposure) per L3 desk segment.
    formula_sql: |-
      SELECT
        sub.segment_id AS dimension_key,
        sub.industry_name AS metric_value
      FROM (
        SELECT
          ebt.managed_segment_id AS segment_id,
          ind.industry_name,
          SUM(COALESCE(fes.gross_exposure_usd, 0)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt.managed_segment_id
            ORDER BY SUM(COALESCE(fes.gross_exposure_usd, 0)) DESC
          ) AS rn
        FROM l2.facility_master fm
        INNER JOIN l2.counterparty cp
          ON cp.counterparty_id = fm.counterparty_id
        INNER JOIN l1.industry_dim ind
          ON ind.industry_id = cp.industry_id
        LEFT JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = fm.facility_id
          AND fes.as_of_date = :as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt
          ON ebt.managed_segment_id = fm.lob_segment_id
            AND ebt.is_current_flag = 'Y'
        WHERE fm.is_active_flag = 'Y'
        GROUP BY ebt.managed_segment_id, ind.industry_name
      ) sub
      WHERE sub.rn = 1
  portfolio:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant industry (highest gross exposure) per L2 portfolio segment.
    formula_sql: |-
      SELECT
        sub.segment_id AS dimension_key,
        sub.industry_name AS metric_value
      FROM (
        SELECT
          ebt_l2.managed_segment_id AS segment_id,
          ind.industry_name,
          SUM(COALESCE(fes.gross_exposure_usd, 0)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt_l2.managed_segment_id
            ORDER BY SUM(COALESCE(fes.gross_exposure_usd, 0)) DESC
          ) AS rn
        FROM l2.facility_master fm
        INNER JOIN l2.counterparty cp
          ON cp.counterparty_id = fm.counterparty_id
        INNER JOIN l1.industry_dim ind
          ON ind.industry_id = cp.industry_id
        LEFT JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = fm.facility_id
          AND fes.as_of_date = :as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
            AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
            AND ebt_l2.is_current_flag = 'Y'
        WHERE fm.is_active_flag = 'Y'
        GROUP BY ebt_l2.managed_segment_id, ind.industry_name
      ) sub
      WHERE sub.rn = 1
  business_segment:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant industry (highest gross exposure) per L1 business segment.
    formula_sql: |-
      SELECT
        sub.segment_id AS dimension_key,
        sub.industry_name AS metric_value
      FROM (
        SELECT
          ebt_l1.managed_segment_id AS segment_id,
          ind.industry_name,
          SUM(COALESCE(fes.gross_exposure_usd, 0)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt_l1.managed_segment_id
            ORDER BY SUM(COALESCE(fes.gross_exposure_usd, 0)) DESC
          ) AS rn
        FROM l2.facility_master fm
        INNER JOIN l2.counterparty cp
          ON cp.counterparty_id = fm.counterparty_id
        INNER JOIN l1.industry_dim ind
          ON ind.industry_id = cp.industry_id
        LEFT JOIN l2.facility_exposure_snapshot fes
          ON fes.facility_id = fm.facility_id
          AND fes.as_of_date = :as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
            AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
            AND ebt_l2.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
          ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
            AND ebt_l1.is_current_flag = 'Y'
        WHERE fm.is_active_flag = 'Y'
        GROUP BY ebt_l1.managed_segment_id, ind.industry_name
      ) sub
      WHERE sub.rn = 1
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-027-V01"
    type: NOT_NULL
    description: "No null industry_name values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-080"
  abbreviation: "S"
  insight: >
    Industry risk concentration
  rollup_strategy: "custom"
  primary_value_field: "industry_name"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data", "concentration"]
dashboard_pages: []
legacy_metric_ids: []
