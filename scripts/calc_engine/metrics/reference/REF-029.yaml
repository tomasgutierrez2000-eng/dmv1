# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Tangible Net Worth
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-029"
name: "Tangible Net Worth"
version: "1.0.0"
owner: "market-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: SOURCED
direction: HIGHER_BETTER
unit_type: ORDINAL
display_format: "s"
description: >
  Represents “hard” equity after removing intangibles; reflects true loss-
  absorbing capacity, covenant strength, and resilience under downside
  scenarios.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: counterparty_financial_snapshot
    alias: cfs
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: tangible_net_worth_usd
        role: MEASURE
  - schema: l1
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = cfs.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Read tangible_net_worth_usd from counterparty_financial_snapshot for each
      facility as-of reporting date.
    formula_sql: |
      SELECT
        cfs.facility_id AS dimension_key,
        cfs.tangible_net_worth_usd AS metric_value
      FROM l2.counterparty_financial_snapshot cfs
      WHERE cfs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Read tangible_net_worth_usd per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        cfs.tangible_net_worth_usd AS metric_value
      FROM l2.counterparty_financial_snapshot cfs
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = cfs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE cfs.as_of_date = :as_of_date
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level tangible_net_worth_usd per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          cfs.facility_id AS dimension_key,
          cfs.tangible_net_worth_usd AS metric_value
        FROM l2.counterparty_financial_snapshot cfs
        WHERE cfs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level tangible_net_worth_usd per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          cfs.facility_id AS dimension_key,
          cfs.tangible_net_worth_usd AS metric_value
        FROM l2.counterparty_financial_snapshot cfs
        WHERE cfs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level tangible_net_worth_usd per L1 business segment
      segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          cfs.facility_id AS dimension_key,
          cfs.tangible_net_worth_usd AS metric_value
        FROM l2.counterparty_financial_snapshot cfs
        WHERE cfs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-029-V01"
    type: NOT_NULL
    description: "No null tangible_net_worth_usd values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-096"
  abbreviation: "TNW"
  insight: >
    Real equity capital available to absorb losses (excludes intangibles);
    gauges financial stability and resilience.
  rollup_strategy: "direct-sum"
  primary_value_field: "tangible_net_worth_usd"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data"]
dashboard_pages: []
legacy_metric_ids: []
