# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Maturity Date Bucket
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-030"
name: "Maturity Date Bucket"
version: "1.0.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Bucketing mechanism to calculate Maturity Dates supporting the identification
  of upcoming liquidations in the next 90 days
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l1
    table: maturity_bucket_dim
    alias: mbd
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: maturity_bucket_id
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: CUSTOM
    formula_text: >
      Calculated maturity_bucket_id per facility.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        mbd.maturity_bucket_id AS metric_value
      FROM l2.facility_master fm
      INNER JOIN l1.maturity_bucket_dim mbd
        ON mbd.facility_id = fm.facility_id
      WHERE fm.is_active_flag = 'Y'
  counterparty:
    aggregation_type: SUM
    formula_text: >
      SUM(facility-level maturity_bucket_id) per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          mbd.maturity_bucket_id AS metric_value
        FROM l2.facility_master fm
        INNER JOIN l1.maturity_bucket_dim mbd
          ON mbd.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level maturity_bucket_id per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          mbd.maturity_bucket_id AS metric_value
        FROM l2.facility_master fm
        INNER JOIN l1.maturity_bucket_dim mbd
          ON mbd.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level maturity_bucket_id per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          mbd.maturity_bucket_id AS metric_value
        FROM l2.facility_master fm
        INNER JOIN l1.maturity_bucket_dim mbd
          ON mbd.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: SUM
    formula_text: >
      SUM of facility-level maturity_bucket_id per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        SUM(fac.metric_value) AS metric_value
      FROM (
        SELECT
          fm.facility_id AS dimension_key,
          mbd.maturity_bucket_id AS metric_value
        FROM l2.facility_master fm
        INNER JOIN l1.maturity_bucket_dim mbd
          ON mbd.facility_id = fm.facility_id
        WHERE fm.is_active_flag = 'Y'
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-030-V01"
    type: NOT_NULL
    description: "No null maturity_bucket_id values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-103"
  abbreviation: "MDB"
  insight: >
  rollup_strategy: "direct-sum"
  primary_value_field: "maturity_bucket_id"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data"]
dashboard_pages: []
legacy_metric_ids: []
