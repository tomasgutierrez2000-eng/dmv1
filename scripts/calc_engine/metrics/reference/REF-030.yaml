# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Maturity Date Bucket — Dominant Maturity Bucket by Exposure
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "REF-030"
name: "Maturity Date Bucket"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "reference"
sub_domain: "master-data"
metric_class: HYBRID
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Maturity time bucket for each facility based on days_until_maturity
  from the exposure snapshot, mapped to maturity_bucket_dim via range
  join (bucket_start_days <= days <= bucket_end_days). At facility
  level, returns the bucket_name. At aggregate levels, returns the
  dominant maturity bucket by drawn exposure weight. Supports maturity
  wall identification and concentration risk monitoring.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Maturity concentration risk monitoring"
  - framework: "OCC 2020-36"
    description: "Maturity wall identification and liquidity risk"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: facility_exposure_snapshot
    alias: fes
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: days_until_maturity
        role: MEASURE
        description: "Days remaining to facility maturity"
      - name: drawn_amount
        role: MEASURE
        description: "Exposure weighting for dominant bucket selection"
      - name: bank_share_pct
        role: MEASURE
      - name: currency_code
        role: DIMENSION
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = fes.facility_id AND fm.is_active_flag = 'Y' AND fm.is_current_flag = 'Y'"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
      - name: is_current_flag
        role: FILTER
  - schema: l1
    table: maturity_bucket_dim
    alias: mbd
    join_type: LEFT
    join_on: "fes.days_until_maturity >= mbd.bucket_start_days AND fes.days_until_maturity < mbd.bucket_end_days AND mbd.is_active_flag = 'Y'"
    fields:
      - name: maturity_bucket_id
        role: JOIN_KEY
      - name: bucket_name
        role: DIMENSION
        description: "Human-readable maturity bucket name"
      - name: bucket_start_days
        role: FILTER
      - name: bucket_end_days
        role: FILTER
      - name: is_active_flag
        role: FILTER
  - schema: l2
    table: fx_rate
    alias: fx
    join_type: LEFT
    join_on: "fx.from_currency_code = fes.currency_code AND fx.to_currency_code = 'USD' AND fx.as_of_date = fes.as_of_date"
    fields:
      - name: rate
        role: MEASURE
        description: "FX spot rate for USD conversion at aggregate levels"
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
      - name: is_current_flag
        role: FILTER
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Maturity bucket lookup from maturity_bucket_dim via range join on
      days_until_maturity. Returns bucket_name (e.g., "0-90 days",
      "91-180 days", "1-2 years").
    formula_sql: |
      SELECT
        fes.facility_id AS dimension_key,
        MAX(mbd.bucket_name) AS metric_value
      FROM l2.facility_exposure_snapshot fes
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fes.facility_id
        AND fm.is_active_flag = 'Y'
        AND fm.is_current_flag = 'Y'
      LEFT JOIN l1.maturity_bucket_dim mbd
        ON fes.days_until_maturity >= mbd.bucket_start_days
        AND fes.days_until_maturity < mbd.bucket_end_days
        AND mbd.is_active_flag = 'Y'
      WHERE fes.as_of_date = :as_of_date
      GROUP BY fes.facility_id
  counterparty:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant maturity bucket by drawn exposure weight per counterparty.
      ROW_NUMBER partitioned by counterparty, ordered by total
      bank-share-adjusted drawn amount descending.
    formula_sql: |
      SELECT
        sub.counterparty_id AS dimension_key,
        sub.bucket_name AS metric_value
      FROM (
        SELECT
          fm.counterparty_id,
          mbd.bucket_name,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY fm.counterparty_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0) DESC
          ) AS rn
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.maturity_bucket_dim mbd
          ON fes.days_until_maturity >= mbd.bucket_start_days
          AND fes.days_until_maturity < mbd.bucket_end_days
          AND mbd.is_active_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
        GROUP BY fm.counterparty_id, mbd.bucket_name
      ) sub
      WHERE sub.rn = 1
  desk:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant maturity bucket by drawn exposure weight (USD-converted) per
      L3 desk segment. ROW_NUMBER partitioned by desk, ordered by
      total exposure descending.
    formula_sql: |
      SELECT
        sub.segment_id AS dimension_key,
        sub.bucket_name AS metric_value
      FROM (
        SELECT
          ebt.managed_segment_id AS segment_id,
          mbd.bucket_name,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt.managed_segment_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0
              * COALESCE(fx.rate, 1)) DESC
          ) AS rn
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.maturity_bucket_dim mbd
          ON fes.days_until_maturity >= mbd.bucket_start_days
          AND fes.days_until_maturity < mbd.bucket_end_days
          AND mbd.is_active_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fes.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fes.as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt
          ON ebt.managed_segment_id = fm.lob_segment_id
          AND ebt.is_current_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
        GROUP BY ebt.managed_segment_id, mbd.bucket_name
      ) sub
      WHERE sub.rn = 1
  portfolio:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant maturity bucket by drawn exposure weight (USD-converted) per
      L2 portfolio segment via EBT hierarchy (one hop up).
    formula_sql: |
      SELECT
        sub.segment_id AS dimension_key,
        sub.bucket_name AS metric_value
      FROM (
        SELECT
          ebt_l2.managed_segment_id AS segment_id,
          mbd.bucket_name,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt_l2.managed_segment_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0
              * COALESCE(fx.rate, 1)) DESC
          ) AS rn
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.maturity_bucket_dim mbd
          ON fes.days_until_maturity >= mbd.bucket_start_days
          AND fes.days_until_maturity < mbd.bucket_end_days
          AND mbd.is_active_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fes.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fes.as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
        GROUP BY ebt_l2.managed_segment_id, mbd.bucket_name
      ) sub
      WHERE sub.rn = 1
  business_segment:
    aggregation_type: CUSTOM
    formula_text: >
      Dominant maturity bucket by drawn exposure weight (USD-converted) per
      L1 business segment via EBT hierarchy (two hops up).
    formula_sql: |
      SELECT
        sub.segment_id AS dimension_key,
        sub.bucket_name AS metric_value
      FROM (
        SELECT
          ebt_l1.managed_segment_id AS segment_id,
          mbd.bucket_name,
          SUM(fes.drawn_amount
            * COALESCE(fes.bank_share_pct, 100.0) / 100.0
            * COALESCE(fx.rate, 1)) AS total_exp,
          ROW_NUMBER() OVER (
            PARTITION BY ebt_l1.managed_segment_id
            ORDER BY SUM(fes.drawn_amount
              * COALESCE(fes.bank_share_pct, 100.0) / 100.0
              * COALESCE(fx.rate, 1)) DESC
          ) AS rn
        FROM l2.facility_exposure_snapshot fes
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = fes.facility_id
          AND fm.is_active_flag = 'Y'
          AND fm.is_current_flag = 'Y'
        LEFT JOIN l1.maturity_bucket_dim mbd
          ON fes.days_until_maturity >= mbd.bucket_start_days
          AND fes.days_until_maturity < mbd.bucket_end_days
          AND mbd.is_active_flag = 'Y'
        LEFT JOIN l2.fx_rate fx
          ON fx.from_currency_code = fes.currency_code
          AND fx.to_currency_code = 'USD'
          AND fx.as_of_date = fes.as_of_date
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
          AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
          AND ebt_l2.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
          ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
          AND ebt_l1.is_current_flag = 'Y'
        WHERE fes.as_of_date = :as_of_date
        GROUP BY ebt_l1.managed_segment_id, mbd.bucket_name
      ) sub
      WHERE sub.rn = 1
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "REF-030-V01"
    type: NOT_NULL
    description: "No null bucket_name values for facilities with days_until_maturity"
    severity: ERROR
  - rule_id: "REF-030-V02"
    type: CUSTOM_SQL
    description: "Every facility days_until_maturity should fall within a bucket range"
    severity: WARNING
    custom_sql: |
      SELECT COUNT(*) AS unbucketed_count
      FROM l2.facility_exposure_snapshot fes
      LEFT JOIN l1.maturity_bucket_dim mbd
        ON fes.days_until_maturity >= mbd.bucket_start_days
        AND fes.days_until_maturity < mbd.bucket_end_days
        AND mbd.is_active_flag = 'Y'
      WHERE mbd.maturity_bucket_id IS NULL
        AND fes.days_until_maturity IS NOT NULL
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-103"
  abbreviation: "MDB"
  insight: >
    Maturity time bucket classification. At facility level shows the
    bucket name; at aggregate levels shows the dominant maturity bucket
    by drawn exposure weight. Supports maturity wall identification.
  rollup_strategy: "custom"
  primary_value_field: "bucket_name"
# ── METADATA ──────────────────────────────────────────────────
tags: ["reference", "master-data", "maturity", "concentration", "liquidity"]
dashboard_pages: []
legacy_metric_ids: []
