# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Risk Rating - External Rating
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "RSK-002"
name: "Risk Rating - External Rating"
version: "1.0.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "risk"
sub_domain: "credit-ratings"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Current external credit agency rating assigned to the obligor. Used for
  benchmarking, regulatory reporting, and external credit risk validation.
  Sourced based on external Rating provider (S&P, Moodys, Fitch) - populated
  based on firm's preferred recognized rating provider.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: ""
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: position
    alias: pos
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: external_risk_rating
        role: MEASURE
  - schema: l1
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.facility_id = pos.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Read external_risk_rating from position for each facility as-of reporting
      date.
    formula_sql: |
      SELECT
        pos.facility_id AS dimension_key,
        pos.external_risk_rating AS metric_value
      FROM l2.position pos
      WHERE pos.as_of_date = :as_of_date
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Read external_risk_rating per counterparty.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        pos.external_risk_rating AS metric_value
      FROM l2.position pos
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = pos.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE pos.as_of_date = :as_of_date
  desk:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      AVG of facility-level external_risk_rating per L3 desk segment.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        AVG(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pos.facility_id AS dimension_key,
          pos.external_risk_rating AS metric_value
        FROM l2.position pos
        WHERE pos.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      AVG of facility-level external_risk_rating per L2 portfolio segment.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        AVG(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pos.facility_id AS dimension_key,
          pos.external_risk_rating AS metric_value
        FROM l2.position pos
        WHERE pos.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      AVG of facility-level external_risk_rating per L1 business segment segment.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        AVG(fac.metric_value) AS metric_value
      FROM (
        SELECT
          pos.facility_id AS dimension_key,
          pos.external_risk_rating AS metric_value
        FROM l2.position pos
        WHERE pos.as_of_date = :as_of_date
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.dimension_key
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "RSK-002-V01"
    type: NOT_NULL
    description: "No null external_risk_rating values"
    severity: ERROR
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-037"
  abbreviation: "RRER"
  insight: >
    Creditworthiness from external perspective
  rollup_strategy: "direct-sum"
  primary_value_field: "external_risk_rating"
# ── METADATA ──────────────────────────────────────────────────
tags: ["risk", "credit-ratings"]
dashboard_pages: []
legacy_metric_ids: []
