metric_id: RSK-003
name: Risk Rating - Internal Risk Rating
version: 1.0.0
owner: credit-risk
status: DRAFT
effective_date: '2026-01-01'
supersedes: null
domain: risk
sub_domain: credit-ratings
metric_class: CALCULATED
direction: NEUTRAL
unit_type: COUNT
display_format: ',.0f'
description: |
  The institution’s internally assigned credit risk grade for a borrower, facility, or exposure as of a given date, reflecting its assessment of default risk according to the firm’s internal rating scale/model.
regulatory_references:
- framework: Basel III
  description: ''
source_tables:
- schema: l2
  table: facility_risk_snapshot
  alias: frs
  join_type: BASE
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: as_of_date
    role: FILTER
  - name: internal_risk_rating
    role: MEASURE
- schema: l2
  table: facility_master
  alias: fm
  join_type: INNER
  join_on: fm.facility_id = frs.facility_id
  fields:
  - name: facility_id
    role: JOIN_KEY
  - name: counterparty_id
    role: DIMENSION
  - name: lob_segment_id
    role: DIMENSION
  - name: is_active_flag
    role: FILTER
- schema: l1
  table: enterprise_business_taxonomy
  alias: ebt
  join_type: LEFT
  join_on: ebt.managed_segment_id = fm.lob_segment_id
  fields:
  - name: managed_segment_id
    role: DIMENSION
  - name: parent_segment_id
    role: DIMENSION
levels:
  facility:
    aggregation_type: RAW
    formula_text: |
      Read internal_risk_rating from facility_risk_snapshot for each facility.
    formula_sql: |-
      SELECT
        frs.facility_id AS dimension_key,
        1 AS metric_value
      FROM l2.facility_risk_snapshot frs
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = frs.facility_id
        AND fm.is_active_flag = 'Y'
      WHERE frs.as_of_date = :as_of_date
  counterparty:
    aggregation_type: COUNT
    formula_text: |
      COUNT of facilities with internal risk rating per counterparty.
    formula_sql: |-
      SELECT
        fm.counterparty_id AS dimension_key,
        COUNT(DISTINCT fac.facility_id) AS metric_value
      FROM (
        SELECT
          frs.facility_id
        FROM l2.facility_risk_snapshot frs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE frs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: COUNT
    formula_text: |
      COUNT of facilities with internal risk rating per L3 desk segment.
    formula_sql: |-
      SELECT
        ebt.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fac.facility_id) AS metric_value
      FROM (
        SELECT
          frs.facility_id
        FROM l2.facility_risk_snapshot frs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE frs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: COUNT
    formula_text: |
      COUNT of facilities with internal risk rating per L2 portfolio segment.
    formula_sql: |-
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fac.facility_id) AS metric_value
      FROM (
        SELECT
          frs.facility_id
        FROM l2.facility_risk_snapshot frs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE frs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: COUNT
    formula_text: |
      COUNT of facilities with internal risk rating per L1 business segment.
    formula_sql: |-
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        COUNT(DISTINCT fac.facility_id) AS metric_value
      FROM (
        SELECT
          frs.facility_id
        FROM l2.facility_risk_snapshot frs
        INNER JOIN l2.facility_master fm
          ON fm.facility_id = frs.facility_id
          AND fm.is_active_flag = 'Y'
        WHERE frs.as_of_date = :as_of_date
      ) fac
      INNER JOIN l2.facility_master fm
        ON fm.facility_id = fac.facility_id
        AND fm.is_active_flag = 'Y'
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
depends_on: []
output:
  table: metric_result
validations:
- rule_id: RSK-003-V01
  type: NOT_NULL
  description: No null internal_risk_rating values
  severity: ERROR
catalogue:
  item_id: MET-046
  abbreviation: RRIR
  insight: |
    Internal portfolio credit quality
  rollup_strategy: direct-sum
  primary_value_field: internal_risk_rating
tags:
- risk
- credit-ratings
dashboard_pages: []
legacy_metric_ids: []
