# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Risk Rating Status - Internal (e.g. Downgrade, Upgrade, Stable)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "RSK-006"
name: "Risk Rating Status - Internal (e.g. Downgrade, Upgrade, Stable)"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "risk"
sub_domain: "credit-ratings"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "s"
description: >
  Directional classification indicating whether the internal credit rating has
  changed month-over-month: Upgrade (positive notch movement), Downgrade
  (negative notch movement), or Stable (no change). At facility/counterparty
  level, reads the pre-computed risk_rating_status from the internal rating
  observation. At aggregate levels (desk, portfolio, business segment),
  derives the direction from the average of counterparty-level
  risk_rating_change_steps — each counterparty counted once per segment to
  avoid facility-count bias. Provides migration trend insight and serves as
  an early warning indicator of credit quality movement.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "IRB rating system migration monitoring (CRE 36)"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: counterparty_rating_observation
    alias: cro
    join_type: BASE
    fields:
      - name: counterparty_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: is_internal_flag
        role: FILTER
      - name: risk_rating_status
        role: MEASURE
      - name: risk_rating_change_steps
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.counterparty_id = cro.counterparty_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id AND ebt.is_current_flag = 'Y'"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Read risk_rating_status from internal counterparty_rating_observation.
      Each facility inherits its counterparty's internal rating status.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        cro.risk_rating_status AS metric_value
      FROM l2.facility_master fm
      INNER JOIN l2.counterparty_rating_observation cro
        ON cro.counterparty_id = fm.counterparty_id
        AND cro.is_internal_flag = 'Y'
        AND cro.as_of_date = :as_of_date
      WHERE fm.is_active_flag = 'Y'
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Read risk_rating_status directly from internal
      counterparty_rating_observation.
    formula_sql: |
      SELECT
        cro.counterparty_id AS dimension_key,
        cro.risk_rating_status AS metric_value
      FROM l2.counterparty_rating_observation cro
      WHERE cro.is_internal_flag = 'Y'
        AND cro.as_of_date = :as_of_date
  desk:
    aggregation_type: CUSTOM
    formula_text: >
      Average internal risk_rating_change_steps across distinct counterparties
      in the L3 desk segment, then classify: >0 Upgrade, <0 Downgrade,
      =0 Stable. Counterparties de-duplicated per segment to avoid
      facility-count bias.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE
          WHEN AVG(cp_seg.change_steps) > 0.0 THEN 'Upgrade'
          WHEN AVG(cp_seg.change_steps) < 0.0 THEN 'Downgrade'
          ELSE 'Stable'
        END AS metric_value
      FROM (
        SELECT DISTINCT
          fm.lob_segment_id,
          cro.counterparty_id,
          cro.risk_rating_change_steps AS change_steps
        FROM l2.counterparty_rating_observation cro
        INNER JOIN l2.facility_master fm
          ON fm.counterparty_id = cro.counterparty_id
          AND fm.is_active_flag = 'Y'
        WHERE cro.is_internal_flag = 'Y'
          AND cro.as_of_date = :as_of_date
      ) cp_seg
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = cp_seg.lob_segment_id
          AND ebt.is_current_flag = 'Y'
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: >
      Average internal risk_rating_change_steps across distinct counterparties
      in the L2 portfolio segment, then classify direction.
    formula_sql: |
      SELECT
        cp_port.portfolio_id AS dimension_key,
        CASE
          WHEN AVG(cp_port.change_steps) > 0.0 THEN 'Upgrade'
          WHEN AVG(cp_port.change_steps) < 0.0 THEN 'Downgrade'
          ELSE 'Stable'
        END AS metric_value
      FROM (
        SELECT DISTINCT
          ebt_l2.managed_segment_id AS portfolio_id,
          cro.counterparty_id,
          cro.risk_rating_change_steps AS change_steps
        FROM l2.counterparty_rating_observation cro
        INNER JOIN l2.facility_master fm
          ON fm.counterparty_id = cro.counterparty_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
            AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
            AND ebt_l2.is_current_flag = 'Y'
        WHERE cro.is_internal_flag = 'Y'
          AND cro.as_of_date = :as_of_date
      ) cp_port
      GROUP BY cp_port.portfolio_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: >
      Average internal risk_rating_change_steps across distinct counterparties
      in the L1 business segment, then classify direction.
    formula_sql: |
      SELECT
        cp_seg.segment_id AS dimension_key,
        CASE
          WHEN AVG(cp_seg.change_steps) > 0.0 THEN 'Upgrade'
          WHEN AVG(cp_seg.change_steps) < 0.0 THEN 'Downgrade'
          ELSE 'Stable'
        END AS metric_value
      FROM (
        SELECT DISTINCT
          ebt_l1.managed_segment_id AS segment_id,
          cro.counterparty_id,
          cro.risk_rating_change_steps AS change_steps
        FROM l2.counterparty_rating_observation cro
        INNER JOIN l2.facility_master fm
          ON fm.counterparty_id = cro.counterparty_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
            AND ebt_l3.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
            AND ebt_l2.is_current_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
          ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
            AND ebt_l1.is_current_flag = 'Y'
        WHERE cro.is_internal_flag = 'Y'
          AND cro.as_of_date = :as_of_date
      ) cp_seg
      GROUP BY cp_seg.segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "RSK-006-V01"
    type: NOT_NULL
    description: "No null risk_rating_status values"
    severity: ERROR
  - rule_id: "RSK-006-V02"
    type: THRESHOLD
    description: "Status must be one of Upgrade, Downgrade, or Stable"
    severity: ERROR
    params:
      allowed_values: ["Upgrade", "Downgrade", "Stable"]
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-073"
  abbreviation: "RRSI"
  insight: >
    Internal risk dynamics tracking — directional classification of
    counterparty-level internal rating migration (Upgrade/Downgrade/Stable).
    Aggregate levels derive direction from average counterparty change steps.
  rollup_strategy: "weighted-avg"
  primary_value_field: "risk_rating_status"
# ── METADATA ──────────────────────────────────────────────────
tags: ["risk", "credit-ratings", "migration"]
dashboard_pages: []
legacy_metric_ids: []
