# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Risk Rating Status - Internal Change - Steps (e.g. 1 to 3 = -3 steps)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "RSK-007"
name: "Risk Rating Status - Internal Change - Steps (e.g. 1 to 3 = -3 steps)"
version: "2.0.0"
owner: "credit-risk"
status: ACTIVE
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "risk"
sub_domain: "credit-ratings"
metric_class: CALCULATED
direction: NEUTRAL
unit_type: ORDINAL
display_format: "+d"
description: >
  Numerical representation of internal risk rating migration expressed in
  notch movement. Positive values indicate upgrades (e.g. rating 3 to 1 =
  +2 steps), negative values indicate downgrades (e.g. rating 5 to 8 = -3
  steps), zero indicates stable. At facility/counterparty level, reads the
  pre-computed risk_rating_change_steps from the internal rating observation.
  At aggregate levels (desk, portfolio, business segment), computes the
  rounded average of counterparty-level change steps — each counterparty
  counted once per segment to avoid facility-count bias. Quantifies magnitude
  of credit migration for portfolio-level trend analysis and stress testing.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "IRB rating system migration monitoring (CRE 36)"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l2
    table: counterparty_rating_observation
    alias: cro
    join_type: BASE
    fields:
      - name: counterparty_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: is_internal_flag
        role: FILTER
      - name: risk_rating_change_steps
        role: MEASURE
  - schema: l2
    table: facility_master
    alias: fm
    join_type: INNER
    join_on: "fm.counterparty_id = cro.counterparty_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
      - name: is_active_flag
        role: FILTER
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: >
      Read risk_rating_change_steps from internal
      counterparty_rating_observation. Each facility inherits its
      counterparty's internal rating change magnitude.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        cro.risk_rating_change_steps AS metric_value
      FROM l2.facility_master fm
      INNER JOIN l2.counterparty_rating_observation cro
        ON cro.counterparty_id = fm.counterparty_id
        AND cro.is_internal_flag = 'Y'
        AND cro.as_of_date = :as_of_date
      WHERE fm.is_active_flag = 'Y'
  counterparty:
    aggregation_type: RAW
    formula_text: >
      Read risk_rating_change_steps directly from internal
      counterparty_rating_observation.
    formula_sql: |
      SELECT
        cro.counterparty_id AS dimension_key,
        cro.risk_rating_change_steps AS metric_value
      FROM l2.counterparty_rating_observation cro
      WHERE cro.is_internal_flag = 'Y'
        AND cro.as_of_date = :as_of_date
  desk:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Rounded average of counterparty-level risk_rating_change_steps across
      distinct counterparties in the L3 desk segment. Counterparties
      de-duplicated per segment to avoid facility-count bias.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        ROUND(AVG(cp_seg.change_steps)) AS metric_value
      FROM (
        SELECT DISTINCT
          fm.lob_segment_id,
          cro.counterparty_id,
          cro.risk_rating_change_steps AS change_steps
        FROM l2.counterparty_rating_observation cro
        INNER JOIN l2.facility_master fm
          ON fm.counterparty_id = cro.counterparty_id
          AND fm.is_active_flag = 'Y'
        WHERE cro.is_internal_flag = 'Y'
          AND cro.as_of_date = :as_of_date
      ) cp_seg
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = cp_seg.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Rounded average of counterparty-level risk_rating_change_steps across
      distinct counterparties in the L2 portfolio segment.
    formula_sql: |
      SELECT
        cp_port.portfolio_id AS dimension_key,
        ROUND(AVG(cp_port.change_steps)) AS metric_value
      FROM (
        SELECT DISTINCT
          ebt_l2.managed_segment_id AS portfolio_id,
          cro.counterparty_id,
          cro.risk_rating_change_steps AS change_steps
        FROM l2.counterparty_rating_observation cro
        INNER JOIN l2.facility_master fm
          ON fm.counterparty_id = cro.counterparty_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        WHERE cro.is_internal_flag = 'Y'
          AND cro.as_of_date = :as_of_date
      ) cp_port
      GROUP BY cp_port.portfolio_id
  business_segment:
    aggregation_type: WEIGHTED_AVG
    formula_text: >
      Rounded average of counterparty-level risk_rating_change_steps across
      distinct counterparties in the L1 business segment.
    formula_sql: |
      SELECT
        cp_seg.segment_id AS dimension_key,
        ROUND(AVG(cp_seg.change_steps)) AS metric_value
      FROM (
        SELECT DISTINCT
          ebt_l1.managed_segment_id AS segment_id,
          cro.counterparty_id,
          cro.risk_rating_change_steps AS change_steps
        FROM l2.counterparty_rating_observation cro
        INNER JOIN l2.facility_master fm
          ON fm.counterparty_id = cro.counterparty_id
          AND fm.is_active_flag = 'Y'
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
          ON ebt_l3.managed_segment_id = fm.lob_segment_id
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
          ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
        LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
          ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
        WHERE cro.is_internal_flag = 'Y'
          AND cro.as_of_date = :as_of_date
      ) cp_seg
      GROUP BY cp_seg.segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "RSK-007-V01"
    type: NOT_NULL
    description: "No null risk_rating_change_steps values"
    severity: ERROR
  - rule_id: "RSK-007-V02"
    type: THRESHOLD
    description: "Change steps within reasonable notch range"
    severity: WARNING
    params:
      min: -10
      max: 10
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-074"
  abbreviation: "RRSI"
  insight: >
    Magnitude of credit quality changes — numerical notch movement
    (positive=upgrade, negative=downgrade). Aggregate levels compute
    rounded average across counterparties in the segment.
  rollup_strategy: "weighted-avg"
  primary_value_field: "risk_rating_change_steps"
# ── METADATA ──────────────────────────────────────────────────
tags: ["risk", "credit-ratings", "migration"]
dashboard_pages: []
legacy_metric_ids: []
