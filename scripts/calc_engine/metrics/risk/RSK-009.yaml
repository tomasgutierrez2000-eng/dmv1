# ═══════════════════════════════════════════════════════════════
# GSIB Metric Definition
# Loan-to-Value Ratio (LTV)
# ═══════════════════════════════════════════════════════════════
# ── IDENTIFICATION ────────────────────────────────────────────
metric_id: "RSK-009"
name: "Loan-to-Value Ratio (%)"
version: "1.0.0"
owner: "credit-risk"
status: DRAFT
effective_date: "2026-01-01"
supersedes: null
# ── CLASSIFICATION ────────────────────────────────────────────
domain: "risk"
sub_domain: "collateral"
metric_class: CALCULATED
direction: LOWER_BETTER
unit_type: PERCENTAGE
display_format: ".1f"
description: >
  Committed facility amount as a percentage of underlying collateral value.
  Higher LTV indicates greater loss severity risk in the event of default.
  A core risk metric for secured lending portfolios.
# ── REGULATORY REFERENCES ─────────────────────────────────────
regulatory_references:
  - framework: "Basel III"
    description: "Credit risk mitigation — collateral haircuts and LTV thresholds"
# ── SOURCE TABLES ─────────────────────────────────────────────
source_tables:
  - schema: l1
    table: facility_master
    alias: fm
    join_type: BASE
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: committed_facility_amt
        role: MEASURE
      - name: counterparty_id
        role: DIMENSION
      - name: lob_segment_id
        role: DIMENSION
  - schema: l2
    table: collateral_snapshot
    alias: cs
    join_type: INNER
    join_on: "cs.facility_id = fm.facility_id"
    fields:
      - name: facility_id
        role: JOIN_KEY
      - name: as_of_date
        role: FILTER
      - name: current_valuation_usd
        role: MEASURE
  - schema: l1
    table: enterprise_business_taxonomy
    alias: ebt
    join_type: LEFT
    join_on: "ebt.managed_segment_id = fm.lob_segment_id"
    fields:
      - name: managed_segment_id
        role: DIMENSION
      - name: parent_segment_id
        role: DIMENSION
# ── LEVEL FORMULAS ────────────────────────────────────────────
levels:
  facility:
    aggregation_type: RAW
    formula_text: |
      Aggregate collateral per facility (a facility may have multiple collateral assets),
      then compute LTV = committed_facility_amt / SUM(current_valuation_usd) * 100.
    formula_sql: |
      SELECT
        fm.facility_id AS dimension_key,
        fm.committed_facility_amt
          / NULLIF(SUM(cs.current_valuation_usd), 0) * 100.0 AS metric_value
      FROM l1.facility_master fm
      INNER JOIN l2.collateral_snapshot cs
        ON cs.facility_id = fm.facility_id
        AND cs.as_of_date = :as_of_date
      GROUP BY fm.facility_id, fm.committed_facility_amt
  counterparty:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(committed_facility_amt) / SUM(current_valuation_usd) * 100.0
      per counterparty. Re-derives ratio from summed components.
    formula_sql: |
      SELECT
        fm.counterparty_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          fm.facility_id,
          fm.committed_facility_amt AS numerator_val,
          SUM(cs.current_valuation_usd) AS denominator_val
        FROM l1.facility_master fm
        INNER JOIN l2.collateral_snapshot cs
          ON cs.facility_id = fm.facility_id
          AND cs.as_of_date = :as_of_date
        GROUP BY fm.facility_id, fm.committed_facility_amt
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
      GROUP BY fm.counterparty_id
  desk:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(committed_facility_amt) / SUM(current_valuation_usd) * 100.0
      per L3 desk segment. Re-derives ratio from summed components.
    formula_sql: |
      SELECT
        ebt.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          fm.facility_id,
          fm.committed_facility_amt AS numerator_val,
          SUM(cs.current_valuation_usd) AS denominator_val
        FROM l1.facility_master fm
        INNER JOIN l2.collateral_snapshot cs
          ON cs.facility_id = fm.facility_id
          AND cs.as_of_date = :as_of_date
        GROUP BY fm.facility_id, fm.committed_facility_amt
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt
        ON ebt.managed_segment_id = fm.lob_segment_id
      GROUP BY ebt.managed_segment_id
  portfolio:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(committed_facility_amt) / SUM(current_valuation_usd) * 100.0
      per L2 portfolio segment. Re-derives ratio from summed components.
    formula_sql: |
      SELECT
        ebt_l2.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          fm.facility_id,
          fm.committed_facility_amt AS numerator_val,
          SUM(cs.current_valuation_usd) AS denominator_val
        FROM l1.facility_master fm
        INNER JOIN l2.collateral_snapshot cs
          ON cs.facility_id = fm.facility_id
          AND cs.as_of_date = :as_of_date
        GROUP BY fm.facility_id, fm.committed_facility_amt
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      GROUP BY ebt_l2.managed_segment_id
  business_segment:
    aggregation_type: CUSTOM
    formula_text: |
      SUM(committed_facility_amt) / SUM(current_valuation_usd) * 100.0
      per L1 business segment. Re-derives ratio from summed components.
    formula_sql: |
      SELECT
        ebt_l1.managed_segment_id AS dimension_key,
        CASE WHEN SUM(fac.denominator_val) = 0 THEN NULL
             ELSE SUM(fac.numerator_val) / SUM(fac.denominator_val) * 100.0
        END AS metric_value
      FROM (
        SELECT
          fm.facility_id,
          fm.committed_facility_amt AS numerator_val,
          SUM(cs.current_valuation_usd) AS denominator_val
        FROM l1.facility_master fm
        INNER JOIN l2.collateral_snapshot cs
          ON cs.facility_id = fm.facility_id
          AND cs.as_of_date = :as_of_date
        GROUP BY fm.facility_id, fm.committed_facility_amt
      ) fac
      INNER JOIN l1.facility_master fm
        ON fm.facility_id = fac.facility_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l3
        ON ebt_l3.managed_segment_id = fm.lob_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l2
        ON ebt_l2.managed_segment_id = ebt_l3.parent_segment_id
      LEFT JOIN l1.enterprise_business_taxonomy ebt_l1
        ON ebt_l1.managed_segment_id = ebt_l2.parent_segment_id
      GROUP BY ebt_l1.managed_segment_id
# ── DEPENDENCIES ──────────────────────────────────────────────
depends_on: []
# ── OUTPUT ────────────────────────────────────────────────────
output:
  table: metric_result
# ── VALIDATION RULES ──────────────────────────────────────────
validations:
  - rule_id: "RSK-009-V01"
    type: NOT_NULL
    description: "No null LTV values"
    severity: ERROR
  - rule_id: "RSK-009-V02"
    type: NON_NEGATIVE
    description: "LTV must be >= 0"
    severity: WARNING
# ── CATALOGUE ─────────────────────────────────────────────────
catalogue:
  item_id: "MET-109"
  abbreviation: "LTV"
  insight: >
    Loss severity risk indicator — higher LTV means less collateral
    protection relative to the loan amount
  rollup_strategy: "sum-ratio"
  primary_value_field: "ltv_pct"
# ── METADATA ──────────────────────────────────────────────────
tags: ["risk", "collateral"]
dashboard_pages: []
legacy_metric_ids: []
